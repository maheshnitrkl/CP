<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Visualizer / Dry Run</title>
    <style>
        :root {
            --bg-base: #0f0f13;
            --bg-surface: #1a1a24;
            --bg-elevated: #252533;
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b0;
            --text-tertiary: #6b6b7b;
            --accent-cyan: #00e5ff;
            --accent-green: #00e676;
            --accent-yellow: #ffea00;
            --accent-red: #ff1744;
            --border-primary: rgba(255, 255, 255, 0.1);
            --border-active: rgba(0, 229, 255, 0.5);
            --font-mono: 'Consolas', 'Fira Code', 'Monaco', monospace;
            --font-sans: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-sans);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Navbar Integration Placeholder */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: rgba(15, 15, 19, 0.9);
            border-bottom: 1px solid var(--border-primary);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .navbar__brand { color: var(--text-primary); text-decoration: none; font-weight: 700; font-size: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
        .navbar__nav { display: flex; gap: 1.5rem; }
        .navbar__link { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        .navbar__link:hover, .navbar__link.active { color: var(--accent-cyan); }

        /* Main Layout */
        .visualizer-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 1px;
            background: var(--border-primary);
        }

        /* Left Panel - Editor */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-base);
            min-width: 300px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-primary);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .lang-tabs { display: flex; gap: 0.5rem; }
        .lang-tab {
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-tertiary);
            transition: all 0.2s;
        }
        .lang-tab.active { background: var(--bg-elevated); color: var(--accent-cyan); }

        .editor-wrapper {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .line-numbers {
            padding: 1rem 0.5rem;
            background: var(--bg-surface);
            color: var(--text-tertiary);
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            text-align: right;
            user-select: none;
            border-right: 1px solid var(--border-primary);
        }
        .line-number {
            display: block;
            height: 1.6em;
        }
        .line-number.active {
            color: var(--accent-cyan);
            background: rgba(0, 229, 255, 0.1);
            border-left: 2px solid var(--accent-cyan);
            margin-left: -0.5rem;
            padding-left: calc(0.5rem - 2px);
        }

        
        /* Editor Overlays & Breakpoints */
        .line-number { cursor: pointer; position: relative; }
        .line-number:hover { color: var(--accent-cyan); background: rgba(0, 229, 255, 0.05); }
        .line-number.breakpoint { color: var(--accent-red); font-weight: bold; }
        .line-number.breakpoint::before { content: '●'; position: absolute; left: -2px; color: var(--accent-red); font-size: 0.75rem; }
        
        .editor-container { position: relative; flex: 1; overflow: hidden; background: var(--bg-base); }
        #code-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 1rem; margin: 0; border: none; outline: none; background: transparent; color: transparent; caret-color: var(--text-primary); font-family: var(--font-mono); font-size: 14px; line-height: 1.6; resize: none; white-space: pre; overflow: auto; z-index: 2; }
        .syntax-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 1rem; margin: 0; border: none; background: transparent; color: var(--text-primary); font-family: var(--font-mono); font-size: 14px; line-height: 1.6; white-space: pre; overflow: hidden; pointer-events: none; z-index: 1; }
        
        /* Syntax Colors */
        .syn-keyword { color: #ff79c6; }
        .syn-string { color: #f1fa8c; }
        .syn-number { color: #bd93f9; }
        .syn-comment { color: #6272a4; font-style: italic; }
        .syn-func { color: #50fa7b; }
        
        /* Utility Buttons */
        .header-actions { display: flex; gap: 0.5rem; }
        .btn-mini { padding: 0.2rem 0.5rem; font-size: 0.7rem; background: var(--bg-elevated); border: 1px solid var(--border-primary); color: var(--text-secondary); border-radius: 4px; cursor: pointer; }
        .btn-mini:hover { color: var(--text-primary); background: #3a3a4d; }
    

        /* Code Active Line Highlight (Overlay) */
        .editor-highlight {
            position: absolute;
            left: 0;
            right: 0;
            height: 1.6em;
            background: rgba(0, 229, 255, 0.05);
            pointer-events: none;
            display: none;
            z-index: 1;
        }

        .controls {
            padding: 1rem;
            background: var(--bg-surface);
            border-top: 1px solid var(--border-primary);
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary { background: var(--accent-cyan); color: #000; }
        .btn-primary:hover { background: #33eeff; transform: translateY(-1px); }
        .btn-secondary { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border-primary); }
        .btn-secondary:hover { background: #3a3a4d; }
        .btn-icon { padding: 0.5rem; background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border-primary); border-radius: 6px; cursor: pointer; }
        .btn-icon:hover { background: #3a3a4d; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        select.btn-secondary { appearance: none; padding-right: 2rem; background: var(--bg-elevated) url('data:image/svg+xml;utf8,<svg fill="%23fff" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>') no-repeat right 0.5rem center; }

        /* Right Panel - Dashboard */
        .trace-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg-base); min-width: 300px; position: relative; }
        .dashboard-layout { display: grid; grid-template-rows: auto 1fr auto; height: 100%; overflow: hidden; }
        .dashboard-header { padding: 1rem; background: var(--bg-surface); border-bottom: 1px solid var(--border-primary); display: flex; justify-content: space-between; align-items: center; }
        .step-counter { font-size: 0.85rem; color: var(--text-tertiary); font-weight: 600; font-family: var(--font-mono); }
        .step-action { font-size: 1rem; color: var(--text-primary); font-weight: 600; }
        .step-note { font-size: 0.85rem; color: var(--accent-yellow); font-style: italic; margin-top: 0.25rem; }
        
        .dashboard-body { display: grid; grid-template-columns: 1fr 1fr; overflow-y: auto; gap: 1px; background: var(--border-primary); }
        @media (max-width: 1024px) { .dashboard-body { grid-template-columns: 1fr; grid-template-rows: auto auto; } }
        
        .dashboard-section { background: var(--bg-base); display: flex; flex-direction: column; }
        .section-title { padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; background: var(--bg-surface); border-bottom: 1px solid var(--border-primary); }
        .section-content { padding: 1rem; flex: 1; overflow-y: auto; }
        
        /* Variables Table */
        .var-table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 0.85rem; }
        .var-table th { text-align: left; padding: 0.5rem; color: var(--text-tertiary); border-bottom: 1px solid var(--border-primary); font-weight: normal; font-size: 0.75rem; }
        .var-table td { padding: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .var-table tr.changed td { background: rgba(0, 230, 118, 0.1); color: var(--accent-green); }
        .var-name { color: var(--text-secondary); }
        .var-val { color: var(--text-primary); }
        
        /* Arrays Visualizer */
        .array-container { margin-bottom: 1.5rem; }
        .array-title { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .array-blocks { display: flex; flex-wrap: wrap; gap: 4px; }
        .array-block { background: var(--bg-elevated); border: 1px solid var(--border-primary); min-width: 2.5rem; height: 2.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-radius: 4px; }
        .array-block.changed { border-color: var(--accent-green); background: rgba(0, 230, 118, 0.1); color: var(--accent-green); box-shadow: 0 0 10px rgba(0,230,118,0.2); }
        .array-val { font-family: var(--font-mono); font-size: 0.9rem; font-weight: 600; }
        .array-idx { position: absolute; bottom: -1.2rem; font-size: 0.65rem; color: var(--text-tertiary); font-family: var(--font-mono); }
        
        .array-2d-row { display: flex; gap: 4px; margin-bottom: 4px; }
        .array-2d-row-label { font-size: 0.65rem; color: var(--text-tertiary); font-family: var(--font-mono); display: flex; align-items: center; justify-content: center; width: 1rem; margin-right: 0.25rem; }
        
        /* Console Output */
        .console-output { background: #0a0a0d; font-family: var(--font-mono); font-size: 0.85rem; color: #82aaff; padding: 1rem; height: 100%; white-space: pre-wrap; overflow-y: auto; }
        
        /* Call Stack Bar */
        .call-stack-bar {
            background: var(--bg-surface);
            border-top: 1px solid var(--border-primary);
            padding: 0.75rem 1rem;
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            align-items: center;
        }
        .call-stack-label {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-right: 0.5rem;
        }
        .stack-frame {
            background: var(--bg-elevated);
            border: 1px solid var(--border-primary);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .stack-frame:last-child {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            background: rgba(0, 229, 255, 0.1);
        }

        /* Progress & Status */
        .progress-container {
            height: 2px;
            background: var(--border-primary);
            width: 100%;
        }
        .progress-bar {
            height: 100%;
            background: var(--accent-cyan);
            width: 0%;
            transition: width 0.3s;
        }
        .status-bar {
            background: var(--bg-base);
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-top: 1px solid var(--border-primary);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-tertiary); }
        .status-dot.running { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .status-dot.error { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); }

        @media (max-width: 768px) {
            .visualizer-container { flex-direction: column; }
            .editor-panel, .trace-panel { min-height: 50vh; }
        }
    
        /* Timeline Scrubber */
        .timeline-container { padding: 0.75rem 1rem; background: var(--bg-surface); border-top: 1px solid var(--border-primary); display: flex; align-items: center; gap: 1rem; }
        .timeline-slider { flex: 1; -webkit-appearance: none; background: transparent; }
        .timeline-slider::-webkit-slider-runnable-track { width: 100%; height: 4px; background: var(--border-primary); border-radius: 2px; }
        .timeline-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--accent-cyan); cursor: pointer; margin-top: -6px; box-shadow: 0 0 10px rgba(0,229,255,0.4); }
        .timeline-slider:disabled { opacity: 0.3; cursor: not-allowed; }
    
    </style>
</head>

<script>
/* ============================================================
   EXAMPLES
   ============================================================ */
const EXAMPLES = {
    python: `def factorial(n):
    if n <= 1:
        return 1
    return n * factorial(n - 1)

print("Starting calculation...")
result = factorial(4)
print("Result is:", result)
`,
    cpp: `int factorial(int n) {
    if (n <= 1) {
        return 1;
    }
    return n * factorial(n - 1);
}

int main() {
    cout << "Starting calculation..." << endl;
    int result = factorial(4);
    cout << "Result is: " << result << endl;
    return 0;
}`,
    java: `public class Main {
    public static int factorial(int n) {
        if (n <= 1) {
            return 1;
        }
        return n * factorial(n - 1);
    }

    public static void main(String[] args) {
        System.out.println("Starting calculation...");
        int result = factorial(4);
        System.out.println("Result is: " + result);
    }
}`
};

/* ============================================================
   UI & EDITOR LOGIC
   ============================================================ */
const editor = document.getElementById('code-input');
const lineNumbers = document.getElementById('line-numbers');
const editorHighlight = document.getElementById('editor-highlight');
const langTabs = document.querySelectorAll('.lang-tab');
let currentLang = 'python';

function updateLineNumbers() {
    const lines = editor.value.split('\n').length;
    lineNumbers.innerHTML = Array.from({length: lines}, (_, i) => {
        const ln = i + 1;
        const bpClass = activeBreakpoints.has(ln) ? ' breakpoint' : '';
        return `<div class="line-number${bpClass}" id="ln-${ln}">${ln}</div>`;
    }).join('');
    highlightSyntax();
}

editor.addEventListener('input', updateLineNumbers);
editor.addEventListener('scroll', () => {
    lineNumbers.scrollTop = editor.scrollTop;
    editorHighlight.style.top = `calc(${editorHighlight.dataset.top || 0}px - ${editor.scrollTop}px)`;
});

function highlightLine(lineNum) {
    document.querySelectorAll('.line-number').forEach(el => el.classList.remove('active'));
    if (lineNum > 0) {
        const el = document.getElementById(`ln-${lineNum}`);
        if (el) el.classList.add('active');
        
        // Calculate offset for highlight overlay (1rem padding top + line height)
        const lineHeight = 1.6 * 14; // 1.6 line-height * 14px font-size
        const topPx = 16 + ((lineNum - 1) * lineHeight);
        editorHighlight.dataset.top = topPx;
        editorHighlight.style.top = `calc(${topPx}px - ${editor.scrollTop}px)`;
        editorHighlight.style.display = 'block';
    } else {
        editorHighlight.style.display = 'none';
    }
}

langTabs.forEach(tab => {
    tab.addEventListener('click', () => {
        langTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentLang = tab.dataset.lang;
        editor.value = EXAMPLES[currentLang];
        updateLineNumbers();
        stopAnimation();
        document.getElementById('trace-content').innerHTML = '<div style="color: var(--text-tertiary); text-align: center; margin-top: 2rem;">Ready — paste code and click Run Trace</div>';
        document.getElementById('call-stack').innerHTML = '<span class="call-stack-label">Call Stack</span>';
        setStatus('idle', 'Idle');
    });
});

document.getElementById('btn-example').addEventListener('click', () => {
    editor.value = EXAMPLES[currentLang];
    updateLineNumbers();
});

document.getElementById('btn-clear').addEventListener('click', () => {
    editor.value = '';
    updateLineNumbers();
    stopAnimation();
    document.getElementById('trace-content').innerHTML = '<div style="color: var(--text-tertiary); text-align: center; margin-top: 2rem;">Ready — paste code and click Run Trace</div>';
    document.getElementById('call-stack').innerHTML = '<span class="call-stack-label">Call Stack</span>';
});

/* ============================================================
   EVALUATOR UTILITY
   ============================================================ */

function deepClone(obj) {
    if (obj === null || typeof obj !== 'object') return obj;
    if (Array.isArray(obj)) return obj.map(deepClone);
    const cloned = {};
    for (let key in obj) cloned[key] = deepClone(obj[key]);
    return cloned;
}

function evalExpr(expr, scopeVars) {
    if (!expr) return undefined;
    let scopeStr = "";
    for (let k in scopeVars) {
        scopeStr += `let ${k} = ${JSON.stringify(scopeVars[k])};\n`;
    }
    let cleanExpr = expr.replace(/\band\b/g, '&&')
                        .replace(/\bor\b/g, '||')
                        .replace(/\bnot\b/g, '!')
                        .replace(/\bTrue\b/g, 'true')
                        .replace(/\bFalse\b/g, 'false')
                        .replace(/\bNone\b/g, 'null');
    try {
        let func = new Function(scopeStr + "return (" + cleanExpr + ");");
        return func();
    } catch (e) {
        return expr;
    }
}

/* ============================================================
   INTERPRETER CORE
   ============================================================ */
// Returns array of step objects: { line, desc, vars: [{name, value, changed}], output, note, stack }

function tracePython(code) {
    const lines = code.split('\n');
    let steps = [];
    let funcs = {};
    let callStack = []; // [{name, locals: {}, line}]
    let globalScope = {};
    
    // 1. First pass: Register functions
    let i = 0;
    while (i < lines.length) {
        let line = lines[i];
        let m = line.match(/^def\s+([a-zA-Z_]\w*)\s*\((.*?)\):/);
        if (m) {
            let funcName = m[1];
            let params = m[2].split(',').map(s=>s.trim()).filter(s=>s);
            let start = i + 1;
            let end = start;
            while (end < lines.length && (lines[end].trim() === '' || lines[end].startsWith(' ') || lines[end].startsWith('\t'))) {
                end++;
            }
            funcs[funcName] = { params, bodyRange: [start, end-1] };
            i = end - 1;
        }
        i++;
    }

    // 2. Main execution context setup
    callStack.push({name: "main()", locals: globalScope, line: 0});
    let maxSteps = 500;
    
    function getScope() { return callStack[callStack.length - 1].locals; }
    function pushStep(lineNum, desc, output="", note="") {
        let currentScope = getScope();
        let varsObj = [];
        let prevScope = steps.length > 0 ? {} : null;
        if (steps.length > 0) {
            steps[steps.length-1].vars.forEach(v => prevScope[v.name] = v.value);
        }
        for (let k in currentScope) {
            let rawVal = deepClone(currentScope[k]);
            let strVal = typeof rawVal === 'object' ? JSON.stringify(rawVal) : String(rawVal);
            let prevStr = prevScope ? (typeof prevScope[k] === 'object' ? JSON.stringify(prevScope[k]) : String(prevScope[k])) : null;
            let changed = prevScope ? (strVal !== prevStr) : true;
            varsObj.push({name: k, rawValue: rawVal, stringValue: strVal, changed});
        }
        steps.push({
            line: lineNum + 1,
            desc,
            vars: varsObj,
            output,
            note,
            stack: callStack.map(f => f.name)
        });
    }

    // 3. Execution Engine
    function executeBlock(startIdx, endIdx, indentationContext) {
        let idx = startIdx;
        let blockOutput = "";
        
        while (idx <= endIdx && steps.length < maxSteps) {
            let line = lines[idx];
            let trimmed = line.trim();
            if (!trimmed || trimmed.startsWith('#')) { idx++; continue; }
            
            // Check indentation strictly to jump out of blocks
            let indent = line.length - line.trimLeft().length;
            if (indent < indentationContext) {
                break; // end of block
            }
            
            let scope = getScope();
            
            // Return
            let mRet = trimmed.match(/^return\s+(.*)$/);
            if (mRet) {
                let val = evalExpr(mRet[1], scope);
                pushStep(idx, `Return ${val}`);
                return { action: 'return', value: val };
            }
            
            // Print
            let mPrint = trimmed.match(/^print\((.*)\)$/);
            if (mPrint) {
                let args = mPrint[1].split(',').map(s=>s.trim());
                let vals = args.map(a => {
                    let v = evalExpr(a, scope);
                    return (typeof v === 'string') ? v.replace(/(^"|"$|^'|'$)/g, '') : v;
                });
                let outStr = vals.join(" ");
                pushStep(idx, `Print output`, outStr);
                idx++; continue;
            }
            
            // Assignment (x = 5)
            let mAssign = trimmed.match(/^([a-zA-Z_]\w*)\s*=\s*(.*)$/);
            if (mAssign && !trimmed.includes('==')) {
                let varName = mAssign[1];
                let expr = mAssign[2];
                // Check if it's a function call
                let mFunc = expr.match(/^([a-zA-Z_]\w*)\((.*)\)$/);
                if (mFunc && funcs[mFunc[1]]) {
                    pushStep(idx, `Call ${mFunc[1]}()`);
                    let retVal = callFunction(mFunc[1], mFunc[2], scope, idx);
                    scope[varName] = retVal;
                    pushStep(idx, `Assign result to ${varName}`);
                } else {
                    let val = evalExpr(expr, scope);
                    scope[varName] = val;
                    pushStep(idx, `Assign ${varName} = ${val}`);
                }
                idx++; continue;
            }
            
            // Augmented Assignment
            let mAug = trimmed.match(/^([a-zA-Z_]\w*)\s*(\+|-|\*|\/)=\s*(.*)$/);
            if (mAug) {
                let vName = mAug[1], op = mAug[2], expr = mAug[3];
                let val = evalExpr(`${scope[vName]} ${op} ${expr}`, scope);
                scope[vName] = val;
                pushStep(idx, `Update ${vName} ${op}= ${expr}`);
                idx++; continue;
            }
            
            // If condition
            let mIf = trimmed.match(/^(?:if|elif)\s+(.*):$/);
            if (mIf) {
                let cond = mIf[1];
                let condVal = evalExpr(cond, scope);
                pushStep(idx, `Evaluate condition: ${condVal}`);
                if (condVal) {
                    let bRes = executeBlock(idx + 1, endIdx, indent + 4);
                    if (bRes && bRes.action === 'return') return bRes;
                    // Skip following elif/else
                    idx++; // move past if
                    while (idx <= endIdx && (lines[idx].trim().startsWith('elif') || lines[idx].trim().startsWith('else'))) {
                        let skipEnd = idx + 1;
                        while(skipEnd <= endIdx && lines[skipEnd].length - lines[skipEnd].trimLeft().length > indent) skipEnd++;
                        idx = skipEnd;
                    }
                    continue;
                } else {
                    // Skip block
                    idx++;
                    while (idx <= endIdx && lines[idx].length - lines[idx].trimLeft().length > indent) idx++;
                    continue;
                }
            }
            
            // Else
            if (trimmed.startsWith('else:')) {
                pushStep(idx, `Enter else branch`);
                let bRes = executeBlock(idx + 1, endIdx, indent + 4);
                if (bRes && bRes.action === 'return') return bRes;
                idx++;
                while (idx <= endIdx && lines[idx].length - lines[idx].trimLeft().length > indent) idx++;
                continue;
            }
            
            // While
            let mWhile = trimmed.match(/^while\s+(.*):$/);
            if (mWhile) {
                let cond = mWhile[1];
                let loopCount = 0;
                while (evalExpr(cond, getScope()) && loopCount < 50) {
                    pushStep(idx, `While loop: True`);
                    let bRes = executeBlock(idx + 1, endIdx, indent + 4);
                    if (bRes && bRes.action === 'return') return bRes;
                    loopCount++;
                }
                pushStep(idx, `While loop end`);
                idx++;
                while (idx <= endIdx && lines[idx].length - lines[idx].trimLeft().length > indent) idx++;
                continue;
            }
            
            // Standalone function call
            let mFuncAlone = trimmed.match(/^([a-zA-Z_]\w*)\((.*)\)$/);
            if (mFuncAlone && funcs[mFuncAlone[1]]) {
                pushStep(idx, `Call ${mFuncAlone[1]}()`);
                callFunction(mFuncAlone[1], mFuncAlone[2], scope, idx);
            }
            
            idx++;
        }
        return { action: 'done' };
    }
    
    function callFunction(funcName, argStr, callerScope, callLineIdx) {
        let fDef = funcs[funcName];
        let argVals = argStr.split(',').map(s=>evalExpr(s.trim(), callerScope));
        let locals = {};
        fDef.params.forEach((p, i) => { locals[p] = argVals[i]; });
        
        callStack.push({name: `${funcName}()`, locals: locals, line: fDef.bodyRange[0]});
        
        let res = executeBlock(fDef.bodyRange[0], fDef.bodyRange[1], 4); // assuming 4 spaces intent inside func
        
        callStack.pop();
        return res && res.action === 'return' ? res.value : undefined;
    }

    // Start execution from global level
    executeBlock(0, lines.length - 1, 0);
    return steps;
}

// C++ Tracer
function traceCpp(code) {
    const lines = code.split('\n');
    let steps = [];
    let funcs = {};
    let callStack = [];
    
    // Parse functions
    let currentFunc = null;
    let braceCount = 0;
    
    for (let i=0; i<lines.length; i++) {
        let line = lines[i].trim();
        let mFunc = line.match(/^(?:int|void|double|float|bool|string|auto)\s+([a-zA-Z_]\w*)\s*\((.*)\)\s*\{?/);
        if (mFunc && !currentFunc) {
            let funcName = mFunc[1];
            let params = mFunc[2].split(',').map(s=>s.trim().split(' ').pop()).filter(s=>s); // extract param names
            currentFunc = { name: funcName, params: params, start: i + 1 };
            funcs[funcName] = currentFunc;
            if (line.includes('{')) braceCount = 1;
        } else if (currentFunc) {
            braceCount += (line.match(/\{/g) || []).length;
            braceCount -= (line.match(/\}/g) || []).length;
            if (braceCount === 0) {
                currentFunc.end = i - 1;
                currentFunc = null;
            }
        }
    }
    
    function getScope() { return callStack[callStack.length - 1].locals; }
    function pushStep(lineNum, desc, output="") {
        let currentScope = getScope();
        let varsObj = [];
        let prevScope = steps.length > 0 ? {} : null;
        if (steps.length > 0) steps[steps.length-1].vars.forEach(v => prevScope[v.name] = v.value);
        
        for (let k in currentScope) {
            let rawVal = deepClone(currentScope[k]);
            let strVal = typeof rawVal === 'object' ? JSON.stringify(rawVal) : String(rawVal);
            let prevStr = prevScope ? (typeof prevScope[k] === 'object' ? JSON.stringify(prevScope[k]) : String(prevScope[k])) : null;
            let changed = prevScope ? (strVal !== prevStr) : true;
            varsObj.push({name: k, rawValue: rawVal, stringValue: strVal, changed});
        }
        steps.push({
            line: lineNum + 1, desc, vars: varsObj, output, note: "",
            stack: callStack.map(f => f.name)
        });
    }

    function executeBlock(startIdx, endIdx) {
        let idx = startIdx;
        while (idx <= endIdx && steps.length < 500) {
            let line = lines[idx];
            let trimmed = line.trim();
            if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('using')) { idx++; continue; }
            if (trimmed === '{' || trimmed === '}') { idx++; continue; }
            
            let scope = getScope();
            
            // Return
            let mRet = trimmed.match(/^return\s+(.*);/);
            if (mRet) {
                let val = evalExpr(mRet[1], scope);
                pushStep(idx, `Return ${val}`);
                return { action: 'return', value: val };
            }
            
            // cout
            if (trimmed.startsWith('cout')) {
                let outStr = trimmed.replace('cout', '').replace(/;/g, '').split('<<')
                    .map(s => s.trim())
                    .filter(s => s && s !== 'endl')
                    .map(s => {
                        if(s.startsWith('"') && s.endsWith('"')) return s.slice(1,-1);
                        return evalExpr(s, scope);
                    }).join('');
                pushStep(idx, `Output stream`, outStr);
                idx++; continue;
            }
            
            // Declaration & Assignment (int x = 5;)
            let mDecl = trimmed.match(/^(?:int|double|float|bool|string|auto)\s+([a-zA-Z_]\w*)\s*=\s*(.*);/);
            if (mDecl) {
                let varName = mDecl[1], expr = mDecl[2];
                handleAssign(idx, varName, expr, scope);
                idx++; continue;
            }
            
            // Assignment (x = 5;)
            let mAssign = trimmed.match(/^([a-zA-Z_]\w*)\s*=\s*(.*);/);
            if (mAssign && !trimmed.startsWith('int') && !trimmed.startsWith('if') && !trimmed.startsWith('for') && !trimmed.startsWith('while')) {
                handleAssign(idx, mAssign[1], mAssign[2], scope);
                idx++; continue;
            }

            // If
            let mIf = trimmed.match(/^if\s*\((.*)\)\s*\{?/);
            if (mIf) {
                let condVal = evalExpr(mIf[1], scope);
                pushStep(idx, `Condition: ${condVal}`);
                
                // Find block bounds
                let bStart = idx + 1, bEnd = idx;
                let bc = trimmed.includes('{') ? 1 : 0;
                if(bc===0 && lines[idx+1].includes('{')) { bStart++; bEnd++; bc=1; }
                
                while(bc > 0 && bEnd < endIdx) {
                    bEnd++;
                    bc += (lines[bEnd].match(/\{/g)||[]).length - (lines[bEnd].match(/\}/g)||[]).length;
                }
                
                if (condVal) {
                    let r = executeBlock(bStart, bEnd - 1);
                    if (r && r.action === 'return') return r;
                }
                idx = bEnd + 1;
                continue;
            }
            
            idx++;
        }
        return { action: 'done' };
    }
    
    function handleAssign(idx, varName, expr, scope) {
        let mFunc = expr.match(/^([a-zA-Z_]\w*)\((.*)\)$/);
        if (mFunc && funcs[mFunc[1]]) {
            pushStep(idx, `Call ${mFunc[1]}()`);
            let retVal = callFunction(mFunc[1], mFunc[2], scope, idx);
            scope[varName] = retVal;
            pushStep(idx, `Assign ${varName}`);
        } else {
            scope[varName] = evalExpr(expr, scope);
            pushStep(idx, `Assign ${varName}`);
        }
    }

    function callFunction(funcName, argStr, callerScope, lineIdx) {
        let fDef = funcs[funcName];
        let argVals = argStr ? argStr.split(',').map(s=>evalExpr(s.trim(), callerScope)) : [];
        let locals = {};
        fDef.params.forEach((p, i) => { locals[p] = argVals[i]; });
        
        callStack.push({name: `${funcName}()`, locals: locals, line: fDef.start});
        let res = executeBlock(fDef.start, fDef.end);
        callStack.pop();
        return res && res.action === 'return' ? res.value : undefined;
    }

    // Start at main
    if (funcs['main']) {
        callStack.push({name: "main()", locals: {}, line: funcs['main'].start});
        executeBlock(funcs['main'].start, funcs['main'].end);
    }
    
    return steps;
}

// Java Tracer - Normalizes Java syntax to C++ and uses C++ tracer
function traceJava(code) {
    let normalized = code
        .replace(/public\s+class\s+\w+\s*\{/g, '') // remove class wrap
        .replace(/public\s+static\s+void\s+main\(String\\[\\]\s+args\)/g, 'int main()')
        .replace(/public\s+static\s+/g, '')
        .replace(/System\\.out\\.println\((.*)\)/g, 'cout << $1 << endl')
        .replace(/System\\.out\\.print\((.*)\)/g, 'cout << $1')
        .replace(/boolean\b/g, 'bool')
        .replace(/String\b/g, 'string');
    // removing last closing brace of class
    let lines = normalized.split('\n');
    for (let i = lines.length - 1; i >= 0; i--) {
        if (lines[i].trim() === '}') { lines[i] = ''; break; }
    }
    return traceCpp(lines.join('\n'));
}

/* ============================================================
   ANIMATION & STATE LOGIC
   ============================================================ */
let currentSteps = [];
let animTimer = null;
let currentStepIdx = 0;
let speed = 420;

const runBtn = document.getElementById('btn-run');
const speedSelect = document.getElementById('speed-select');
const traceContent = document.getElementById('trace-content');
const callStackBar = document.getElementById('call-stack');
const progressBar = document.getElementById('progress-bar');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');

speedSelect.addEventListener('change', (e) => speed = parseInt(e.target.value));

function setStatus(state, msg) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = msg;
}

runBtn.addEventListener('click', startTrace);
document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') startTrace();
});

function startTrace() {
    const code = editor.value;
    if (!code.trim()) return;
    
    stopAnimation();
    traceContent.innerHTML = '';
    setStatus('running', 'Parsing and analyzing code...');
    
    try {
        if (currentLang === 'python') currentSteps = tracePython(code);
        else if (currentLang === 'cpp') currentSteps = traceCpp(code);
        else if (currentLang === 'java') currentSteps = traceJava(code);
        
        if (currentSteps.length === 0) {
            setStatus('error', 'Execution yielded no steps. Check syntax.');
            return;
        }
        
        currentStepIdx = 0;
        setStatus('running', 'Executing trace...');
        
        if (speed === 0) {
            // Instant
            while (currentStepIdx < currentSteps.length) renderStep(currentStepIdx++);
            finishTrace();
        } else {
            btnRunBp.disabled = false;
            animTimer = setInterval(stepForward, speed);
        }
    } catch (e) {
        setStatus('error', 'Error parsing code: ' + e.message);
        console.error(e);
    }
}

function stopAnimation() {
    if (animTimer) clearInterval(animTimer);
    animTimer = null;
    btnPrev.disabled = currentStepIdx === 0;
    btnRunBp.disabled = currentStepIdx >= currentSteps.length - 1;
    btnNext.disabled = currentStepIdx >= currentSteps.length - 1;
}

function finishTrace() {
    stopAnimation();
    setStatus('', 'Execution completed.');
    btnPrev.disabled = false;
    btnNext.disabled = true;
    btnRunBp.disabled = false;
    highlightLine(0);
}

function stepForward() {
    if (currentStepIdx >= currentSteps.length) {
        finishTrace();
        return;
    }
    renderStep(currentStepIdx);
    currentStepIdx++;
    progressBar.style.width = `${(currentStepIdx / currentSteps.length) * 100}%`;
}

const dashboardLayout = document.getElementById('dashboard-layout');
const welcomeMsg = document.getElementById('welcome-message');
const stepCounter = document.getElementById('step-counter');
const stepAction = document.getElementById('step-action');
const stepNote = document.getElementById('step-note');
const memoryContent = document.getElementById('memory-content');
const consoleOutput = document.getElementById('console-output');
const timelineSlider = document.getElementById('timeline-slider');

timelineSlider.addEventListener('input', (e) => {
    let val = parseInt(e.target.value);
    if (val < currentSteps.length) {
        currentStepIdx = val;
        renderStep(currentStepIdx);
    }
});

function renderStep(idx) {
    const step = currentSteps[idx];
    
    welcomeMsg.style.display = 'none';
    dashboardLayout.style.display = 'grid';
    
    stepCounter.textContent = `Step ${idx + 1} / ${currentSteps.length}`;
    stepAction.textContent = `Line ${step.line}: ${step.desc}`;
    stepNote.textContent = step.note || '';
    
    // Process Variables
    let primitivesHtml = `<table class="var-table"><tr><th>Variable</th><th>Value</th></tr>`;
    let arraysHtml = '';
    
    let hasPrimitives = false;
    
    step.vars.forEach(v => {
        if (v.rawValue !== null && typeof v.rawValue === 'object' && Array.isArray(v.rawValue)) {
            // It's an Array
            arraysHtml += `<div class="array-container">
                <div class="array-title">${v.name} ${v.changed ? '<span style="color:var(--accent-green)">•</span>' : ''}</div>`;
            
            if (v.rawValue.length > 0 && Array.isArray(v.rawValue[0])) {
                // 2D Array
                v.rawValue.forEach((row, rowIdx) => {
                    arraysHtml += `<div class="array-2d-row">
                        <div class="array-2d-row-label">${rowIdx}</div>`;
                    row.forEach((cell, colIdx) => {
                        // Rough logic to check if a specific cell changed (we just mark the whole array if changed for now, or we could diff deeply)
                        arraysHtml += `<div class="array-block ${v.changed ? 'changed' : ''}">
                            <div class="array-val">${cell}</div>
                        </div>`;
                    });
                    arraysHtml += `</div>`;
                });
            } else {
                // 1D Array
                arraysHtml += `<div class="array-blocks">`;
                v.rawValue.forEach((cell, i) => {
                    arraysHtml += `<div class="array-block ${v.changed ? 'changed' : ''}">
                        <div class="array-val">${cell}</div>
                        <div class="array-idx">${i}</div>
                    </div>`;
                });
                arraysHtml += `</div>`;
            }
            arraysHtml += `</div>`;
        } else {
            // Primitive
            hasPrimitives = true;
            primitivesHtml += `<tr class="${v.changed ? 'changed' : ''}">
                <td class="var-name">${v.name}</td>
                <td class="var-val">${v.stringValue}</td>
            </tr>`;
        }
    });
    
    primitivesHtml += `</table>`;
    if (!hasPrimitives) primitivesHtml = '';
    
    memoryContent.innerHTML = primitivesHtml + (arraysHtml ? '<div style="height:1rem"></div>' + arraysHtml : '');
    
    consoleOutput.textContent = step.output || ' ';
    
    highlightLine(step.line);
    
    callStackBar.innerHTML = '<span class="call-stack-label">Call Stack</span>' + 
        step.stack.map(frame => `<div class="stack-frame">${frame}</div>`).join(' → ');
        
    // Update slider
    timelineSlider.value = idx;
    progressBar.style.width = `${((idx + 1) / currentSteps.length) * 100}%`;
}

btnPrev.addEventListener('click', () => {
    if (currentStepIdx > 1) {
        currentStepIdx--;
        document.getElementById(`step-${currentStepIdx}`).remove();
        const prevCard = document.getElementById(`step-${currentStepIdx - 1}`);
        if (prevCard) {
            prevCard.classList.add('current');
            prevCard.scrollIntoView({behavior: 'smooth', block: 'end'});
            highlightLine(currentSteps[currentStepIdx - 1].line);
        }
        progressBar.style.width = `${(currentStepIdx / currentSteps.length) * 100}%`;
    }
    btnNext.disabled = false;
    if (currentStepIdx <= 1) btnPrev.disabled = true;
});

btnNext.addEventListener('click', () => {
    if (currentStepIdx < currentSteps.length) {
        renderStep(currentStepIdx);
        currentStepIdx++;
        progressBar.style.width = `${(currentStepIdx / currentSteps.length) * 100}%`;
    }
    btnPrev.disabled = false;
    if (currentStepIdx >= currentSteps.length) btnNext.disabled = true;
});


/* Syntax Highlighting */
const syntaxOverlay = document.getElementById('syntax-overlay');
function highlightSyntax() {
    let text = editor.value;
    text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    
    // Simple Regex Highlighter
    text = text.replace(/#.*$/gm, '<span class="syn-comment">$&</span>'); // Python comments
    text = text.replace(/\/\/.*$/gm, '<span class="syn-comment">$&</span>'); // C++/Java comments
    text = text.replace(/(['"].*?['"])/g, '<span class="syn-string">$1</span>'); // Strings
    text = text.replace(/\b(\d+)\b/g, '<span class="syn-number">$1</span>'); // Numbers
    
    const keywords = ['def', 'if', 'else', 'elif', 'return', 'while', 'for', 'class', 'public', 'static', 'void', 'int', 'bool', 'string', 'double', 'float', 'auto', 'True', 'False', 'None', 'true', 'false'];
    const kwRegex = new RegExp(`\\b(${keywords.join('|')})\\b`, 'g');
    text = text.replace(kwRegex, '<span class="syn-keyword">$1</span>');
    
    text = text.replace(/\b([a-zA-Z_]\w*)\s*(?=\()/g, '<span class="syn-func">$1</span>'); // Functions
    
    syntaxOverlay.innerHTML = text + '<br>';
}
editor.addEventListener('input', highlightSyntax);
editor.addEventListener('scroll', () => {
    syntaxOverlay.scrollTop = editor.scrollTop;
    syntaxOverlay.scrollLeft = editor.scrollLeft;
});

/* Breakpoints */
const activeBreakpoints = new Set();
lineNumbers.addEventListener('click', (e) => {
    if (e.target.classList.contains('line-number')) {
        const ln = parseInt(e.target.textContent);
        if (activeBreakpoints.has(ln)) {
            activeBreakpoints.delete(ln);
            e.target.classList.remove('breakpoint');
        } else {
            activeBreakpoints.add(ln);
            e.target.classList.add('breakpoint');
        }
    }
});

/* Copy & Download */
document.getElementById('btn-copy').addEventListener('click', () => {
    navigator.clipboard.writeText(editor.value);
    setStatus('running', 'Code copied to clipboard!');
    setTimeout(() => setStatus('idle', 'Idle'), 2000);
});

document.getElementById('btn-download').addEventListener('click', () => {
    const ext = currentLang === 'python' ? 'py' : (currentLang === 'cpp' ? 'cpp' : 'java');
    const blob = new Blob([editor.value], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `solution.${ext}`;
    a.click();
});

/* Run to Breakpoint Logic */
const btnRunBp = document.getElementById('btn-run-bp');
btnRunBp.addEventListener('click', () => {
    if (currentSteps.length === 0) return;
    let targetIdx = currentStepIdx + 1;
    while (targetIdx < currentSteps.length) {
        if (activeBreakpoints.has(currentSteps[targetIdx].line)) {
            currentStepIdx = targetIdx;
            renderStep(currentStepIdx);
            return;
        }
        targetIdx++;
    }
    // If no more breakpoints, go to end
    currentStepIdx = currentSteps.length - 1;
    renderStep(currentStepIdx);
});

editor.value = EXAMPLES['python'];
updateLineNumbers();
highlightLine(0);
