<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Visualizer / Dry Run</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CodeMirror 5 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.min.js"></script>
    
    <style>
        :root {
            --bg-base: #06090e;
            --bg-surface: rgba(15, 20, 30, 0.75);
            --bg-elevated: rgba(30, 35, 50, 0.85);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --accent-cyan: #00f0ff;
            --accent-green: #39ff14;
            --accent-purple: #9d4edd;
            --accent-pink: #f72585;
            --accent-yellow: #ffea00;
            --accent-red: #ff1744;
            --border-primary: rgba(255, 255, 255, 0.08);
            --border-active: rgba(0, 240, 255, 0.4);
            --font-mono: 'Fira Code', 'Consolas', 'Monaco', monospace;
            --font-sans: 'Inter', 'Segoe UI', system-ui, sans-serif;
            --glass-blur: blur(12px);
        }

        [data-theme="light"] {
            --bg-base: #f1f5f9;
            --bg-surface: rgba(255, 255, 255, 0.75);
            --bg-elevated: rgba(255, 255, 255, 0.85);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-tertiary: #64748b;
            --accent-cyan: #0ea5e9;
            --accent-green: #16a34a;
            --accent-purple: #7e22ce;
            --accent-pink: #be185d;
            --accent-yellow: #ca8a04;
            --accent-red: #dc2626;
            --border-primary: rgba(0, 0, 0, 0.15);
            --border-active: rgba(14, 165, 233, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-sans);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Navbar Integration Placeholder */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: rgba(15, 15, 19, 0.9);
            border-bottom: 1px solid var(--border-primary);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .navbar__brand { color: var(--text-primary); text-decoration: none; font-weight: 700; font-size: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
        .navbar__nav { display: flex; gap: 1.5rem; align-items: center; }
        .navbar__link { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        .navbar__link:hover, .navbar__link.active { color: var(--accent-cyan); }
        .theme-toggle { background: transparent; border: none; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; transition: all 0.2s; }
        .theme-toggle:hover { background: var(--bg-elevated); color: var(--text-primary); }

        /* Main Layout */
        .visualizer-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 1rem;
            padding: 1rem;
            background: radial-gradient(circle at 50% 0%, #0d121c 0%, var(--bg-base) 100%);
        }

        /* Left Panel - Editor */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-surface);
            backdrop-filter: var(--glass-blur);
            border-radius: 12px;
            border: 1px solid var(--border-primary);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            min-width: 300px;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border-primary);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .lang-tabs { display: flex; gap: 0.5rem; }
        .lang-tab {
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-tertiary);
            transition: all 0.2s;
        }
        .lang-tab.active { background: var(--bg-elevated); color: var(--accent-cyan); }

        .editor-wrapper {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* CodeMirror Overrides */
        .CodeMirror { height: 100%; font-family: var(--font-mono); font-size: 14px; background: transparent !important; color: var(--text-primary) !important; }
        .CodeMirror-gutters { background: transparent !important; border-right: 1px solid var(--border-primary) !important; }
        .CodeMirror-linenumber { color: var(--text-tertiary) !important; }
        .CodeMirror-activeline-background { background: rgba(0, 240, 255, 0.1) !important; }
        .CodeMirror-activeline-gutter { background: rgba(0, 240, 255, 0.1) !important; color: var(--accent-cyan) !important; font-weight: bold; }
        .cm-s-dracula .CodeMirror-cursor { border-left: 2px solid var(--text-primary) !important; }
        .CodeMirror-selected { background: rgba(255, 255, 255, 0.15) !important; }
        .CodeMirror-focused .CodeMirror-selected { background: rgba(255, 255, 255, 0.2) !important; }

        .controls {
            padding: 1rem;
            background: var(--bg-surface);
            border-top: 1px solid var(--border-primary);
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary { background: var(--accent-cyan); color: #000; }
        .btn-primary:hover { background: #33eeff; transform: translateY(-1px); }
        .btn-secondary { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border-primary); }
        .btn-secondary:hover { background: #3a3a4d; }
        .btn-icon { padding: 0.5rem; background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border-primary); border-radius: 6px; cursor: pointer; }
        .btn-icon:hover { background: #3a3a4d; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        select.btn-secondary { appearance: none; padding-right: 2rem; background: var(--bg-elevated) url('data:image/svg+xml;utf8,<svg fill="%23fff" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>') no-repeat right 0.5rem center; }

        /* Right Panel - Dashboard */
        .trace-panel {
            flex: 1; display: flex; flex-direction: column;
            background: var(--bg-surface);
            backdrop-filter: var(--glass-blur);
            border-radius: 12px;
            border: 1px solid var(--border-primary);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            min-width: 300px; position: relative; overflow: hidden;
        }
        .dashboard-layout { display: grid; grid-template-rows: auto 1fr auto; height: 100%; overflow: hidden; }
        .dashboard-header { padding: 1rem; background: rgba(0, 0, 0, 0.2); border-bottom: 1px solid var(--border-primary); display: flex; justify-content: space-between; align-items: center; }
        .step-counter { font-size: 0.85rem; color: var(--text-tertiary); font-weight: 600; font-family: var(--font-mono); }
        .step-action { font-size: 1rem; color: var(--accent-cyan); font-weight: 600; text-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }
        .step-note { font-size: 0.85rem; color: var(--accent-yellow); font-style: italic; margin-top: 0.25rem; }
        
        .dashboard-body { display: grid; grid-template-columns: 1fr 1fr; overflow-y: auto; gap: 1px; background: var(--border-primary); }
        @media (max-width: 1024px) { .dashboard-body { grid-template-columns: 1fr; grid-template-rows: auto auto; } }
        
        .dashboard-section { background: transparent; display: flex; flex-direction: column; }
        .section-title { padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; background: rgba(0, 0, 0, 0.2); border-bottom: 1px solid var(--border-primary); }
        .section-content { padding: 1rem; flex: 1; overflow-y: auto; }
        
        /* Node Cards (Variables) */
        .node-container { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem; }
        .node-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-primary);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            min-width: 80px;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes yellowFlash {
            0% { background-color: rgba(202, 138, 4, 0.4); border-color: var(--accent-yellow); box-shadow: 0 0 20px var(--accent-yellow); transform: scale(1.08); }
            100% { background-color: rgba(0, 240, 255, 0.1); border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0, 240, 255, 0.4); transform: scale(1.05); }
        }
        .node-card.changed {
            animation: yellowFlash 0.8s ease forwards;
        }
        .node-name { font-size: 0.7rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; display: flex; justify-content: space-between; }
        .node-type { font-size: 0.6rem; opacity: 0.8; text-transform: lowercase; }
        .node-val { font-family: var(--font-mono); font-size: 1rem; color: var(--text-primary); }
        .node-card.changed .node-val { color: var(--accent-cyan); text-shadow: 0 0 8px rgba(0, 240, 255, 0.5); }
        
        /* Arrays Visualizer */
        .array-container { margin-bottom: 1.5rem; }
        .array-title { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .array-blocks { display: flex; flex-wrap: wrap; gap: 4px; }
        .array-block { background: var(--bg-elevated); border: 1px solid var(--border-primary); min-width: 2.5rem; height: 2.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-radius: 4px; }
        .array-block.changed { border-color: var(--accent-green); background: rgba(0, 230, 118, 0.1); color: var(--accent-green); box-shadow: 0 0 10px rgba(0,230,118,0.2); }
        .array-val { font-family: var(--font-mono); font-size: 0.9rem; font-weight: 600; }
        .array-idx { position: absolute; bottom: -1.2rem; font-size: 0.65rem; color: var(--text-tertiary); font-family: var(--font-mono); }
        
        .array-2d-row { display: flex; gap: 4px; margin-bottom: 4px; }
        .array-2d-row-label { font-size: 0.65rem; color: var(--text-tertiary); font-family: var(--font-mono); display: flex; align-items: center; justify-content: center; width: 1rem; margin-right: 0.25rem; }
        
        /* Console Output */
        .console-output { background: rgba(0, 0, 0, 0.3); font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent-cyan); padding: 1rem; height: 100%; white-space: pre-wrap; overflow-y: auto; }
        
        /* Call Stack Bar */
        .call-stack-bar {
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border-primary);
            padding: 0.75rem 1rem;
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            align-items: center;
        }
        .call-stack-label {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-right: 0.5rem;
        }
        .stack-frame {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-primary);
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .stack-frame:last-child {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
            background: rgba(157, 78, 221, 0.1);
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
            transform: scale(1.05);
        }

        /* Progress & Status */
        .progress-container {
            height: 2px;
            background: var(--border-primary);
            width: 100%;
        }
        .progress-bar {
            height: 100%;
            background: var(--accent-cyan);
            width: 0%;
            transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 15px var(--accent-cyan);
        }
        .status-bar {
            background: var(--bg-base);
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-top: 1px solid var(--border-primary);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-tertiary); }
        .status-dot.running { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .status-dot.error { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); }

        @media (max-width: 768px) {
            .visualizer-container { flex-direction: column; }
            .editor-panel, .trace-panel { min-height: 50vh; }
        }
    
        /* Timeline Scrubber */
        .timeline-container { padding: 0.75rem 1rem; background: rgba(0, 0, 0, 0.2); border-top: 1px solid var(--border-primary); display: flex; align-items: center; gap: 1rem; }
        .timeline-slider { flex: 1; -webkit-appearance: none; background: transparent; }
        .timeline-slider::-webkit-slider-runnable-track { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5); }
        .timeline-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: var(--accent-cyan); cursor: pointer; margin-top: -6px; box-shadow: 0 0 15px var(--accent-cyan), inset 0 0 5px rgba(255,255,255,0.8); transition: transform 0.1s; }
        .timeline-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
        .timeline-slider:disabled { opacity: 0.3; cursor: not-allowed; }
    
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="navbar__brand">
            <span style="color:var(--accent-cyan)">⚡</span> CP-II Lab
        </a>
        <div class="navbar__nav">
            <a href="index.html" class="navbar__link">Home</a>
            <a href="#" class="navbar__link active">🔍 Visualizer</a>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">

    <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>

    <div class="visualizer-container">
        <!-- Editor Panel -->
        <div class="editor-panel">
            <div class="panel-header">
                <div class="lang-tabs" id="lang-tabs">
                    <div class="lang-tab active" data-lang="python">Python</div>

                    <div class="lang-tab" data-lang="java">Java</div>

                    <button class="btn-mini" id="btn-share" title="Copy Shareable Link" aria-label="Share Code">Share</button>

            <div class="editor-wrapper" id="editor-wrapper">

            <div class="input-wrapper" style="height: 120px; border-top: 1px solid var(--border-primary); display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.2);">

        <!-- Trace Panel -->
        <div class="trace-panel">

            <div class="dashboard-layout" id="dashboard-layout" style="display: none;">
                <div class="dashboard-header">

                        <div class="step-counter" id="step-counter">Step 0 / 0</div>

                <div class="dashboard-body">
                    <div class="dashboard-section">
                        <div class="section-title" style="display: flex; justify-content: space-between; align-items: center;">
                            <span>Memory & Variables</span>
                            <label style="display: flex; align-items: center; gap: 4px; text-transform: none; cursor: pointer;">

    <div class="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Idle</span>

<script>
/* ============================================================
   THEME TOGGLE
   ============================================================ */
const themeToggleBtn = document.getElementById('theme-toggle');
const themeIcon = document.getElementById('theme-icon');

function updateThemeIcon(theme) {
    if (theme === 'light') {
        themeIcon.innerHTML = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
    } else {
        themeIcon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
    }
}

const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
updateThemeIcon(savedTheme);

themeToggleBtn.addEventListener('click', () => {
    let current = document.documentElement.getAttribute('data-theme');
    let nextTheme = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', nextTheme);
    localStorage.setItem('theme', nextTheme);
    updateThemeIcon(nextTheme);
    
    // Dispatch custom event if CodeMirror needs to update its theme later
    window.dispatchEvent(new Event('themeChanged'));
});

/* ============================================================
   EXAMPLES

/* ============================================================
   UI & EDITOR LOGIC
   ============================================================ */
let currentLang = 'python';
let cmTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'default' : 'dracula';
const cmEditor = CodeMirror.fromTextArea(document.getElementById('code-input'), {
    mode: 'python',
    theme: cmTheme,
    lineNumbers: true,
    styleActiveLine: false, // We handle active line manually for the trace
    matchBrackets: true,
    gutters: ["CodeMirror-linenumbers", "breakpoints"],
    indentUnit: 4,
    viewportMargin: Infinity
});

window.addEventListener('themeChanged', () => {
    let t = document.documentElement.getAttribute('data-theme') === 'light' ? 'default' : 'dracula';
    cmEditor.setOption("theme", t);
});

// Proxy to keep compatibility with existing `editor.value` usage
const editor = {
    get value() { return cmEditor.getValue(); },
    set value(v) { cmEditor.setValue(v); }
};

const langTabs = document.querySelectorAll('.lang-tab');
const exampleSelect = document.getElementById('example-select');

function populateExamples() {
    exampleSelect.innerHTML = '';
    const examples = EXAMPLES[currentLang];
    for (let title in examples) {
        const option = document.createElement('option');
        option.value = title;
        option.textContent = title;
        exampleSelect.appendChild(option);
    }
}

exampleSelect.addEventListener('change', (e) => {
    const title = e.target.value;
    const example = EXAMPLES[currentLang][title];
    if (example) {
        editor.value = example.code;
        document.getElementById('stdin-input').value = example.input;
    }
});

function highlightLine(lineNum) {
    // Clear previous active lines
    cmEditor.eachLine(line => {
        cmEditor.removeLineClass(line, "background", "CodeMirror-activeline-background");
        cmEditor.removeLineClass(line, "gutter", "CodeMirror-activeline-gutter");
    });
    
    if (lineNum > 0) {
        // CodeMirror lines are 0-indexed
        cmEditor.addLineClass(lineNum - 1, "background", "CodeMirror-activeline-background");
        cmEditor.addLineClass(lineNum - 1, "gutter", "CodeMirror-activeline-gutter");
        
        // Scroll into view (center)
        const top = cmEditor.charCoords({line: lineNum - 1, ch: 0}, "local").top;
        cmEditor.scrollTo(null, top - 60);
    }
}

langTabs.forEach(tab => {
    tab.addEventListener('click', () => {
        langTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        if (currentLang === 'python') cmEditor.setOption("mode", "python");
        else if (currentLang === 'cpp') cmEditor.setOption("mode", "text/x-c++src");
        else if (currentLang === 'java') cmEditor.setOption("mode", "text/x-java");
        
        populateExamples();
        const firstExample = Object.keys(EXAMPLES[currentLang])[0];
        editor.value = EXAMPLES[currentLang][firstExample].code;
        document.getElementById('stdin-input').value = EXAMPLES[currentLang][firstExample].input;
        stopAnimation();
        resetDashboard();
        setStatus('idle', 'Idle');
    });
});

document.getElementById('btn-clear').addEventListener('click', () => {
    editor.value = '';
    stopAnimation();
    resetDashboard();
});

/* ============================================================
   EVALUATOR UTILITY & STDIN
   ============================================================ */

let stdinLines = [];
let stdinTokens = [];

function prepareStdin() {
    const raw = document.getElementById('stdin-input').value;
    stdinLines = raw ? raw.split('\n') : [];
    stdinTokens = raw.trim().split(/\s+/).filter(s => s);
}

function consumeInputLine() {
    if (stdinLines.length > 0) return stdinLines.shift();
    throw new Error("Program expected input, but Standard Input is empty. Please provide input before running.");
}

function consumeInputToken() {
    if (stdinTokens.length > 0) return stdinTokens.shift();
    throw new Error("Program expected input, but Standard Input is empty. Please provide input before running.");
}

function deepClone(obj) {
    if (obj === null || typeof obj !== 'object') return obj;
    if (Array.isArray(obj)) return obj.map(deepClone);
    const cloned = {};
    for (let key in obj) cloned[key] = deepClone(obj[key]);
    return cloned;
}

function evalExpr(expr, scopeVars) {
    if (!expr) return undefined;
    
    // Handle inline inputs for Python/Java
    if (expr.includes('input(')) {
        expr = expr.replace(/input\([^)]*\)/g, () => JSON.stringify(consumeInputLine()));
    }
    if (expr.includes('.nextInt()') || expr.includes('.nextDouble()') || expr.includes('.nextFloat()')) {
        expr = expr.replace(/[a-zA-Z_]\w*\.next(?:Int|Double|Float)\(\)/g, () => {
            let val = consumeInputToken();
            return (!val || isNaN(val)) ? 0 : Number(val);
        });
    }
    if (expr.includes('.nextLine()')) {
        expr = expr.replace(/[a-zA-Z_]\w*\.nextLine\(\)/g, () => JSON.stringify(consumeInputLine()));
    }
    if (expr.includes('.next()')) {
        expr = expr.replace(/[a-zA-Z_]\w*\.next\(\)/g, () => JSON.stringify(consumeInputToken()));
    }
    let scopeStr = "";
    for (let k in scopeVars) {
        scopeStr += `let ${k} = ${JSON.stringify(scopeVars[k])};\n`;
    }
    let cleanExpr = expr.replace(/\band\b/g, '&&')
                        .replace(/\bor\b/g, '||')
                        .replace(/\bnot\b/g, '!')
                        .replace(/\bTrue\b/g, 'true')
                        .replace(/\bFalse\b/g, 'false')
                        .replace(/\bNone\b/g, 'null')
                        .replace(/\bint\(/g, 'Number(')
                        .replace(/\bfloat\(/g, 'Number(');
    try {
        let func = new Function(scopeStr + "return (" + cleanExpr + ");");
        return func();
    } catch (e) {
        return expr;
    }
}

/* ============================================================
   INTERPRETER CORE
   ============================================================ */
// Returns array of step objects: { line, desc, vars: [{name, value, changed}], output, note, stack }

function tracePython(code) {
    const lines = code.split('\n');
    let steps = [];
    let funcs = {};
    let callStack = []; // [{name, locals: {}, line}]
    let globalScope = {};
    
    // 1. First pass: Register functions
    let i = 0;
    while (i < lines.length) {
        let line = lines[i];
        let m = line.match(/^def\s+([a-zA-Z_]\w*)\s*\((.*?)\):/);
        if (m) {
            let funcName = m[1];
            let params = m[2].split(',').map(s=>s.trim()).filter(s=>s);
            let start = i + 1;
            let end = start;
            while (end < lines.length && (lines[end].trim() === '' || lines[end].startsWith(' ') || lines[end].startsWith('\t'))) {
                end++;
            }
            funcs[funcName] = { params, bodyRange: [start, end-1] };
            i = end - 1;
        }
        i++;
    }

    // 2. Main execution context setup
    callStack.push({name: "main()", locals: globalScope, line: 0});
    let maxSteps = 500;
    
    function getScope() { return callStack[callStack.length - 1].locals; }
    function pushStep(lineNum, desc, output="", note="") {
        let allVars = {};
        for (let i = 0; i < callStack.length; i++) {
            let frame = callStack[i];
            let prefix = "";
            if (callStack.length > 1) {
                let frameName = frame.name.replace('()', '');
                if (i === 0) frameName = 'global';
                prefix = frameName + (i > 0 ? `[${i}]` : '') + "::";
            }
            for (let k in frame.locals) {
                allVars[prefix + k] = frame.locals[k];
            }
        }
        
        let varsObj = [];
        let prevScope = steps.length > 0 ? {} : null;
        if (steps.length > 0) {
            steps[steps.length-1].vars.forEach(v => prevScope[v.name] = v.rawValue);
        }
        for (let k in allVars) {
            let rawVal = deepClone(allVars[k]);
            let strVal = typeof rawVal === 'object' ? JSON.stringify(rawVal) : String(rawVal);
            let prevStr = prevScope ? (typeof prevScope[k] === 'object' ? JSON.stringify(prevScope[k]) : String(prevScope[k])) : null;
            let changed = prevScope ? (strVal !== prevStr) : true;
            varsObj.push({name: k, rawValue: rawVal, stringValue: strVal, changed});
        }
        steps.push({
            line: lineNum + 1,
            desc,
            vars: varsObj,
            output,
            note,
            stack: callStack.map(f => f.name)
        });
    }

    // 3. Execution Engine
    function executeBlock(startIdx, endIdx, indentationContext) {
        let idx = startIdx;
        let blockOutput = "";
        
        while (idx <= endIdx && steps.length < maxSteps) {
            let line = lines[idx];
            let trimmed = line.trim();
            if (!trimmed || trimmed.startsWith('#')) { idx++; continue; }
            
            // Check indentation strictly to jump out of blocks
            let indent = line.length - line.trimLeft().length;
            if (indent < indentationContext) {
                break; // end of block
            }
            
            let scope = getScope();
            
            // Skip function definitions
            let mDef = trimmed.match(/^def\s+([a-zA-Z_]\w*)\s*\((.*?)\):/);
            if (mDef) {
                // Skip past the function body
                let defIndent = indent;
                idx++;
                while (idx <= endIdx) {
                    let nextLine = lines[idx];
                    let nextTrimmed = nextLine.trim();
                    if (nextTrimmed === '') { idx++; continue; }
                    let nextIndent = nextLine.length - nextLine.trimStart().length;
                    if (nextIndent <= defIndent) break;
                    idx++;
                }
                continue;
            }
            
            // Return
            let mRet = trimmed.match(/^return\s+(.*)$/);
            if (mRet) {
                let retExpr = mRet[1];
                let val = resolveExpr(retExpr, scope, idx);
                pushStep(idx, `Return ${val}`);
                return { action: 'return', value: val };
            }
            
            // Print
            let mPrint = trimmed.match(/^print\((.*)\)$/);
            if (mPrint) {
                let args = splitArgs(mPrint[1]);
                let vals = args.map(a => {
                    let v = resolveExpr(a.trim(), scope, idx);
                    return (typeof v === 'string') ? v.replace(/(^"|"$|^'|'$)/g, '') : v;
                });
                let outStr = vals.join(" ");
                pushStep(idx, `Print output`, outStr);
                idx++; continue;
            }
            
            // For loop (for i in range(...))
            let mFor = trimmed.match(/^for\s+(\w+)\s+in\s+range\((.*)\):$/);
            if (mFor) {
                let varName = mFor[1];
                let rangeArgs = mFor[2].split(',').map(s => resolveExpr(s.trim(), scope, idx));
                let start_r = 0, end_r = 0, step_r = 1;
                if (rangeArgs.length === 1) { end_r = rangeArgs[0]; }
                else if (rangeArgs.length === 2) { start_r = rangeArgs[0]; end_r = rangeArgs[1]; }
                else if (rangeArgs.length === 3) { start_r = rangeArgs[0]; end_r = rangeArgs[1]; step_r = rangeArgs[2]; }
                
                let loopCount = 0;
                for (let ri = start_r; step_r > 0 ? ri < end_r : ri > end_r; ri += step_r) {
                    if (loopCount >= 100 || steps.length >= maxSteps) break;
                    scope[varName] = ri;
                    pushStep(idx, `For loop: ${varName} = ${ri}`);
                    let bRes = executeBlock(idx + 1, endIdx, indent + 4);
                    if (bRes && bRes.action === 'return') return bRes;
                    if (bRes && bRes.action === 'break') break;
                    loopCount++;
                }
                pushStep(idx, `For loop ended`);
                idx++;
                while (idx <= endIdx && lines[idx].length - lines[idx].trimStart().length > indent) idx++;
                continue;
            }
            
            // Assignment (x = 5)
            let mAssign = trimmed.match(/^([a-zA-Z_]\w*)\s*=\s*(.*)$/);
            if (mAssign && !trimmed.includes('==')) {
                let varName = mAssign[1];
                let expr = mAssign[2];
                let val = resolveExpr(expr, scope, idx);
                scope[varName] = val;
                // Check if it was a function call for better description
                let mFuncInExpr = expr.match(/([a-zA-Z_]\w*)\s*\(/);
                if (mFuncInExpr && funcs[mFuncInExpr[1]]) {
                    pushStep(idx, `Assign result to ${varName} = ${val}`);
                } else {
                    pushStep(idx, `Assign ${varName} = ${val}`);
                }
                idx++; continue;
            }
            
            // Augmented Assignment
            let mAug = trimmed.match(/^([a-zA-Z_]\w*)\s*(\+|-|\*|\/)=\s*(.*)$/);
            if (mAug) {
                let vName = mAug[1], op = mAug[2], expr = mAug[3];
                let exprVal = resolveExpr(expr, scope, idx);
                let val = evalExpr(`${scope[vName]} ${op} ${exprVal}`, scope);
                scope[vName] = val;
                pushStep(idx, `Update ${vName} ${op}= ${expr}`);
                idx++; continue;
            }
            
            // If condition
            let mIf = trimmed.match(/^(?:if|elif)\s+(.*):$/);
            if (mIf) {
                let cond = mIf[1];
                let condVal = evalExpr(cond, scope);
                pushStep(idx, `Evaluate condition: ${condVal}`);
                if (condVal) {
                    let bRes = executeBlock(idx + 1, endIdx, indent + 4);
                    if (bRes && bRes.action === 'return') return bRes;
                    // Skip following elif/else
                    idx++; // move past if
                    while (idx <= endIdx && (lines[idx].trim().startsWith('elif') || lines[idx].trim().startsWith('else'))) {
                        let skipEnd = idx + 1;
                        while(skipEnd <= endIdx && lines[skipEnd].length - lines[skipEnd].trimStart().length > indent) skipEnd++;
                        idx = skipEnd;
                    }
                    continue;
                } else {
                    // Skip block
                    idx++;
                    while (idx <= endIdx && lines[idx].length - lines[idx].trimStart().length > indent) idx++;
                    continue;
                }
            }
            
            // Else
            if (trimmed.startsWith('else:')) {
                pushStep(idx, `Enter else branch`);
                let bRes = executeBlock(idx + 1, endIdx, indent + 4);
                if (bRes && bRes.action === 'return') return bRes;
                idx++;
                while (idx <= endIdx && lines[idx].length - lines[idx].trimStart().length > indent) idx++;
                continue;
            }
            
            // While
            let mWhile = trimmed.match(/^while\s+(.*):$/);
            if (mWhile) {
                let cond = mWhile[1];
                let loopCount = 0;
                while (evalExpr(cond, getScope()) && loopCount < 50) {
                    pushStep(idx, `While loop: True`);
                    let bRes = executeBlock(idx + 1, endIdx, indent + 4);
                    if (bRes && bRes.action === 'return') return bRes;
                    loopCount++;
                }
                pushStep(idx, `While loop end`);
                idx++;
                while (idx <= endIdx && lines[idx].length - lines[idx].trimStart().length > indent) idx++;
                continue;
            }
            
            // Standalone function call (e.g., print or user func)
            let mFuncAlone = trimmed.match(/^([a-zA-Z_]\w*)\((.*)\)$/);
            if (mFuncAlone && funcs[mFuncAlone[1]]) {
                pushStep(idx, `Call ${mFuncAlone[1]}()`);
                callFunction(mFuncAlone[1], mFuncAlone[2], scope, idx);
            }
            
            idx++;
        }
        return { action: 'done' };
    }
    
    // Resolve expressions that may contain function calls
    function resolveExpr(expr, scope, lineIdx) {
        if (!expr) return undefined;
        
        // Check if the expression contains a function call to a known function
        // Pattern: funcName(args) possibly within a larger expression like n * factorial(n - 1)
        let resolved = expr;
        let funcCallRegex = /([a-zA-Z_]\w*)\(([^()]*(?:\([^()]*\)[^()]*)*)\)/;
        let safetyCount = 0;
        
        while (safetyCount < 20) {
            let match = resolved.match(funcCallRegex);
            if (!match) break;
            
            let funcName = match[1];
            let funcArgs = match[2];
            let fullMatch = match[0];
            
            if (funcs[funcName]) {
                // It's a known user-defined function — execute it
                let retVal = callFunction(funcName, funcArgs, scope, lineIdx);
                // Replace the function call in the expression with the return value
                resolved = resolved.replace(fullMatch, JSON.stringify(retVal));
            } else {
                // Not a known function, break to avoid infinite loop
                break;
            }
            safetyCount++;
        }
        
        return evalExpr(resolved, scope);
    }
    
    // Split arguments respecting parentheses
    function splitArgs(str) {
        let args = [];
        let depth = 0;
        let current = '';
        for (let c of str) {
            if (c === '(') depth++;
            else if (c === ')') depth--;
            else if (c === ',' && depth === 0) {
                args.push(current);
                current = '';
                continue;
            }
            current += c;
        }
        if (current.trim()) args.push(current);
        return args;
    }
    
    function callFunction(funcName, argStr, callerScope, callLineIdx) {
        let fDef = funcs[funcName];
        let argVals = argStr.split(',').map(s=>evalExpr(s.trim(), callerScope));
        let locals = {};
        fDef.params.forEach((p, i) => { locals[p] = argVals[i]; });
        
        callStack.push({name: `${funcName}()`, locals: locals, line: fDef.bodyRange[0]});
        
        let res = executeBlock(fDef.bodyRange[0], fDef.bodyRange[1], 4); // assuming 4 spaces intent inside func
        
        callStack.pop();
        return res && res.action === 'return' ? res.value : undefined;
    }

    // Start execution from global level
    executeBlock(0, lines.length - 1, 0);
    return steps;
}

// C++ Tracer
function traceCpp(code) {
    const lines = code.split('\n');
    let steps = [];
    let funcs = {};
    let callStack = [];
    
    // Parse functions
    let currentFunc = null;
    let braceCount = 0;
    
    for (let i=0; i<lines.length; i++) {
        let line = lines[i].trim();
        let mFunc = line.match(/^(?:int|void|double|float|bool|string|auto)\s+([a-zA-Z_]\w*)\s*\((.*)\)\s*\{?/);
        if (mFunc && !currentFunc) {
            let funcName = mFunc[1];
            let params = mFunc[2].split(',').map(s=>s.trim().split(' ').pop()).filter(s=>s); // extract param names
            currentFunc = { name: funcName, params: params, start: i + 1 };
            funcs[funcName] = currentFunc;
            if (line.includes('{')) braceCount = 1;
        } else if (currentFunc) {
            braceCount += (line.match(/\{/g) || []).length;
            braceCount -= (line.match(/\}/g) || []).length;
            if (braceCount === 0) {
                currentFunc.end = i - 1;
                currentFunc = null;
            }
        }
    }
    
    function getScope() { return callStack[callStack.length - 1].locals; }
    function pushStep(lineNum, desc, output="") {
        let allVars = {};
        for (let i = 0; i < callStack.length; i++) {
            let frame = callStack[i];
            let prefix = "";
            if (callStack.length > 1) {
                let frameName = frame.name.replace('()', '');
                prefix = frameName + (i > 0 ? `[${i}]` : '') + "::";
            }
            for (let k in frame.locals) {
                allVars[prefix + k] = frame.locals[k];
            }
        }
        
        let varsObj = [];
        let prevScope = steps.length > 0 ? {} : null;
        if (steps.length > 0) steps[steps.length-1].vars.forEach(v => prevScope[v.name] = v.rawValue);
        
        for (let k in allVars) {
            let rawVal = deepClone(allVars[k]);
            let strVal = typeof rawVal === 'object' ? JSON.stringify(rawVal) : String(rawVal);
            let prevStr = prevScope ? (typeof prevScope[k] === 'object' ? JSON.stringify(prevScope[k]) : String(prevScope[k])) : null;
            let changed = prevScope ? (strVal !== prevStr) : true;
            varsObj.push({name: k, rawValue: rawVal, stringValue: strVal, changed});
        }
        steps.push({
            line: lineNum + 1, desc, vars: varsObj, output, note: "",
            stack: callStack.map(f => f.name)
        });
    }

    function executeBlock(startIdx, endIdx) {
        let idx = startIdx;
        while (idx <= endIdx && steps.length < 500) {
            let line = lines[idx];
            let trimmed = line.trim();
            if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('using')) { idx++; continue; }
            if (trimmed === '{' || trimmed === '}') { idx++; continue; }
            
            let scope = getScope();
            
            // Return
            let mRet = trimmed.match(/^return\s+(.*);/);
            if (mRet) {
                let val = cppResolveExpr(mRet[1], scope);
                pushStep(idx, `Return ${val}`);
                return { action: 'return', value: val };
            }
            
            // cout
            if (trimmed.startsWith('cout')) {
                let outStr = trimmed.replace('cout', '').replace(/;/g, '').split('<<')
                    .map(s => s.trim())
                    .filter(s => s && s !== 'endl')
                    .map(s => {
                        if(s.startsWith('"') && s.endsWith('"')) return s.slice(1,-1);
                        return evalExpr(s, scope);
                    }).join('');
                pushStep(idx, `Output stream`, outStr);
                idx++; continue;
            }
            
            // cin
            if (trimmed.startsWith('cin')) {
                let vars = trimmed.replace('cin', '').replace(/;/g, '').split('>>')
                    .map(s => s.trim())
                    .filter(s => s);
                let outStr = "Read: ";
                for (let v of vars) {
                    let val = consumeInputToken();
                    if (!isNaN(val) && val !== "") val = Number(val);
                    scope[v] = val;
                    outStr += `${v}=${val} `;
                }
                pushStep(idx, `Input stream`, outStr);
                idx++; continue;
            }
            
            // Uninitialized Declaration (int x;)
            let mDeclNoInit = trimmed.match(/^(?:int|double|float|bool|string|auto)\s+([a-zA-Z_]\w*)\s*;/);
            if (mDeclNoInit) {
                let varName = mDeclNoInit[1];
                scope[varName] = undefined;
                pushStep(idx, `Declare ${varName}`);
                idx++; continue;
            }
            
            // Declaration & Assignment (int x = 5;)
            let mDecl = trimmed.match(/^(?:int|double|float|bool|string|auto)\s+([a-zA-Z_]\w*)\s*=\s*(.*);/);
            if (mDecl) {
                let varName = mDecl[1], expr = mDecl[2];
                handleAssign(idx, varName, expr, scope);
                idx++; continue;
            }
            
            // Assignment (x = 5;)
            let mAssign = trimmed.match(/^([a-zA-Z_]\w*)\s*=\s*(.*);/);
            if (mAssign && !trimmed.startsWith('int') && !trimmed.startsWith('if') && !trimmed.startsWith('for') && !trimmed.startsWith('while')) {
                handleAssign(idx, mAssign[1], mAssign[2], scope);
                idx++; continue;
            }

            // If
            let mIf = trimmed.match(/^if\s*\((.*)\)\s*\{?/);
            if (mIf) {
                let condVal = evalExpr(mIf[1], scope);
                pushStep(idx, `Condition: ${condVal}`);
                
                // Find block bounds
                let bStart = idx + 1, bEnd = idx;
                let bc = trimmed.includes('{') ? 1 : 0;
                if(bc===0 && lines[idx+1].includes('{')) { bStart++; bEnd++; bc=1; }
                
                while(bc > 0 && bEnd < endIdx) {
                    bEnd++;
                    bc += (lines[bEnd].match(/\{/g)||[]).length - (lines[bEnd].match(/\}/g)||[]).length;
                }
                
                if (condVal) {
                    let r = executeBlock(bStart, bEnd - 1);
                    if (r && r.action === 'return') return r;
                }
                idx = bEnd + 1;
                continue;
            }
            
            idx++;
        }
        return { action: 'done' };
    }
    
    function handleAssign(idx, varName, expr, scope) {
        let val = cppResolveExpr(expr, scope);
        scope[varName] = val;
        let mFunc = expr.match(/([a-zA-Z_]\w*)\s*\(/);
        if (mFunc && funcs[mFunc[1]]) {
            pushStep(idx, `Assign ${varName} = ${val}`);
        } else {
            pushStep(idx, `Assign ${varName} = ${val}`);
        }
    }
    
    function cppResolveExpr(expr, scope) {
        if (!expr) return undefined;
        let resolved = expr;
        let funcCallRegex = /([a-zA-Z_]\w*)\(([^()]*(?:\([^()]*\)[^()]*)*)\)/;
        let safetyCount = 0;
        while (safetyCount < 20) {
            let match = resolved.match(funcCallRegex);
            if (!match) break;
            let funcName = match[1];
            let funcArgs = match[2];
            let fullMatch = match[0];
            if (funcs[funcName]) {
                let retVal = callFunction(funcName, funcArgs, scope, 0);
                resolved = resolved.replace(fullMatch, JSON.stringify(retVal));
            } else {
                break;
            }
            safetyCount++;
        }
        return evalExpr(resolved, scope);
    }

    function callFunction(funcName, argStr, callerScope, lineIdx) {
        let fDef = funcs[funcName];
        let argVals = argStr ? argStr.split(',').map(s=>evalExpr(s.trim(), callerScope)) : [];
        let locals = {};
        fDef.params.forEach((p, i) => { locals[p] = argVals[i]; });
        
        callStack.push({name: `${funcName}()`, locals: locals, line: fDef.start});
        let res = executeBlock(fDef.start, fDef.end);
        callStack.pop();
        return res && res.action === 'return' ? res.value : undefined;
    }

    // Start at main
    if (funcs['main']) {
        callStack.push({name: "main()", locals: {}, line: funcs['main'].start});
        executeBlock(funcs['main'].start, funcs['main'].end);
    }
    
    return steps;
}

// Java Tracer - Normalizes Java syntax to C++ and uses C++ tracer
function traceJava(code) {
    let normalized = code
        .replace(/public\s+class\s+\w+\s*\{/g, '') // remove class wrap
        .replace(/public\s+static\s+void\s+main\(String\[\]\s+args\)/g, 'int main()')
        .replace(/public\s+static\s+/g, '')
        .replace(/System\.out\.println\((.*)\)/g, 'cout << $1 << endl')
        .replace(/System\.out\.print\((.*)\)/g, 'cout << $1')
        .replace(/boolean\b/g, 'bool')
        .replace(/String\b/g, 'string')
        .replace(/Integer\.parseInt\((.*)\)/g, 'Number($1)')
        .replace(/Double\.parseDouble\((.*)\)/g, 'Number($1)')
        .replace(/Float\.parseFloat\((.*)\)/g, 'Number($1)');
    // removing last closing brace of class
    let lines = normalized.split('\n');
    for (let i = lines.length - 1; i >= 0; i--) {
        if (lines[i].trim() === '}') { lines[i] = ''; break; }
    }
    return traceCpp(lines.join('\n'));
}

/* ============================================================
   ANIMATION & STATE LOGIC
   ============================================================ */
let currentSteps = [];
let animTimer = null;
let currentStepIdx = 0;
let speed = 420;
let accumulatedOutput = '';

const runBtn = document.getElementById('btn-run');
const speedSlider = document.getElementById('speed-slider');
const speedLabel = document.getElementById('speed-label');
const btnReset = document.getElementById('btn-reset');
const callStackBar = document.getElementById('call-stack');
const progressBar = document.getElementById('progress-bar');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnRunBp = document.getElementById('btn-run-bp');

const speedMap = { 0: 900, 1: 420, 2: 130, 3: 0 };
const speedLabels = { 0: 'Slow', 1: 'Normal', 2: 'Fast', 3: 'Instant' };

speedSlider.addEventListener('input', (e) => {
    let val = parseInt(e.target.value);
    speed = speedMap[val];
    speedLabel.textContent = speedLabels[val];
    if (animTimer && speed > 0) {
        clearInterval(animTimer);
        animTimer = setInterval(stepForward, speed);
    }
});

btnReset.addEventListener('click', () => {
    if (currentSteps.length > 0) {
        stopAnimation();
        currentStepIdx = 0;
        renderStep(0);
    }
});

function setStatus(state, msg) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = msg;
}

runBtn.addEventListener('click', startTrace);
document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') startTrace();
});

function resetDashboard() {
    const dashboardLayout = document.getElementById('dashboard-layout');
    const welcomeMsg = document.getElementById('welcome-message');
    const memoryContent = document.getElementById('memory-content');
    const consoleOutput = document.getElementById('console-output');
    const callStackEl = document.getElementById('call-stack');
    
    dashboardLayout.style.display = 'none';
    welcomeMsg.style.display = 'flex';
    memoryContent.innerHTML = '';
    consoleOutput.textContent = '';
    callStackEl.innerHTML = '<span class="call-stack-label">Call Stack</span>';
    accumulatedOutput = '';
    currentSteps = [];
    currentStepIdx = 0;
    progressBar.style.width = '0%';
    highlightLine(0);
}

function startTrace() {
    const code = editor.value;
    if (!code.trim()) return;
    
    prepareStdin();
    stopAnimation();
    accumulatedOutput = '';
    setStatus('running', 'Parsing and analyzing code...');
    
    try {
        if (currentLang === 'python') currentSteps = tracePython(code);
        else if (currentLang === 'cpp') currentSteps = traceCpp(code);
        else if (currentLang === 'java') currentSteps = traceJava(code);
        
        if (currentSteps.length === 0) {
            setStatus('error', 'Execution yielded no steps. Check syntax.');
            return;
        }
        
        currentStepIdx = 0;
        
        // Update timeline slider max
        const timelineSlider = document.getElementById('timeline-slider');
        timelineSlider.max = currentSteps.length - 1;
        timelineSlider.value = 0;
        timelineSlider.disabled = false;
        
        setStatus('running', 'Executing trace...');
        
        if (speed === 0) {
            // Instant
            while (currentStepIdx < currentSteps.length) renderStep(currentStepIdx++);
            finishTrace();
        } else {
            btnRunBp.disabled = false;
            animTimer = setInterval(stepForward, speed);
        }
    } catch (e) {
        setStatus('error', 'Error parsing code: ' + e.message);
        console.error(e);
    }
}

function stopAnimation() {
    if (animTimer) clearInterval(animTimer);
    animTimer = null;
    btnPrev.disabled = currentStepIdx === 0;
    btnReset.disabled = currentStepIdx === 0;
    btnRunBp.disabled = currentStepIdx >= currentSteps.length - 1;
    btnNext.disabled = currentStepIdx >= currentSteps.length - 1;
}

function finishTrace() {
    stopAnimation();
    setStatus('', 'Execution completed.');
    btnPrev.disabled = false;
    btnReset.disabled = false;
    btnNext.disabled = true;
    btnRunBp.disabled = false;
    highlightLine(0);
}

function stepForward() {
    if (currentStepIdx >= currentSteps.length) {
        finishTrace();
        return;
    }
    renderStep(currentStepIdx);
    currentStepIdx++;
    progressBar.style.width = `${(currentStepIdx / currentSteps.length) * 100}%`;
}

const dashboardLayout = document.getElementById('dashboard-layout');
const welcomeMsg = document.getElementById('welcome-message');
const stepCounter = document.getElementById('step-counter');
const stepAction = document.getElementById('step-action');
const stepNote = document.getElementById('step-note');
const memoryContent = document.getElementById('memory-content');
const consoleOutput = document.getElementById('console-output');
const timelineSlider = document.getElementById('timeline-slider');

timelineSlider.addEventListener('input', (e) => {
    let val = parseInt(e.target.value);
    if (val < currentSteps.length) {
        currentStepIdx = val;
        renderStep(currentStepIdx);
    }
});

document.getElementById('delta-changes-toggle').addEventListener('change', () => {
    if (currentSteps.length > 0) {
        renderStep(currentStepIdx);
    }
});

function renderStep(idx) {
    const step = currentSteps[idx];
    
    welcomeMsg.style.display = 'none';
    dashboardLayout.style.display = 'grid';
    
    stepCounter.textContent = `Step ${idx + 1} / ${currentSteps.length}`;
    stepAction.textContent = `Line ${step.line}: ${step.desc}`;
    stepNote.textContent = step.note || '';
    
    // Process Variables
    let primitivesHtml = `<div class="node-container">`;
    let arraysHtml = '';
    
    let hasPrimitives = false;
    const deltaToggle = document.getElementById('delta-changes-toggle').checked;
    
    step.vars.forEach(v => {
        if (deltaToggle && !v.changed) return;
        
        if (v.rawValue !== null && typeof v.rawValue === 'object' && Array.isArray(v.rawValue)) {
            // It's an Array
            // Compare with previous step to find changed indices
            let prevArray = null;
            if (idx > 0) {
                const prevVar = currentSteps[idx - 1].vars.find(p => p.name === v.name);
                if (prevVar && Array.isArray(prevVar.rawValue)) {
                    prevArray = prevVar.rawValue;
                }
            }
            
            arraysHtml += `<details class="array-container" open>
                <summary class="array-title" style="cursor:pointer; outline:none; user-select:none;">
                    ${v.name} ${v.changed ? '<span style="color:var(--accent-green)">•</span>' : ''}
                </summary>
                <div style="padding-top: 0.5rem;">`;
            
            if (v.rawValue.length > 0 && Array.isArray(v.rawValue[0])) {
                // 2D Array
                v.rawValue.forEach((row, rowIdx) => {
                    arraysHtml += `<div class="array-2d-row">
                        <div class="array-2d-row-label">${rowIdx}</div>`;
                    row.forEach((cell, colIdx) => {
                        let isAccessed = false;
                        if (prevArray && prevArray[rowIdx] && prevArray[rowIdx][colIdx] !== cell) isAccessed = true;
                        arraysHtml += `<div class="array-block ${isAccessed ? 'changed' : ''}">
                            <div class="array-val">${cell}</div>
                        </div>`;
                    });
                    arraysHtml += `</div>`;
                });
            } else {
                // 1D Array
                arraysHtml += `<div class="array-blocks">`;
                v.rawValue.forEach((cell, i) => {
                    let isAccessed = false;
                    if (prevArray && prevArray[i] !== cell) isAccessed = true;
                    arraysHtml += `<div class="array-block ${isAccessed ? 'changed' : ''}">
                        <div class="array-val">${cell}</div>
                        <div class="array-idx">${i}</div>
                    </div>`;
                });
                arraysHtml += `</div>`;
            }
            arraysHtml += `</div></details>`;
        } else {
            // Primitive
            hasPrimitives = true;
            let typeName = typeof v.rawValue;
            if (typeName === 'number') typeName = Number.isInteger(v.rawValue) ? 'int' : 'float';
            else if (typeName === 'string') typeName = 'str';
            else if (typeName === 'boolean') typeName = 'bool';
            
            let typeColor = 'var(--text-tertiary)';
            if (typeName === 'int' || typeName === 'float') typeColor = 'var(--accent-cyan)';
            else if (typeName === 'str') typeColor = 'var(--accent-green)';
            else if (typeName === 'bool') typeColor = 'var(--accent-purple)';
            
            primitivesHtml += `<div class="node-card ${v.changed ? 'changed' : ''}">
                <div class="node-name">${v.name} <span class="node-type" style="color: ${typeColor}">${typeName}</span></div>
                <div class="node-val">${v.stringValue}</div>
            </div>`;
        }
    });
    
    primitivesHtml += `</div>`;
    if (!hasPrimitives) primitivesHtml = '';
    
    memoryContent.innerHTML = primitivesHtml + (arraysHtml ? '<div style="height:1rem"></div>' + arraysHtml : '');
    
    // Accumulate console output from all steps up to current
    accumulatedOutput = '';
    for (let si = 0; si <= idx; si++) {
        if (currentSteps[si].output) {
            accumulatedOutput += currentSteps[si].output + '\n';
        }
    }
    
    // Basic ANSI color support for output
    let parsedOutput = accumulatedOutput
        .replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\x1b\[31m/g, '<span style="color: var(--accent-red)">')
        .replace(/\x1b\[32m/g, '<span style="color: var(--accent-green)">')
        .replace(/\x1b\[0m/g, '</span>');
        
    consoleOutput.innerHTML = parsedOutput || ' ';
    
    highlightLine(step.line);
    
    // Call Stack logic (Show function + line)
    callStackBar.innerHTML = '<span class="call-stack-label">Call Stack</span>' + 
        step.stack.map(frame => {
            const parts = frame.split(':');
            let name = parts[0];
            let ln = parts.length > 1 ? ` <span style="opacity: 0.5">L${parts[1]}</span>` : '';
            return `<div class="stack-frame">${name}${ln}</div>`;
        }).join('<span style="color: var(--border-primary); margin: 0 4px;">→</span>');
        
    // Update slider
    const timelineSlider = document.getElementById('timeline-slider');
    timelineSlider.value = idx;
    progressBar.style.width = `${((idx + 1) / currentSteps.length) * 100}%`;
}

btnPrev.addEventListener('click', () => {
    stopAnimation();
    if (currentStepIdx > 0) {
        currentStepIdx--;
        renderStep(currentStepIdx);
        progressBar.style.width = `${((currentStepIdx + 1) / currentSteps.length) * 100}%`;
    }
    btnNext.disabled = currentStepIdx >= currentSteps.length - 1;
    btnPrev.disabled = currentStepIdx <= 0;
});

btnNext.addEventListener('click', () => {
    stopAnimation();
    if (currentStepIdx < currentSteps.length - 1) {
        currentStepIdx++;
        renderStep(currentStepIdx);
        progressBar.style.width = `${((currentStepIdx + 1) / currentSteps.length) * 100}%`;
    }
    btnPrev.disabled = false;
    if (currentStepIdx >= currentSteps.length - 1) btnNext.disabled = true;
});


/* Font Size Adjustment */
let currentFontSize = 14;
document.getElementById('btn-font-inc').addEventListener('click', () => {
    if (currentFontSize < 20) {
        currentFontSize += 2;
        document.querySelector('.CodeMirror').style.fontSize = currentFontSize + 'px';
        cmEditor.refresh();
    }
});
document.getElementById('btn-font-dec').addEventListener('click', () => {
    if (currentFontSize > 12) {
        currentFontSize -= 2;
        document.querySelector('.CodeMirror').style.fontSize = currentFontSize + 'px';
        cmEditor.refresh();
    }
});

/* Keyboard Shortcuts */
document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('btn-run').click();
    }
});

/* Breakpoints */
const activeBreakpoints = new Set();
const btnRunBp = document.getElementById('btn-run-bp');

function makeMarker() {
    const marker = document.createElement("div");
    marker.style.color = "var(--accent-red)";
    marker.style.fontWeight = "bold";
    marker.innerHTML = "●";
    return marker;
}

cmEditor.on("gutterClick", (cm, n) => {
    const info = cm.lineInfo(n);
    const lineNum = n + 1;
    if (activeBreakpoints.has(lineNum)) {
        activeBreakpoints.delete(lineNum);
        cm.setGutterMarker(n, "breakpoints", null);
    } else {
        activeBreakpoints.add(lineNum);
        cm.setGutterMarker(n, "breakpoints", makeMarker());
    }
    
    // Update badge on button
    if (activeBreakpoints.size > 0) {
        btnRunBp.innerHTML = `⏭ Breakpoint <span style="background: var(--accent-red); color: white; padding: 2px 6px; border-radius: 12px; font-size: 0.7rem; margin-left: 4px;">${activeBreakpoints.size}</span>`;
    } else {
        btnRunBp.innerHTML = `⏭ Breakpoint`;
    }
});

/* Copy, Download & Share */
document.getElementById('btn-share').addEventListener('click', () => {
    const data = JSON.stringify({
        lang: currentLang,
        code: editor.value,
        input: document.getElementById('stdin-input').value
    });
    const hash = btoa(unescape(encodeURIComponent(data)));
    const url = new URL(window.location);
    url.hash = hash;
    navigator.clipboard.writeText(url.toString());
    setStatus('running', 'Share URL copied to clipboard!');
    setTimeout(() => setStatus('idle', 'Idle'), 2000);
});

document.getElementById('btn-copy').addEventListener('click', () => {
    navigator.clipboard.writeText(editor.value);
    setStatus('running', 'Code copied to clipboard!');
    setTimeout(() => setStatus('idle', 'Idle'), 2000);
});

document.getElementById('btn-download').addEventListener('click', () => {
    const ext = currentLang === 'python' ? 'py' : (currentLang === 'cpp' ? 'cpp' : 'java');
    const blob = new Blob([editor.value], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `solution.${ext}`;
    a.click();
});

document.getElementById('btn-tour').addEventListener('click', () => {
    alert("Welcome to the Code Visualizer!\n\n1. Select your Language (Python, C++, Java).\n2. Write your code and provide standard input if needed.\n3. Click 'Run Trace' (or Ctrl+Enter) to execute the code.\n4. Use the timeline slider, Next/Prev buttons, or Speed controls to step through your program.\n5. View variables, arrays, and console output on the right.\n6. Click line numbers to set breakpoints, then use the 'Breakpoint' button to jump to them.\n7. Use the 'Share' button to get a shareable URL of your code.\n\nHappy Coding!");
});

/* Run to Breakpoint Logic */
// btnRunBp is declared above with other DOM references
btnRunBp.addEventListener('click', () => {
    if (currentSteps.length === 0) return;
    let targetIdx = currentStepIdx + 1;
    while (targetIdx < currentSteps.length) {
        if (activeBreakpoints.has(currentSteps[targetIdx].line)) {
            currentStepIdx = targetIdx;
            renderStep(currentStepIdx);
            return;
        }
        targetIdx++;
    }
    // If no more breakpoints, go to end
    currentStepIdx = currentSteps.length - 1;
    renderStep(currentStepIdx);
});

// Init
populateExamples();
const firstExample = Object.keys(EXAMPLES['python'])[0];
editor.value = EXAMPLES['python'][firstExample].code;
document.getElementById('stdin-input').value = EXAMPLES['python'][firstExample].input;

if (window.location.hash) {
    try {
        const hash = window.location.hash.substring(1);
        const data = JSON.parse(decodeURIComponent(escape(atob(hash))));
        if (data.lang && data.code !== undefined) {
            currentLang = data.lang;
            const tab = Array.from(langTabs).find(t => t.dataset.lang === data.lang);
            if (tab) {
                langTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            }
            if (currentLang === 'python') cmEditor.setOption("mode", "python");
            else if (currentLang === 'cpp') cmEditor.setOption("mode", "text/x-c++src");
            else if (currentLang === 'java') cmEditor.setOption("mode", "text/x-java");
            populateExamples();
            editor.value = data.code;
            document.getElementById('stdin-input').value = data.input || '';
        }
    } catch(e) {
        console.error("Invalid share link", e);
    }
}

setTimeout(() => cmEditor.refresh(), 100);
highlightLine(0);
