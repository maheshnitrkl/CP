                let parts = cleanLine.replace(/;/g, '').split('<<').map(s => s.trim()).filter(s => s && s !== 'endl' && s !== 'std::endl');
                let out = parts.map(s => {
                    if (s.startsWith('"') && s.endsWith('"')) return s.slice(1, -1);
                    if (s.startsWith("'") && s.endsWith("'")) return s.slice(1, -1);
                    return evalExpr(translateCppExprToJs(s, scope), scope);
                }).join('');
                pushStep(idx, `Output`, out); idx++; continue;
            }
            if (trimmed.startsWith('cin') || trimmed.startsWith('std::cin')) {
                let vars = trimmed.replace(/^(?:std::)?cin\s*/, '').replace(/;/g, '').split('>>').map(s => s.trim()).filter(s => s);
                for (let v of vars) { let val = consumeInputToken(); scope[v] = !isNaN(val) && val !== "" ? Number(val) : val; }
                pushStep(idx, `Input`); idx++; continue;
            }

            // Range-based for loop
            let mRangeFor = trimmed.match(/^for\s*\(([^:]+?)\s*:\s*(.+?)\)\s*\{?/);
            if (mRangeFor) {
                let declPart = mRangeFor[1].trim();
                let containerPart = mRangeFor[2].trim();
                
                let mVar = declPart.match(/(?:const\s+)?(?:auto|int|double|float|bool|char|string|long|long\s+long|[a-zA-Z_]\w*(?:\s*<.*?>)?)(?:\s*&)?\s+(\w+)/);
                let varName = mVar ? mVar[1] : 'x';
                
                let container = cppResolve(containerPart, scope);
                let items = [];
                if (container && container.__isSet) {
                    items = container.__values || [];
                } else if (container && typeof container === 'object' && !Array.isArray(container)) {
                    let keys = Object.keys(container).filter(k => !k.startsWith('__')).sort();
                    items = keys.map(k => [k, container[k]]);
                } else if (Array.isArray(container)) {
                    items = container;
                }
                
                let bStart = idx + 1, bEnd = idx, bc = trimmed.includes('{') ? 1 : 0;
                if (bc === 0 && lines[idx+1] && lines[idx+1].trim().replace(/\/\/.*$/, '') === '{') { bStart++; bc = 1; }
                while (bc > 0 && bEnd < endIdx) { bEnd++; bc += (lines[bEnd].replace(/\/\/.*$/, '').match(/\{/g)||[]).length - (lines[bEnd].replace(/\/\/.*$/, '').match(/\}/g)||[]).length; }
                
                for (let item of items) {
                    if (steps.length >= 800) break;
                    scope[varName] = item;
                    varTypes[varName] = (container && container.__isSet) ? 'set_item' : 'auto';
                    pushStep(idx, `For ${varName} = ${formatVal(item)}`);
                    let r = executeBlock(bStart, bEnd - 1);
                    if (r && r.action === 'return') return r;
                    if (r && r.action === 'break') break;
                }
                idx = bEnd + 1; continue;
            }

            // Classic For loop
            let mFor = trimmed.match(/^for\s*\((.+?);(.+?);(.+?)\)\s*\{?/);
            if (mFor) {
                let initPart = mFor[1].trim(), condPart = mFor[2].trim(), incPart = mFor[3].trim();
                let mInit = initPart.match(/(?:(?:const\s+)?(?:int|long|size_t|auto|[a-zA-Z_]\w*)\s+)?(\w+)\s*=\s*(.*)/);
                if (mInit) scope[mInit[1]] = cppResolve(mInit[2], scope);
                let bStart = idx + 1, bEnd = idx, bc = trimmed.includes('{') ? 1 : 0;
                if (bc === 0 && lines[idx+1] && lines[idx+1].trim().replace(/\/\/.*$/, '') === '{') { bStart++; bc = 1; }
                while (bc > 0 && bEnd < endIdx) { bEnd++; bc += (lines[bEnd].replace(/\/\/.*$/, '').match(/\{/g)||[]).length - (lines[bEnd].replace(/\/\/.*$/, '').match(/\}/g)||[]).length; }
                let lc = 0;
                while (lc < 150 && steps.length < 800) {
                    if (!evalExpr(translateCppExprToJs(condPart, scope), scope)) break;
                    pushStep(idx, `For: ${condPart}`);
                    let r = executeBlock(bStart, bEnd - 1);
                    if (r && r.action === 'return') return r;
                    if (r && r.action === 'break') break;
                    
                    let iM = incPart.match(/(\w+)\+\+/); if (iM) scope[iM[1]]++;
                    let dM = incPart.match(/(\w+)--/); if (dM) scope[dM[1]]--;
                    let aM = incPart.match(/(\w+)\s*(\+|-)=\s*(.*)/); if (aM) { let v = cppResolve(aM[3], scope); if (aM[2]==='+') scope[aM[1]]+=v; else scope[aM[1]]-=v; }
                    lc++;
                }
                idx = bEnd + 1; continue;
            }

            // If / else if / else chain
            let mIf = trimmed.match(/^if\s*\((.+)\)\s*\{?/);
            if (mIf) {
                let handled = false;
                let condVal = evalExpr(translateCppExprToJs(mIf[1], scope), scope);
                pushStep(idx, `Condition: ${!!condVal}`);
                let bStart = idx + 1, bEnd = idx, bc = trimmed.includes('{') ? 1 : 0;
                if (bc === 0 && lines[idx+1] && lines[idx+1].trim().replace(/\/\/.*$/, '') === '{') { bStart++; bEnd++; bc = 1; }
                while (bc > 0 && bEnd < endIdx) { bEnd++; bc += (lines[bEnd].replace(/\/\/.*$/, '').match(/\{/g)||[]).length - (lines[bEnd].replace(/\/\/.*$/, '').match(/\}/g)||[]).length; }
                if (condVal) { let r = executeBlock(bStart, bEnd - 1); if (r && (r.action === 'return' || r.action === 'break' || r.action === 'continue')) return r; handled = true; }
                idx = bEnd + 1;
                while (idx <= endIdx && lines[idx] && lines[idx].replace(/\/\/.*$/, '').trim().match(/^else\b/)) {
                    let eLine = lines[idx].replace(/\/\/.*$/, '').trim();
                    let mElseIf = eLine.match(/^else\s+if\s*\((.+)\)\s*\{?/);
                    if (mElseIf) {
                        let eiCond = !handled ? evalExpr(translateCppExprToJs(mElseIf[1], scope), scope) : false;
                        pushStep(idx, !handled ? `Else if: ${!!eiCond}` : `Else if: skipped`);
                        let eStart = idx + 1, eEnd = idx, ebc = eLine.includes('{') ? 1 : 0;
                        if (ebc === 0 && lines[idx+1] && lines[idx+1].trim().replace(/\/\/.*$/, '') === '{') { eStart++; eEnd++; ebc = 1; }
                        while (ebc > 0 && eEnd < endIdx) { eEnd++; ebc += (lines[eEnd].replace(/\/\/.*$/, '').match(/\{/g)||[]).length - (lines[eEnd].replace(/\/\/.*$/, '').match(/\}/g)||[]).length; }
                        if (!handled && eiCond) { let r = executeBlock(eStart, eEnd - 1); if (r && (r.action === 'return' || r.action === 'break' || r.action === 'continue')) return r; handled = true; }
                        idx = eEnd + 1;
                    } else {
                        let eStart = idx + 1, eEnd = idx, ebc = eLine.includes('{') ? 1 : 0;
                        if (ebc === 0 && lines[idx+1] && lines[idx+1].trim().replace(/\/\/.*$/, '') === '{') { eStart++; eEnd++; ebc = 1; }
                        while (ebc > 0 && eEnd < endIdx) { eEnd++; ebc += (lines[eEnd].replace(/\/\/.*$/, '').match(/\{/g)||[]).length - (lines[eEnd].replace(/\/\/.*$/, '').match(/\}/g)||[]).length; }
                        if (!handled) { pushStep(idx, 'Else branch'); let r = executeBlock(eStart, eEnd - 1); if (r && (r.action === 'return' || r.action === 'break' || r.action === 'continue')) return r; }
                        idx = eEnd + 1;
                        break;
                    }
                }
                continue;
            }
            
            // While
            let mWhile = trimmed.match(/^while\s*\((.+)\)\s*\{?/);
            if (mWhile) {
                let bStart = idx + 1, bEnd = idx, bc = trimmed.includes('{') ? 1 : 0;
                if (bc === 0 && lines[idx+1] && lines[idx+1].trim().replace(/\/\/.*$/, '') === '{') { bStart++; bEnd++; bc = 1; }
                while (bc > 0 && bEnd < endIdx) { bEnd++; bc += (lines[bEnd].replace(/\/\/.*$/, '').match(/\{/g)||[]).length - (lines[bEnd].replace(/\/\/.*$/, '').match(/\}/g)||[]).length; }
                let lc = 0;
                while (lc < 150 && steps.length < 800 && evalExpr(translateCppExprToJs(mWhile[1], scope), scope)) {
                    pushStep(idx, `While: True`);
                    let r = executeBlock(bStart, bEnd - 1);
                    if (r && r.action === 'return') return r;
                    if (r && r.action === 'break') break;
                    lc++;
                }
                idx = bEnd + 1; continue;
            }

            // Standalone Method Calls (e.g. v.push_back(5); st.pop();)
            let mMethodCall = trimmed.match(/^([a-zA-Z_]\w*(?:\[.+?\]|\..+?|->.+?)*)\.(\w+)\((.*)\)\s*;$/);
            if (mMethodCall) {
                executeMethod(mMethodCall[1], mMethodCall[2], mMethodCall[3], scope);
                pushStep(idx, `${mMethodCall[1]}.${mMethodCall[2]}()`);
                idx++; continue;
            }

            // Unified Variable Declarations (single or multiple)
            let mDecl = trimmed.match(/^(?:const\s+)?([a-zA-Z_]\w*(?:\s+[a-zA-Z_]\w*)*(?:\s*<.*?>)?(?:\s*\*+)?)\s+([a-zA-Z_]\w*.*);$/);
            if (mDecl) {
                let typeName = mDecl[1].trim();
                let rest = mDecl[2].trim();
                let declarations = splitByTopLevelComma(rest);
                
                for (let decl of declarations) {
                    let varName = '', initVal = undefined;
                    
                    let mInitEq = decl.match(/^([a-zA-Z_]\w*)\s*=\s*(.+)$/);
                    let mInitConstructor = decl.match(/^([a-zA-Z_]\w*)\s*\((.+?)\)$/);
                    
                    if (mInitEq) {
                        varName = mInitEq[1];
                        let expr = mInitEq[2].trim();
                        if (structs[typeName] && expr.startsWith('{') && expr.endsWith('}')) {
                            let elements = splitByTopLevelComma(expr.slice(1, -1)).map(s => cppResolve(s.trim(), scope));
                            initVal = { __type: typeName };
                            structs[typeName].forEach((f, index) => {
                                initVal[f] = elements[index] !== undefined ? elements[index] : null;
                            });
                        } else if (expr.startsWith('new ')) {
                            let className = expr.replace('new ', '').replace(/\(.*?\)/, '').trim();
                            if (structs[className]) {
                                initVal = { __type: className, __id: nextObjId++ };
                                structs[className].forEach(f => { initVal[f] = null; });
                            }
                        } else {
                            initVal = cppResolve(expr, scope);
                        }
                    } else if (mInitConstructor) {
                        varName = mInitConstructor[1];
                        let argStr = mInitConstructor[2].trim();
                        let args = splitByTopLevelComma(argStr).map(s => cppResolve(s.trim(), scope));
                        
                        if (typeName.startsWith('vector')) {
                            if (args.length === 1) {
                                initVal = Array(args[0]).fill(0);
                            } else if (args.length === 2) {
                                initVal = Array(args[0]).fill(args[1]);
                            }
                        } else if (typeName.startsWith('pair')) {
                            initVal = [args[0], args[1]];
                        }
                    } else {
                        varName = decl.trim();
                        if (typeName.startsWith('vector')) initVal = [];
                        else if (typeName.startsWith('map') || typeName.startsWith('unordered_map')) initVal = {};
                        else if (typeName.startsWith('set') || typeName.startsWith('unordered_set')) initVal = { __isSet: true, __values: [] };
                        else if (typeName.startsWith('stack') || typeName.startsWith('queue') || typeName.startsWith('priority_queue') || typeName.startsWith('deque')) initVal = [];
                        else if (typeName === 'string') initVal = '';
                        else if (typeName === 'bool') initVal = false;
                        else if (['int', 'double', 'float', 'long', 'long long', 'size_t'].includes(typeName)) initVal = 0;
                        else if (structs[typeName]) {
                            initVal = { __type: typeName };
                            structs[typeName].forEach(f => { initVal[f] = null; });
                        }
                        else initVal = null;
                    }
                    
                    scope[varName] = initVal;
                    varTypes[varName] = typeName;
                }
                pushStep(idx, `Declare ${rest}`);
                idx++; continue;
            }

            // Unified Assignments (using splitByTopLevelEqual)
            let assignData = splitByTopLevelEqual(trimmed);
            if (assignData) {
                let left = assignData.left;
                let op = assignData.op;
                let right = assignData.right;
                let val = cppResolve(right, scope);
                
                if (op === '=') {
                    setDeepPath(left, scope, val);
                } else {
                    let cur = resolveDeepPath(left, scope);
                    let newVal = op === '+=' ? cur + val : op === '-=' ? cur - val : op === '*=' ? cur * val : cur / val;
                    setDeepPath(left, scope, newVal);
                }
                pushStep(idx, `${left} ${op} ${formatVal(val)}`);
                idx++; continue;
            }

            let mInc = trimmed.match(/^(\w+)\+\+;/); if (mInc) { scope[mInc[1]]++; pushStep(idx, `${mInc[1]}++`); idx++; continue; }
            let mDec = trimmed.match(/^(\w+)--;/); if (mDec) { scope[mDec[1]]--; pushStep(idx, `${mDec[1]}--`); idx++; continue; }

            let mFC = trimmed.match(/^(\w+)\((.*)?\);?$/);
            if (mFC && funcs[mFC[1]]) { pushStep(idx, `Call ${mFC[1]}()`); callFunctionCpp(mFC[1], mFC[2]||'', scope); idx++; continue; }

            idx++;
        }
        return { action: 'done' };
    }

    function cppResolve(expr, scope) {
        if (!expr) return undefined;
        expr = expr.trim();

        if (expr === 'true') return true;
        if (expr === 'false') return false;
        if (expr === 'nullptr' || expr === 'NULL') return null;

        // new expression instantiation
        if (expr.startsWith('new ')) {
            let className = expr.replace('new ', '').replace(/\(.*?\)/, '').trim();
            if (structs[className]) {
                let obj = { __type: className, __id: nextObjId++ };
                structs[className].forEach(f => { obj[f] = null; });
                return obj;
            }
        }

        if (expr.startsWith('(') && expr.endsWith(')')) {
            let depth = 0; let match = true;
            for (let i = 0; i < expr.length - 1; i++) {
                if (expr[i] === '(') depth++;
                else if (expr[i] === ')') depth--;
                if (depth === 0 && i > 0) { match = false; break; }
            }
            if (match) return cppResolve(expr.slice(1, -1), scope);
        }

        if (expr.startsWith('{') && expr.endsWith('}')) {
            return splitByTopLevelComma(expr.slice(1, -1)).map(s => cppResolve(s.trim(), scope));
        }

        let mPath = expr.match(/^[a-zA-Z_]\w*(?:\s*\[.+?\]|\s*\..+?|\s*->.+?)*$/);
        if (mPath) {
            let val = resolveDeepPath(expr, scope);
            if (val !== undefined) return val;
        }

        let funcCallRe = /([a-zA-Z_]\w*)\(([^()]*(?:\([^()]*\)[^()]*)*)\)/;
        let safety = 0;
        let resolved = expr;
        while (safety < 20) {
            let match = resolved.match(funcCallRe);
            if (!match) break;
            if (funcs[match[1]]) {
                let ret = callFunctionCpp(match[1], match[2], scope);
                resolved = resolved.replace(match[0], JSON.stringify(ret));
            } else {
                break;
            }
            safety++;
        }

        return evalExpr(translateCppExprToJs(resolved, scope), scope);
    }

    function callFunctionCpp(funcName, argStr, callerScope) {
        let fDef = funcs[funcName];
        let argVals = argStr.trim() ? argStr.split(',').map(s => evalExpr(translateCppExprToJs(s.trim(), callerScope), callerScope)) : [];
        let locals = {};
        fDef.params.forEach((p, i) => { locals[p] = argVals[i]; });
        callStack.push({name: `${funcName}()`, locals, line: fDef.start});
        let res = executeBlock(fDef.start, fDef.end);
        callStack.pop();
        return res && res.action === 'return' ? res.value : undefined;
    }

    if (funcs['main']) {
        callStack.push({name: "main()", locals: {}, line: funcs['main'].start});
        executeBlock(funcs['main'].start, funcs['main'].end);
    }
    return steps;
}

/* ============================================================
   JAVA TRACER
   ============================================================ */
function traceJava(code) {
    let normalized = code
        .replace(/public\s+class\s+\w+\s*\{/g, '')
        .replace(/public\s+static\s+void\s+main\(String\[\]\s+args\)/g, 'int main()')
        .replace(/public\s+static\s+/g, '')
        .replace(/System\.out\.println\((.*)\)/g, 'cout << $1 << endl')
        .replace(/System\.out\.print\((.*)\)/g, 'cout << $1')
        .replace(/boolean\b/g, 'bool').replace(/String\b/g, 'string')
        .replace(/Integer\.parseInt\((.*)\)/g, 'Number($1)')
        .replace(/Double\.parseDouble\((.*)\)/g, 'Number($1)')
        // ArrayList -> vector normalization
        .replace(/ArrayList\s*<\s*(\w+)\s*>/g, 'vector<$1>')
        .replace(/new\s+ArrayList\s*<[^>]*>\s*\(\)/g, '')
        .replace(/(\w+)\.add\(/g, '$1.push_back(')
        .replace(/(\w+)\.get\((\d+)\)/g, '$1[$2]')
        .replace(/(\w+)\.remove\((\d+)\)/g, '$1.erase($2)')
        .replace(/(\w+)\.contains\((.+?)\)/g, '(function(){for(let __i=0;__i<$1.length;__i++)if($1[__i]===$2)return true;return false;})()')
        .replace(/\bnull\b/g, 'nullptr');
    let jlines = normalized.split('\n');
    for (let ji = jlines.length - 1; ji >= 0; ji--) {
        if (jlines[ji].trim() === '}') { jlines[ji] = ''; break; }
    }
    return traceCpp(jlines.join('\n'));
}

/* ============================================================
   SVG RENDERERS
   ============================================================ */

// --- Linked List SVG ---
function renderLinkedListSVG(headObj) {
    let nodes = [];
    let current = headObj;
    let seen = new Set();
    while (current && typeof current === 'object' && current.__type && !seen.has(current.__id)) {
        seen.add(current.__id);
        nodes.push(current);
        current = current.next;
    }
    if (nodes.length === 0) return '';
    
    const nodeW = 72, nodeH = 40, gap = 36, padX = 16, padY = 20;
    const totalW = nodes.length * nodeW + (nodes.length - 1) * gap + padX * 2;
    const totalH = nodeH + padY * 2 + 16;
    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    const nodeFill = isDark ? '#111827' : '#f0f4ff';
    const nodeStroke = isDark ? '#00f0ff' : '#0ea5e9';
    const textFill = isDark ? '#e2e8f0' : '#0f172a';
    const arrowFill = isDark ? '#00f0ff' : '#0ea5e9';
    const nullFill = isDark ? '#64748b' : '#94a3b8';

    let svg = `<svg width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" xmlns="http://www.w3.org/2000/svg">`;
    svg += `<defs><marker id="llArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="${arrowFill}"/></marker></defs>`;

    nodes.forEach((node, i) => {
        let x = padX + i * (nodeW + gap);
        let y = padY;
        // Node box
        svg += `<rect x="${x}" y="${y}" width="${nodeW}" height="${nodeH}" rx="8" fill="${nodeFill}" stroke="${nodeStroke}" stroke-width="1.5"/>`;
        // Divider
        svg += `<line x1="${x + nodeW * 0.6}" y1="${y}" x2="${x + nodeW * 0.6}" y2="${y + nodeH}" stroke="${nodeStroke}" stroke-width="0.5" opacity="0.4"/>`;
        // Value
        svg += `<text x="${x + nodeW * 0.3}" y="${y + nodeH/2}" fill="${textFill}" font-size="14" font-weight="600" text-anchor="middle" dominant-baseline="central">${node.val !== undefined ? node.val : '?'}</text>`;
        // Pointer indicator
        if (i < nodes.length - 1) {
            svg += `<text x="${x + nodeW * 0.8}" y="${y + nodeH/2}" fill="${arrowFill}" font-size="11" text-anchor="middle" dominant-baseline="central">→</text>`;
            // Arrow line
            svg += `<line x1="${x + nodeW}" y1="${y + nodeH/2}" x2="${x + nodeW + gap}" y2="${y + nodeH/2}" stroke="${arrowFill}" stroke-width="1.5" marker-end="url(#llArrow)"/>`;
        } else {
            // null pointer
            svg += `<text x="${x + nodeW * 0.8}" y="${y + nodeH/2}" fill="${nullFill}" font-size="10" text-anchor="middle" dominant-baseline="central">∅</text>`;
        }
    });
    svg += `</svg>`;
    return svg;
}

// --- Binary Tree SVG ---
function renderTreeSVG(rootObj) {
    if (!rootObj || typeof rootObj !== 'object') return '';
    
    // Calculate tree layout
    let positions = [];
    let maxDepth = 0;
    
    function layoutNode(node, depth, x, spread, parent) {
        if (!node || typeof node !== 'object' || !node.__type) return;
        if (depth > 6) return; // Safety limit
        maxDepth = Math.max(maxDepth, depth);
        let pos = { node, x, y: depth, parent };
        positions.push(pos);
        if (node.left) layoutNode(node.left, depth + 1, x - spread, spread / 2, pos);
        if (node.right) layoutNode(node.right, depth + 1, x + spread, spread / 2, pos);
    }
    
    layoutNode(rootObj, 0, 0, 3, null);
    if (positions.length === 0) return '';
    
    // Normalize positions
    let minX = Math.min(...positions.map(p => p.x));
    let maxX = Math.max(...positions.map(p => p.x));
    
    const nodeR = 20, padX = 40, padY = 30, levelH = 65;
    const rangeX = maxX - minX || 1;
    const width = Math.max(rangeX * 55 + padX * 2, 200);
    const height = (maxDepth + 1) * levelH + padY * 2;
    
    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    const nodeFill = isDark ? '#111827' : '#f0f4ff';
    const nodeStroke = isDark ? '#9d4edd' : '#7e22ce';
    const textFill = isDark ? '#e2e8f0' : '#0f172a';
    const edgeColor = isDark ? 'rgba(157,78,221,0.5)' : 'rgba(126,34,206,0.4)';
    
    let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">`;
    
    // Draw edges first
    positions.forEach(pos => {
        if (pos.parent) {
            let px = padX + ((pos.parent.x - minX) / rangeX) * (width - padX * 2);
            let py = padY + pos.parent.y * levelH + nodeR;
            let cx = padX + ((pos.x - minX) / rangeX) * (width - padX * 2);
            let cy = padY + pos.y * levelH - nodeR;
            if (rangeX === 0) { px = width / 2; cx = width / 2; }
            svg += `<line x1="${px}" y1="${py}" x2="${cx}" y2="${cy}" stroke="${edgeColor}" stroke-width="2"/>`;
        }
    });
    
    // Draw nodes
    positions.forEach(pos => {
        let cx = padX + ((pos.x - minX) / rangeX) * (width - padX * 2);
        if (rangeX === 0) cx = width / 2;
        let cy = padY + pos.y * levelH;
        svg += `<circle cx="${cx}" cy="${cy}" r="${nodeR}" fill="${nodeFill}" stroke="${nodeStroke}" stroke-width="2" class="node-circle"/>`;
        svg += `<text x="${cx}" y="${cy}" fill="${textFill}" font-size="13" font-weight="600" text-anchor="middle" dominant-baseline="central">${pos.node.val !== undefined ? pos.node.val : '?'}</text>`;
    });
    
    svg += `</svg>`;
    return svg;
}

// --- Graph SVG (Adjacency List) ---
function renderGraphSVG(adjList) {
    let nodeKeys = Object.keys(adjList).filter(k => !k.startsWith('__'));
    if (nodeKeys.length === 0) return '';
    
    const n = nodeKeys.length;
    const padX = 40, padY = 40, nodeR = 22;
    const radius = Math.max(60, n * 22);
    const width = radius * 2 + padX * 2;
    const height = radius * 2 + padY * 2;
    const cx = width / 2, cy = height / 2;
    
    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    const nodeFill = isDark ? '#111827' : '#f0f4ff';
    const nodeStroke = isDark ? '#00bfa5' : '#0d9488';
    const textFill = isDark ? '#e2e8f0' : '#0f172a';
    const edgeColor = isDark ? 'rgba(0,191,165,0.4)' : 'rgba(13,148,136,0.35)';
    
    // Position nodes in a circle
    let positions = {};
    nodeKeys.forEach((key, i) => {
        let angle = (2 * Math.PI * i) / n - Math.PI / 2;
        positions[key] = { x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle) };
    });
    
    let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">`;
    svg += `<defs><marker id="gArrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="${edgeColor}"/></marker></defs>`;
    
    // Draw edges
    let drawnEdges = new Set();
    nodeKeys.forEach(key => {
        let neighbors = adjList[key];
        if (!Array.isArray(neighbors)) return;
        neighbors.forEach(nb => {
            let nbKey = String(nb);
            let edgeId = [key, nbKey].sort().join('-');
            if (drawnEdges.has(edgeId) || !positions[nbKey]) return;
            drawnEdges.add(edgeId);
            let p1 = positions[key], p2 = positions[nbKey];
            // Shorten line to not overlap circles
            let dx = p2.x - p1.x, dy = p2.y - p1.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            let sx = p1.x + (dx/dist) * nodeR, sy = p1.y + (dy/dist) * nodeR;
            let ex = p2.x - (dx/dist) * nodeR, ey = p2.y - (dy/dist) * nodeR;
            svg += `<line x1="${sx}" y1="${sy}" x2="${ex}" y2="${ey}" stroke="${edgeColor}" stroke-width="2"/>`;
        });
    });
    
    // Draw nodes
    nodeKeys.forEach(key => {
        let p = positions[key];
        svg += `<circle cx="${p.x}" cy="${p.y}" r="${nodeR}" fill="${nodeFill}" stroke="${nodeStroke}" stroke-width="2"/>`;
        svg += `<text x="${p.x}" y="${p.y}" fill="${textFill}" font-size="13" font-weight="600" text-anchor="middle" dominant-baseline="central">${key}</text>`;
    });
    
    svg += `</svg>`;
    return svg;
}

/* ============================================================
   ANIMATION & STATE LOGIC
   ============================================================ */
let currentSteps = [], animTimer = null, currentStepIdx = 0, speed = 420, accumulatedOutput = '';

const runBtn = document.getElementById('btn-run');
const speedSlider = document.getElementById('speed-slider');
const speedLabel = document.getElementById('speed-label');
const btnReset = document.getElementById('btn-reset');
const progressBar = document.getElementById('progress-bar');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnRunBp = document.getElementById('btn-run-bp');
const dashboardLayout = document.getElementById('dashboard-layout');
const welcomeMsg = document.getElementById('welcome-message');
const stepCounter = document.getElementById('step-counter');
const stepAction = document.getElementById('step-action');
const stepNote = document.getElementById('step-note');
const dashboardBody = document.getElementById('dashboard-body');
const callStackBar = document.getElementById('call-stack');
const timelineSlider = document.getElementById('timeline-slider');

const speedMap = { 0: 900, 1: 420, 2: 130, 3: 0 };
const speedLabels = { 0: 'Slow', 1: 'Normal', 2: 'Fast', 3: 'Instant' };

speedSlider.addEventListener('input', (e) => {
    let val = parseInt(e.target.value);
    speed = speedMap[val]; speedLabel.textContent = speedLabels[val];
    if (animTimer && speed > 0) { clearInterval(animTimer); animTimer = setInterval(stepForward, speed); }
});

function setStatus(state, msg) { statusDot.className = 'status-dot ' + state; statusText.textContent = msg; }

function resetDashboard() {
    dashboardLayout.style.display = 'none'; welcomeMsg.style.display = 'flex';
    dashboardBody.innerHTML = ''; callStackBar.innerHTML = '<span class="call-stack-label">Call Stack</span>';
    accumulatedOutput = ''; currentSteps = []; currentStepIdx = 0;
    progressBar.style.width = '0%'; highlightLine(0);
    runBtn.innerHTML = '<span>▶ Run Trace</span><kbd style="font-size: 0.55rem; opacity: 0.7; font-family: var(--font-mono); font-weight: normal; background: rgba(0,0,0,0.2); padding: 0.1rem 0.2rem; border-radius: 3px;">Ctrl+Enter</kbd>';
}

runBtn.addEventListener('click', () => {
    if (animTimer) {
        // Currently running -> Pause
        stopAnimation();
        runBtn.innerHTML = '<span>▶ Resume Trace</span>';
        setStatus('idle', 'Paused');
    } else if (currentSteps.length > 0 && currentStepIdx > 0 && currentStepIdx < currentSteps.length - 1) {
        // Paused -> Resume
        if (speed > 0) {
            animTimer = setInterval(stepForward, speed);
            runBtn.innerHTML = '<span>⏸ Pause Trace</span>';
            setStatus('running', 'Executing...');
        }
    } else {
        // Idle -> Start new trace
        startTrace();
    }
});
document.addEventListener('keydown', (e) => { if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); startTrace(); } });

function startTrace() {
    const code = editor.value;
    if (!code.trim()) return;
    prepareStdin(); stopAnimation(); accumulatedOutput = '';
    setStatus('running', 'Parsing...');
    try {
        if (currentLang === 'python') currentSteps = tracePython(code);
        else if (currentLang === 'cpp') currentSteps = traceCpp(code);
        else if (currentLang === 'java') currentSteps = traceJava(code);
        if (currentSteps.length === 0) { setStatus('error', 'No steps generated. Check syntax.'); return; }
        currentStepIdx = 0;
        timelineSlider.max = currentSteps.length - 1; timelineSlider.value = 0; timelineSlider.disabled = false;
        setStatus('running', 'Executing...');
        if (speed === 0) { while (currentStepIdx < currentSteps.length) renderStep(currentStepIdx++); finishTrace(); }
        else { 
            btnRunBp.disabled = false; 
            animTimer = setInterval(stepForward, speed); 
            runBtn.innerHTML = '<span>⏸ Pause Trace</span>';
        }
    } catch (e) { setStatus('error', 'Error: ' + e.message); console.error(e); }
}

function stopAnimation() {
    if (animTimer) clearInterval(animTimer); animTimer = null;
    btnPrev.disabled = currentStepIdx === 0; btnReset.disabled = currentStepIdx === 0;
    btnRunBp.disabled = currentStepIdx >= currentSteps.length - 1;
    btnNext.disabled = currentStepIdx >= currentSteps.length - 1;
}

function finishTrace() {
    stopAnimation(); setStatus('', 'Completed.');
    btnPrev.disabled = false; btnReset.disabled = false; btnNext.disabled = true;
    runBtn.innerHTML = '<span>▶ Run Trace</span><kbd style="font-size: 0.55rem; opacity: 0.7; font-family: var(--font-mono); font-weight: normal; background: rgba(0,0,0,0.2); padding: 0.1rem 0.2rem; border-radius: 3px;">Ctrl+Enter</kbd>';
    highlightLine(0);
}

function stepForward() {
    if (currentStepIdx >= currentSteps.length) { finishTrace(); return; }
    renderStep(currentStepIdx); currentStepIdx++;
    progressBar.style.width = `${(currentStepIdx / currentSteps.length) * 100}%`;
}

btnReset.addEventListener('click', () => { if (currentSteps.length > 0) { stopAnimation(); currentStepIdx = 0; accumulatedOutput = ''; renderStep(0); } });

timelineSlider.addEventListener('input', (e) => {
    let val = parseInt(e.target.value);
    if (val < currentSteps.length) { stopAnimation(); currentStepIdx = val; renderStep(currentStepIdx); }
});

document.getElementById('delta-changes-toggle').addEventListener('change', () => { if (currentSteps.length > 0) renderStep(currentStepIdx); });

/* ============================================================
   RENDER STEP — with data structure detection
   ============================================================ */
function renderStep(idx) {
    const step = currentSteps[idx];
    welcomeMsg.style.display = 'none';
    dashboardLayout.style.display = 'flex';
    
    stepCounter.textContent = `Step ${idx + 1} / ${currentSteps.length}`;
    stepAction.textContent = `L${step.line}: ${step.desc}`;
    stepNote.textContent = step.note || '';
    
    const deltaOnly = document.getElementById('delta-changes-toggle').checked;
    
    // Classify variables
    let primitives = [], arrays = [], dicts = [], sets = [], linkedLists = [], trees = [], graphs = [], strings = [];
    
    step.vars.forEach(v => {
        if (deltaOnly && !v.changed) return;
        let raw = v.rawValue;
        if (raw === null || raw === undefined) { primitives.push(v); return; }
        
        if (typeof raw === 'object' && !Array.isArray(raw)) {
            // Linked list node
            if (raw.__type && 'val' in raw && 'next' in raw && !('left' in raw)) {
                linkedLists.push(v); return;
            }
            // Tree node
            if (raw.__type && 'val' in raw && 'left' in raw && 'right' in raw) {
                trees.push(v); return;
            }
            // Set
            if (raw.__isSet) { sets.push(v); return; }
            // Dict
            if (raw.__isDict || (typeof raw === 'object' && !raw.__type)) {
                // Check if it's a graph (dict of arrays)
                let keys = Object.keys(raw).filter(k => !k.startsWith('__'));
                let isGraph = keys.length > 0 && keys.every(k => Array.isArray(raw[k]));
                if (isGraph && keys.length >= 2) { graphs.push(v); }
                else { dicts.push(v); }
                return;
            }
        }
        
        if (Array.isArray(raw)) { arrays.push(v); return; }
        if (typeof raw === 'string' && raw.length > 1 && v.name !== 'self') { strings.push(v); return; }
        primitives.push(v);
    });
    
    let html = '';
    
    // === Data Structures Canvas (Linked Lists, Trees, Graphs) ===
    if (linkedLists.length > 0 || trees.length > 0 || graphs.length > 0) {
        html += `<div class="viz-section" id="viz-ds">
            <div class="viz-section-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <span>📊 Data Structures <span class="viz-section-badge">${linkedLists.length + trees.length + graphs.length}</span></span>
                <span class="chevron">▼</span>
            </div>
            <div class="viz-section-content">`;
        
        linkedLists.forEach(v => {
            html += `<div class="array-title">${v.name} <span class="arr-len" style="color:var(--accent-cyan)">Linked List</span></div>`;
            html += `<div class="ds-canvas-container">${renderLinkedListSVG(v.rawValue)}</div>`;
        });
        trees.forEach(v => {
            html += `<div class="array-title">${v.name} <span class="arr-len" style="color:var(--accent-purple)">Tree</span></div>`;
            html += `<div class="ds-canvas-container">${renderTreeSVG(v.rawValue)}</div>`;
        });
        graphs.forEach(v => {
            html += `<div class="array-title">${v.name} <span class="arr-len" style="color:var(--accent-teal)">Graph</span></div>`;
            html += `<div class="ds-canvas-container">${renderGraphSVG(v.rawValue)}</div>`;
        });
        html += `</div></div>`;
    }
    
    // === Variables ===
    if (primitives.length > 0) {
        html += `<div class="viz-section" id="viz-vars">
            <div class="viz-section-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <span>🔢 Variables <span class="viz-section-badge">${primitives.length}</span></span>
                <span class="chevron">▼</span>
            </div>
            <div class="viz-section-content"><div class="node-container">`;
        
        primitives.forEach(v => {
            let typeName = typeof v.rawValue;
            if (v.rawValue === null || v.rawValue === undefined) typeName = 'null';
            else if (typeName === 'number') typeName = Number.isInteger(v.rawValue) ? 'int' : 'float';
            else if (typeName === 'string') typeName = 'str';
            else if (typeName === 'boolean') typeName = 'bool';
            
            let badgeColor = 'var(--text-tertiary)';

            else if (typeName === 'str') { badgeColor = 'var(--accent-green)'; badgeBg = 'rgba(57,255,20,0.1)'; }
            else if (typeName === 'bool') { badgeColor = 'var(--accent-purple)'; badgeBg = 'rgba(157,78,221,0.1)'; }
            
            let displayVal = v.rawValue === null ? 'None' : v.rawValue === undefined ? 'undef' : v.stringValue;

                <div class="node-val">${escHtml(displayVal)}</div>

        html += `</div></div></div>`;
    }
    
    // === Arrays ===
    if (arrays.length > 0) {

                <span class="chevron">▼</span>

        arrays.forEach(v => {

                if (pv && pv.rawValue && pv.rawValue.__isSet) prevSet = pv.rawValue.__values || [];
            }
            html += `<div class="array-title">${escHtml(v.name)} <span class="arr-len">size=${vals.length}</span></div>
                <div class="set-container">`;
            vals.forEach(sv => {
                let isNew = prevSet ? !prevSet.includes(sv) : true;
                html += `<div class="set-tag ${isNew ? 'new-item' : ''}">${escHtml(String(sv))}</div>`;
            });
            html += `</div>`;
        });
        html += `</div></div>`;
    }
    
    // === Console Output ===
    accumulatedOutput = '';
    for (let si = 0; si <= idx; si++) {
        if (currentSteps[si].output) accumulatedOutput += currentSteps[si].output + '\n';
    }
    
    html += `<div class="viz-section" id="viz-console">
        <div class="viz-section-header" onclick="this.parentElement.classList.toggle('collapsed')">
            <span>💻 Console Output</span>
            <span class="chevron">▼</span>
        </div>
        <div class="viz-section-content">
            <div class="console-output">${escHtml(accumulatedOutput) || '<span style="opacity:0.4">No output yet</span>'}</div>
        </div>
    </div>`;
    
    dashboardBody.innerHTML = html;
    
    highlightLine(step.line);
    
    // Call stack
    callStackBar.innerHTML = '<span class="call-stack-label">Stack</span>' +
        step.stack.map(frame => `<div class="stack-frame">${escHtml(frame)}</div>`)
        .join('<span style="color: var(--border-primary); margin: 0 3px;">→</span>');
    
    timelineSlider.value = idx;
    progressBar.style.width = `${((idx + 1) / currentSteps.length) * 100}%`;
}

function escHtml(s) {
    if (typeof s !== 'string') s = String(s);
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* ============================================================
   STEP NAVIGATION
   ============================================================ */
btnPrev.addEventListener('click', () => {
    stopAnimation();
    if (currentStepIdx > 0) { currentStepIdx--; renderStep(currentStepIdx); }
    btnNext.disabled = currentStepIdx >= currentSteps.length - 1;
    btnPrev.disabled = currentStepIdx <= 0;
});

btnNext.addEventListener('click', () => {
    stopAnimation();
    if (currentStepIdx < currentSteps.length - 1) { currentStepIdx++; renderStep(currentStepIdx); }
    btnPrev.disabled = false;
    if (currentStepIdx >= currentSteps.length - 1) btnNext.disabled = true;
});

/* ============================================================
   FONT SIZE
   ============================================================ */
let currentFontSize = 13;
document.getElementById('btn-font-inc').addEventListener('click', () => {
    if (currentFontSize < 22) { currentFontSize += 2; document.querySelector('.CodeMirror').style.fontSize = currentFontSize + 'px'; cmEditor.refresh(); }
});
document.getElementById('btn-font-dec').addEventListener('click', () => {
    if (currentFontSize > 10) { currentFontSize -= 2; document.querySelector('.CodeMirror').style.fontSize = currentFontSize + 'px'; cmEditor.refresh(); }
});

/* ============================================================
   BREAKPOINTS
   ============================================================ */
const activeBreakpoints = new Set();

function makeMarker() {
    const m = document.createElement("div");
    m.style.color = "var(--accent-red)"; m.style.fontWeight = "bold"; m.innerHTML = "●";
    return m;
}

cmEditor.on("gutterClick", (cm, n) => {
    const lineNum = n + 1;
    if (activeBreakpoints.has(lineNum)) { activeBreakpoints.delete(lineNum); cm.setGutterMarker(n, "breakpoints", null); }
    else { activeBreakpoints.add(lineNum); cm.setGutterMarker(n, "breakpoints", makeMarker()); }
    btnRunBp.innerHTML = activeBreakpoints.size > 0
        ? `⏭ BP <span style="background:var(--accent-red);color:#fff;padding:1px 5px;border-radius:10px;font-size:0.65rem;">${activeBreakpoints.size}</span>`
        : `⏭ BP`;
});

btnRunBp.addEventListener('click', () => {
    if (currentSteps.length === 0) return;
    let target = currentStepIdx + 1;
    while (target < currentSteps.length) {
        if (activeBreakpoints.has(currentSteps[target].line)) { currentStepIdx = target; renderStep(currentStepIdx); return; }
        target++;
    }
    currentStepIdx = currentSteps.length - 1; renderStep(currentStepIdx);
});

/* ============================================================
   COPY, DOWNLOAD, SHARE
   ============================================================ */
document.getElementById('btn-share').addEventListener('click', () => {
    const data = JSON.stringify({ lang: currentLang, code: editor.value, input: document.getElementById('stdin-input').value });
    const hash = btoa(unescape(encodeURIComponent(data)));
    const url = new URL(window.location); url.hash = hash;
    navigator.clipboard.writeText(url.toString());
    setStatus('running', 'Share URL copied!'); setTimeout(() => setStatus('idle', 'Idle'), 2000);
});

document.getElementById('btn-copy').addEventListener('click', () => {
    navigator.clipboard.writeText(editor.value);
    setStatus('running', 'Copied!'); setTimeout(() => setStatus('idle', 'Idle'), 2000);
});

document.getElementById('btn-download').addEventListener('click', () => {
    const ext = currentLang === 'python' ? 'py' : (currentLang === 'cpp' ? 'cpp' : 'java');
    const blob = new Blob([editor.value], {type: 'text/plain'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `solution.${ext}`; a.click();
});

/* ============================================================
   INIT
   ============================================================ */
populateExamples();
const firstExample = Object.keys(EXAMPLES['python'])[0];
editor.value = EXAMPLES['python'][firstExample].code;
document.getElementById('stdin-input').value = EXAMPLES['python'][firstExample].input;

if (window.location.hash) {
    try {
        const hash = window.location.hash.substring(1);
        const data = JSON.parse(decodeURIComponent(escape(atob(hash))));
        if (data.lang && data.code !== undefined) {
            currentLang = data.lang;
            const tab = Array.from(langTabs).find(t => t.dataset.lang === data.lang);
            if (tab) { langTabs.forEach(t => t.classList.remove('active')); tab.classList.add('active'); }
            if (currentLang === 'python') cmEditor.setOption("mode", "python");
            else if (currentLang === 'cpp') cmEditor.setOption("mode", "text/x-c++src");
            else if (currentLang === 'java') cmEditor.setOption("mode", "text/x-java");
            populateExamples(); editor.value = data.code;
            document.getElementById('stdin-input').value = data.input || '';
        }
    } catch(e) { console.error("Invalid share link", e); }
}

setTimeout(() => cmEditor.refresh(), 100);
highlightLine(0);

</script>
</body>
