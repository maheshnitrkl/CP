<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Visualizer / Dry Run</title>
    <meta name="description" content="Step-by-step code visualizer supporting arrays, linked lists, trees, graphs, dictionaries, stacks, queues and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CodeMirror 5 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.min.js"></script>
    
    <style>
        /* ============================================================
           CSS DESIGN SYSTEM
           ============================================================ */
        :root {
            --bg-base: #06090e;
            --bg-surface: rgba(15, 20, 30, 0.75);
            --bg-elevated: rgba(30, 35, 50, 0.85);
            --bg-card: rgba(12, 16, 26, 0.9);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --accent-cyan: #00f0ff;
            --accent-green: #39ff14;
            --accent-purple: #9d4edd;
            --accent-pink: #f72585;
            --accent-yellow: #ffea00;
            --accent-red: #ff1744;
            --accent-orange: #ff9100;
            --accent-teal: #00bfa5;
            --border-primary: rgba(255, 255, 255, 0.08);
            --border-active: rgba(0, 240, 255, 0.4);
            --font-mono: 'Fira Code', 'Consolas', 'Monaco', monospace;
            --font-sans: 'Inter', 'Segoe UI', system-ui, sans-serif;
            --glass-blur: blur(12px);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --shadow-card: 0 4px 24px rgba(0,0,0,0.4);
            --shadow-glow-cyan: 0 0 20px rgba(0,240,255,0.15);
            --shadow-glow-green: 0 0 20px rgba(57,255,20,0.15);
            --shadow-glow-purple: 0 0 20px rgba(157,78,221,0.15);
        }

        [data-theme="light"] {
            --bg-base: #f1f5f9;
            --bg-surface: rgba(255, 255, 255, 0.8);
            --bg-elevated: rgba(255, 255, 255, 0.9);
            --bg-card: rgba(255, 255, 255, 0.95);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-tertiary: #64748b;
            --accent-cyan: #0ea5e9;
            --accent-green: #16a34a;
            --accent-purple: #7e22ce;
            --accent-pink: #be185d;
            --accent-yellow: #ca8a04;
            --accent-red: #dc2626;
            --accent-orange: #ea580c;
            --accent-teal: #0d9488;
            --border-primary: rgba(0, 0, 0, 0.1);
            --border-active: rgba(14, 165, 233, 0.4);
            --shadow-card: 0 4px 24px rgba(0,0,0,0.08);
            --shadow-glow-cyan: 0 0 20px rgba(14,165,233,0.1);
            --shadow-glow-green: 0 0 20px rgba(22,163,74,0.1);
            --shadow-glow-purple: 0 0 20px rgba(126,34,206,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-sans);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

        /* ---- Navbar ---- */
        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.75rem 1.5rem;
            background: rgba(15, 15, 19, 0.92);
            border-bottom: 1px solid var(--border-primary);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .navbar__brand { color: var(--text-primary); text-decoration: none; font-weight: 700; font-size: 1.15rem; display: flex; align-items: center; gap: 0.5rem; }
        .navbar__nav { display: flex; gap: 1.25rem; align-items: center; }
        .navbar__link { color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color 0.2s; }
        .navbar__link:hover, .navbar__link.active { color: var(--accent-cyan); }
        .theme-toggle { background: transparent; border: none; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; transition: all 0.2s; }
        .theme-toggle:hover { background: var(--bg-elevated); color: var(--text-primary); }

        /* ---- Main Layout ---- */
        .visualizer-container {
            display: flex; flex: 1; overflow: hidden;
            gap: 0.25rem; padding: 0.75rem;
            background: radial-gradient(ellipse at 50% 0%, #0d121c 0%, var(--bg-base) 70%);
        }

        .resizer {
            width: 8px; cursor: col-resize;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px; transition: background 0.2s;
            display: flex; align-items: center; justify-content: center;
            z-index: 10;
        }
        .resizer:hover, .resizer:active { background: rgba(0, 240, 255, 0.2); }
        .resizer::after {
            content: ''; display: block; width: 2px; height: 30px;
            background: rgba(255, 255, 255, 0.2); border-radius: 1px;
        }

        /* ---- Editor Panel ---- */
        .editor-panel {
            flex: 1 1 55%; min-width: 380px;
            display: flex; flex-direction: column;
            background: var(--bg-surface);
            backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-primary);
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }

        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.4rem 0.8rem;
            background: rgba(0, 0, 0, 0.25);
            border-bottom: 1px solid var(--border-primary);
            font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);
            gap: 0.5rem; flex-wrap: wrap;
        }
        .panel-header .header-actions { display: flex; gap: 0.25rem; flex-wrap: wrap; }

        .lang-tabs { display: flex; gap: 0.25rem; }
        .lang-tab {
            padding: 0.2rem 0.65rem; border-radius: 4px; cursor: pointer;
            color: var(--text-tertiary); transition: all 0.2s; font-size: 0.8rem; font-weight: 600;
        }
        .lang-tab.active { background: var(--bg-elevated); color: var(--accent-cyan); }
        .lang-tab:hover:not(.active) { color: var(--text-secondary); }

        .btn-mini {
            padding: 0.15rem 0.5rem; border-radius: 4px; cursor: pointer;
            background: transparent; border: 1px solid var(--border-primary);
            color: var(--text-tertiary); font-size: 0.7rem; font-weight: 600;
            font-family: var(--font-sans); transition: all 0.2s;
        }
        .btn-mini:hover { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border-active); }

        .editor-wrapper { flex: 1; display: flex; overflow: hidden; position: relative; min-height: 0; }

        /* CodeMirror Overrides */
        .CodeMirror { height: 100%; width: 100%; flex: 1; font-family: var(--font-mono); font-size: 13px; background: transparent !important; color: var(--text-primary) !important; }
        .CodeMirror-gutters { background: transparent !important; border-right: 1px solid var(--border-primary) !important; }
        .CodeMirror-linenumber { color: var(--text-tertiary) !important; }
        .CodeMirror-activeline-background { background: rgba(0, 240, 255, 0.08) !important; }
        .CodeMirror-activeline-gutter { background: rgba(0, 240, 255, 0.08) !important; color: var(--accent-cyan) !important; font-weight: bold; }
        .cm-s-dracula .CodeMirror-cursor { border-left: 2px solid var(--text-primary) !important; }
        .CodeMirror-selected { background: rgba(255, 255, 255, 0.12) !important; }

        .controls {
            padding: 0.4rem 0.6rem;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--border-primary);
            display: flex; gap: 0.3rem; align-items: center; flex-wrap: wrap;
        }
        .btn {
            padding: 0.3rem 0.6rem; border: none; border-radius: var(--radius-sm);
            font-family: var(--font-sans); font-size: 0.75rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.3rem;
        }
        .btn-primary { background: var(--accent-cyan); color: #000; }
        .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
        .btn-secondary { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border-primary); }
        .btn-secondary:hover { border-color: var(--border-active); }
        .btn-icon { padding: 0.25rem 0.4rem; background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border-primary); border-radius: var(--radius-sm); cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; }
        .btn-icon:hover { border-color: var(--border-active); }
        .btn:disabled, .btn-icon:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        select.btn-secondary { appearance: none; padding-right: 1.8rem; background-image: url('data:image/svg+xml;utf8,<svg fill="%23fff" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>'); background-repeat: no-repeat; background-position: right 0.4rem center; background-size: 16px; }

        /* ---- Trace Panel ---- */
        .trace-panel {
            flex: 1 1 45%; display: flex; flex-direction: column;
            background: var(--bg-surface);
            backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-primary);
            box-shadow: var(--shadow-card);
            min-width: 320px; overflow: hidden;
        }
        .dashboard-layout { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .dashboard-header {
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.25);
            border-bottom: 1px solid var(--border-primary);
            display: flex; justify-content: space-between; align-items: center;
        }
        .step-counter { font-size: 0.8rem; color: var(--text-tertiary); font-weight: 600; font-family: var(--font-mono); }
        .step-action { font-size: 0.95rem; color: var(--accent-cyan); font-weight: 600; text-shadow: 0 0 10px rgba(0, 240, 255, 0.2); }
        .step-note { font-size: 0.8rem; color: var(--accent-yellow); font-style: italic; margin-top: 0.15rem; }

        /* Dashboard Body — vertical scroll with sections */
        .dashboard-body {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        /* ---- Visualization Sections ---- */
        .viz-section {
            border-bottom: 1px solid var(--border-primary);
        }
        .viz-section:last-child { border-bottom: none; }
        .viz-section-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.45rem 1rem; cursor: pointer; user-select: none;
            background: rgba(0, 0, 0, 0.15);
            font-size: 0.7rem; font-weight: 700; color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: 0.06em;
            transition: background 0.2s;
        }
        .viz-section-header:hover { background: rgba(0, 0, 0, 0.25); }
        .viz-section-header .chevron { transition: transform 0.2s; font-size: 0.85rem; }
        .viz-section.collapsed .viz-section-content { display: none; }
        .viz-section.collapsed .chevron { transform: rotate(-90deg); }
        .viz-section-content { padding: 0.75rem 1rem; }
        .viz-section-badge {
            font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 8px;
            background: var(--accent-cyan); color: #000; font-weight: 700; margin-left: 0.5rem;
        }

        /* ---- Variable Node Cards ---- */
        .node-container { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .node-card {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            padding: 0.5rem 0.75rem;
            display: flex; flex-direction: column; gap: 0.2rem;
            min-width: 85px; max-width: 160px;
            transition: all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .node-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: var(--border-primary); transition: background 0.3s;
        }
        @keyframes cardFlash {
            0% { border-color: var(--accent-yellow); box-shadow: 0 0 16px rgba(255,234,0,0.3); }
            100% { border-color: var(--accent-cyan); box-shadow: var(--shadow-glow-cyan); }
        }
        .node-card.changed {
            animation: cardFlash 0.6s ease forwards;
        }
        .node-card.changed::before { background: var(--accent-cyan); }
        .node-name {
            font-size: 0.65rem; color: var(--text-tertiary); text-transform: uppercase;
            letter-spacing: 0.04em; font-weight: 700;
            display: flex; justify-content: space-between; align-items: center;
        }
        .node-type-badge {
            font-size: 0.55rem; padding: 0.05rem 0.35rem; border-radius: 4px;
            font-weight: 700; text-transform: lowercase; letter-spacing: 0;
        }
        .node-val { font-family: var(--font-mono); font-size: 1rem; color: var(--text-primary); font-weight: 500; word-break: break-all; }
        .node-card.changed .node-val { color: var(--accent-cyan); text-shadow: 0 0 8px rgba(0,240,255,0.3); }

        /* ---- Array Visualization ---- */
        .array-container { margin-bottom: 1rem; }
        .array-title {
            font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-secondary);
            margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .array-title .arr-len { font-size: 0.65rem; color: var(--text-tertiary); }
        .array-blocks { display: flex; flex-wrap: wrap; gap: 14px 4px; position: relative; }
        .array-block-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 2.8rem;
        }
        .array-block {
            background: var(--bg-card); border: 1px solid var(--border-primary);
            width: 100%; height: 2.8rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; border-radius: var(--radius-sm);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .array-block.changed {
            border-color: var(--accent-green); background: rgba(57,255,20,0.08);
            box-shadow: var(--shadow-glow-green);
        }
        .array-block.changed .array-val { color: var(--accent-green); }
        .array-val { font-family: var(--font-mono); font-size: 0.85rem; font-weight: 600; color: var(--text-primary); }
        .array-idx { font-size: 0.6rem; color: var(--text-tertiary); font-family: var(--font-mono); margin-top: 0.2rem; }
        .cell-pointers {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 2px;
        }
        .cell-pointer {
            font-size: 0.55rem;
            font-weight: 700;
            font-family: var(--font-mono);
            line-height: 1.1;
            margin-top: 1px;
        }
        .array-2d-row { display: flex; gap: 3px; margin-bottom: 3px; align-items: center; }
        .array-2d-row-label { font-size: 0.6rem; color: var(--text-tertiary); font-family: var(--font-mono); width: 1.2rem; text-align: right; margin-right: 0.3rem; flex-shrink: 0; }

        /* ---- String Character Blocks ---- */
        .string-blocks { display: flex; flex-wrap: wrap; gap: 10px 2px; }
        .string-block-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 2rem;
        }
        .string-block {
            background: var(--bg-card); border: 1px solid rgba(157,78,221,0.25);
            width: 100%; height: 2.2rem;
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px;
            font-family: var(--font-mono); font-size: 0.9rem; font-weight: 600;
            color: var(--accent-purple);
        }
        .char-idx { font-size: 0.55rem; color: var(--text-tertiary); font-family: var(--font-mono); margin-top: 0.2rem; }

        /* ---- Dictionary / HashMap Visualization ---- */
        .dict-container { margin-bottom: 1rem; }
        .dict-table {
            width: 100%; border-collapse: separate; border-spacing: 0;
            border-radius: var(--radius-md); overflow: hidden;
            border: 1px solid var(--border-primary);
        }
        .dict-table th {
            background: rgba(0,0,0,0.3); padding: 0.3rem 0.6rem;
            font-size: 0.65rem; text-transform: uppercase; color: var(--text-tertiary);
            letter-spacing: 0.04em; font-weight: 700; text-align: left;
        }
        .dict-table td {
            padding: 0.35rem 0.6rem; font-family: var(--font-mono); font-size: 0.8rem;
            border-top: 1px solid var(--border-primary); color: var(--text-primary);
        }
        .dict-table tr.changed td { background: rgba(0,240,255,0.06); }
        .dict-key { color: var(--accent-orange); font-weight: 600; }
        .dict-val { color: var(--text-primary); }

        /* ---- Set Visualization ---- */
        .set-container { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
        .set-tag {
            background: rgba(157,78,221,0.1); border: 1px solid rgba(157,78,221,0.3);
            padding: 0.25rem 0.6rem; border-radius: 20px;
            font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent-purple); font-weight: 600;
        }
        .set-tag.new-item { border-color: var(--accent-green); color: var(--accent-green); background: rgba(57,255,20,0.08); box-shadow: var(--shadow-glow-green); }

        /* ---- Stack / Queue Visualization ---- */
        .stack-viz { display: flex; flex-direction: column-reverse; gap: 2px; max-height: 200px; overflow-y: auto; }
        .stack-item {
            background: var(--bg-card); border: 1px solid var(--border-primary);
            padding: 0.3rem 0.75rem; border-radius: 4px;
            font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-primary);
            text-align: center; transition: all 0.3s;
        }
        .stack-item:last-child { border-color: var(--accent-cyan); color: var(--accent-cyan); background: rgba(0,240,255,0.06); }
        .stack-label { font-size: 0.6rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.04em; margin-left: 0.3rem; }

        .queue-viz { display: flex; gap: 2px; overflow-x: auto; padding-bottom: 0.3rem; }
        .queue-item {
            background: var(--bg-card); border: 1px solid var(--border-primary);
            padding: 0.3rem 0.75rem; border-radius: 4px;
            font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-primary);
            text-align: center; white-space: nowrap; flex-shrink: 0;
        }
        .queue-item:first-child { border-color: var(--accent-green); color: var(--accent-green); }
        .queue-item:last-child { border-color: var(--accent-orange); color: var(--accent-orange); }

        /* ---- SVG Data Structure Canvas ---- */
        .ds-canvas-container {
            background: rgba(0,0,0,0.15); border-radius: var(--radius-md);
            overflow: auto; min-height: 80px; max-height: 320px;
            display: flex; align-items: center; justify-content: center;
            padding: 0.5rem; margin-bottom: 0.5rem;
        }
        .ds-canvas-container svg { display: block; }
        .ds-canvas-container svg text { font-family: var(--font-mono); }
        .ds-canvas-container svg .node-circle { transition: all 0.3s; }
        .ds-canvas-container svg .edge-line { stroke: var(--text-tertiary); stroke-width: 1.5; }
        .ds-canvas-container svg .node-label { fill: var(--text-primary); font-size: 13px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
        .ds-canvas-container svg .edge-label { fill: var(--text-tertiary); font-size: 10px; text-anchor: middle; }

        /* ---- Console Output ---- */
        .console-output {
            background: rgba(0, 0, 0, 0.2); border-radius: var(--radius-sm);
            font-family: var(--font-mono); font-size: 0.82rem; color: var(--accent-cyan);
            padding: 0.75rem; min-height: 3rem; white-space: pre-wrap; overflow-y: auto;
            border: 1px solid var(--border-primary);
        }

        /* ---- Call Stack ---- */
        .call-stack-bar {
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border-primary);
            padding: 0.5rem 1rem;
            display: flex; gap: 0.4rem; overflow-x: auto; align-items: center;
        }
        .call-stack-label { font-size: 0.65rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-right: 0.4rem; white-space: nowrap; }
        .stack-frame {
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-primary);
            padding: 0.2rem 0.6rem; border-radius: var(--radius-sm);
            font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-secondary);
            white-space: nowrap; transition: all 0.3s;
        }
        .stack-frame:last-child {
            border-color: var(--accent-purple); color: var(--accent-purple);
            background: rgba(157,78,221,0.08); box-shadow: var(--shadow-glow-purple);
        }

        /* ---- Timeline ---- */
        .timeline-container { padding: 0.5rem 1rem; background: rgba(0,0,0,0.15); border-top: 1px solid var(--border-primary); display: flex; align-items: center; gap: 0.75rem; }
        .timeline-slider { flex: 1; -webkit-appearance: none; background: transparent; }
        .timeline-slider::-webkit-slider-runnable-track { width: 100%; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; }

const cmEditor = CodeMirror.fromTextArea(document.getElementById('code-input'), {
    mode: 'python', theme: cmTheme, lineNumbers: true,
    styleActiveLine: false, matchBrackets: true,
    gutters: ["CodeMirror-linenumbers", "breakpoints"],
    indentUnit: 4, viewportMargin: Infinity
});

window.addEventListener('themeChanged', () => {
    cmEditor.setOption("theme", document.documentElement.getAttribute('data-theme') === 'light' ? 'default' : 'dracula');
});

const editor = {
    get value() { return cmEditor.getValue(); },
    set value(v) { cmEditor.setValue(v); }
};

const langTabs = document.querySelectorAll('.lang-tab');
const exampleSelect = document.getElementById('example-select');

function populateExamples() {
    exampleSelect.innerHTML = '';
    const examples = EXAMPLES[currentLang];
    for (let title in examples) {
        const opt = document.createElement('option');
        opt.value = title; opt.textContent = title;
        exampleSelect.appendChild(opt);
    }
}

exampleSelect.addEventListener('change', (e) => {
    const ex = EXAMPLES[currentLang][e.target.value];
    if (ex) { editor.value = ex.code; document.getElementById('stdin-input').value = ex.input; }
});

function highlightLine(lineNum) {
    cmEditor.eachLine(line => {
        cmEditor.removeLineClass(line, "background", "CodeMirror-activeline-background");
        cmEditor.removeLineClass(line, "gutter", "CodeMirror-activeline-gutter");
    });
    if (lineNum > 0) {
        cmEditor.addLineClass(lineNum - 1, "background", "CodeMirror-activeline-background");
        cmEditor.addLineClass(lineNum - 1, "gutter", "CodeMirror-activeline-gutter");
        const top = cmEditor.charCoords({line: lineNum - 1, ch: 0}, "local").top;
        cmEditor.scrollTo(null, top - 60);
    }
}

langTabs.forEach(tab => {
    tab.addEventListener('click', () => {
        langTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentLang = tab.getAttribute('data-lang');
        cmEditor.setOption("mode", currentLang === 'python' ? 'python' : (currentLang === 'cpp' ? 'text/x-c++src' : 'text/x-java'));
        populateExamples();
        if (exampleSelect.options.length > 0) {
            exampleSelect.selectedIndex = 0;
            exampleSelect.dispatchEvent(new Event('change'));
        }
        stopAnimation(); resetDashboard(); setStatus('idle', 'Idle');
    });
});

document.getElementById('btn-clear').addEventListener('click', () => { editor.value = ''; stopAnimation(); resetDashboard(); });

/* ============================================================
   EVALUATOR UTILITIES
   ============================================================ */
let stdinLines = [], stdinTokens = [];

function prepareStdin() {
    const raw = document.getElementById('stdin-input').value;
    stdinLines = raw ? raw.split('\n') : [];
    stdinTokens = raw.trim().split(/\s+/).filter(s => s);
}

function consumeInputLine() {
    if (stdinLines.length > 0) return stdinLines.shift();
    throw new Error("Program expected input but Standard Input is empty.");
}
function consumeInputToken() {
    if (stdinTokens.length > 0) return stdinTokens.shift();
    throw new Error("Program expected input but Standard Input is empty.");
}

function deepClone(obj, seen) {
    if (obj === null || typeof obj !== 'object') return obj;
    if (!seen) seen = new Map();
    if (seen.has(obj)) return seen.get(obj);
    if (Array.isArray(obj)) {
        let c = []; seen.set(obj, c);
        for (let item of obj) c.push(deepClone(item, seen));
        return c;
    }
    const c = {}; seen.set(obj, c);
    for (let key in obj) c[key] = deepClone(obj[key], seen);
    return c;
}

function evalExpr(expr, scopeVars) {
    if (!expr && expr !== 0 && expr !== false) return undefined;
    expr = String(expr).trim();
    
    // Handle inline inputs
    if (expr.includes('input(')) {
        expr = expr.replace(/input\([^)]*\)/g, () => JSON.stringify(consumeInputLine()));
    }
    if (expr.includes('.nextInt()') || expr.includes('.nextDouble()') || expr.includes('.nextFloat()')) {
        expr = expr.replace(/[a-zA-Z_]\w*\.next(?:Int|Double|Float)\(\)/g, () => {
            let v = consumeInputToken(); return (!v || isNaN(v)) ? 0 : Number(v);
        });
    }
    if (expr.includes('.nextLine()')) { expr = expr.replace(/[a-zA-Z_]\w*\.nextLine\(\)/g, () => JSON.stringify(consumeInputLine())); }
    if (expr.includes('.next()')) { expr = expr.replace(/[a-zA-Z_]\w*\.next\(\)/g, () => JSON.stringify(consumeInputToken())); }
    
    let scopeStr = "";
    for (let k in scopeVars) {
        try { scopeStr += `let ${k} = ${JSON.stringify(scopeVars[k])};\n`; } catch(e) { /* skip circular */ }
    }
    let clean = expr
        .replace(/\band\b/g, '&&').replace(/\bor\b/g, '||').replace(/\bnot\b/g, '!')
        .replace(/\bTrue\b/g, 'true').replace(/\bFalse\b/g, 'false').replace(/\bNone\b/g, 'null')
        .replace(/\bnullptr\b/g, 'null').replace(/\bNULL\b/g, 'null')
        .replace(/\bint\(/g, 'Math.trunc(Number(').replace(/\bfloat\(/g, 'Number(')
        .replace(/\bis\s+not\b/g, '!==').replace(/\bis\b/g, '===')
        .replace(/\/\//g, '/__INTDIV__');
    // Fix int( double-paren
    let intCount = (clean.match(/Math\.trunc\(Number\(/g) || []).length;
    for (let ic = 0; ic < intCount; ic++) {
        let idx = clean.indexOf('Math.trunc(Number(');
        if (idx >= 0) {
            let depth = 0, start = idx + 18, end = start;
            for (; end < clean.length; end++) {
                if (clean[end] === '(') depth++;
                else if (clean[end] === ')') { depth--; if (depth < 0) break; }
            }
            clean = clean.slice(0, end) + ')' + clean.slice(end);
        }
    }
    // Handle Python floor division: only replace /__INTDIV__ markers with Math.floor
    clean = clean.replace(/(\w+)\s*\/__INTDIV__\s*(\w+)/g, (m, a, b) => `Math.floor(${a}/${b})`);
    clean = clean.replace(/__INTDIV__/g, '/');
    
    try {
        return new Function(scopeStr + "return (" + clean + ");")();
    } catch (e) {
        return expr;
    }
}

/* ============================================================
   PYTHON INTERPRETER — EXPANDED
   ============================================================ */
function tracePython(code) {
    const lines = code.split('\n');
    let steps = [];
    let funcs = {};
    let classes = {};
    let callStack = [];
    let globalScope = {};
    let nextObjId = 1;
    const maxSteps = 800;

    // === First pass: register functions and classes ===
    let i = 0;
    while (i < lines.length) {
        let line = lines[i];
        let trimmed = line.trim();
        
        // Class definition
        let mClass = trimmed.match(/^class\s+(\w+)(?:\s*\(.*\))?\s*:/);
        if (mClass) {
            let className = mClass[1];
            let classIndent = line.length - line.trimStart().length;
            let classStart = i + 1;
            let classEnd = classStart;
            while (classEnd < lines.length) {
                let nl = lines[classEnd];
                if (nl.trim() === '') { classEnd++; continue; }
                let ni = nl.length - nl.trimStart().length;
                if (ni <= classIndent) break;
                classEnd++;
            }
            // Find __init__ method
            let initParams = [];
            let initStart = -1, initEnd = -1, initIndent = 0;
            for (let ci = classStart; ci < classEnd; ci++) {
                let cl = lines[ci].trim();
                let mInit = cl.match(/^def\s+__init__\s*\(\s*self\s*(?:,\s*(.*))?\)\s*:/);
                if (mInit) {
                    initParams = mInit[1] ? mInit[1].split(',').map(p => {
                        let pp = p.trim().split('=');
                        return { name: pp[0].trim(), default: pp.length > 1 ? pp[1].trim() : undefined };
                    }) : [];
                    initStart = ci + 1;
                    initIndent = lines[ci].length - lines[ci].trimStart().length;
                    initEnd = ci + 1;
                    while (initEnd < classEnd) {
                        let nl = lines[initEnd];
                        if (nl.trim() === '') { initEnd++; continue; }
                        let ni = nl.length - nl.trimStart().length;
                        if (ni <= initIndent) break;
                        initEnd++;
                    }
                    initEnd--;
                    break;
                }
            }
            // Find other methods
            let methods = {};
            for (let ci = classStart; ci < classEnd; ci++) {
                let cl = lines[ci].trim();
                let mMethod = cl.match(/^def\s+(\w+)\s*\(\s*self\s*(?:,\s*(.*))?\)\s*:/);
                if (mMethod && mMethod[1] !== '__init__') {
                    let methodName = mMethod[1];
                    let mParams = mMethod[2] ? mMethod[2].split(',').map(s => s.trim()).filter(s => s) : [];
                    let mIndent = lines[ci].length - lines[ci].trimStart().length;
                    let mStart = ci + 1;
                    let mEnd = ci + 1;
                    while (mEnd < classEnd) {
                        let nl = lines[mEnd];
                        if (nl.trim() === '') { mEnd++; continue; }
                        let ni = nl.length - nl.trimStart().length;
                        if (ni <= mIndent) break;
                        mEnd++;
                    }
                    methods[methodName] = { params: mParams, bodyRange: [mStart, mEnd - 1], indent: mIndent };
                }
            }
            classes[className] = { params: initParams, initBody: [initStart, initEnd], initIndent, methods, classEnd: classEnd - 1 };
            i = classEnd;
            continue;
        }
        
        // Function definition
        let mFunc = trimmed.match(/^def\s+([a-zA-Z_]\w*)\s*\((.*?)\):/);
        if (mFunc) {
            let funcName = mFunc[1];
            let params = mFunc[2].split(',').map(s => s.trim()).filter(s => s);
            let funcIndent = line.length - line.trimStart().length;
            let start = i + 1, end = start;
            while (end < lines.length) {
                let nl = lines[end];
                if (nl.trim() === '') { end++; continue; }
                let ni = nl.length - nl.trimStart().length;
                if (ni <= funcIndent) break;
                end++;
            }
            funcs[funcName] = { params, bodyRange: [start, end - 1] };
            i = end;
            continue;
        }
        i++;
    }

    // === Execution engine ===
    callStack.push({name: "main()", locals: globalScope, line: 0});

    function getScope() { return callStack[callStack.length - 1].locals; }

    function pushStep(lineNum, desc, output = "", note = "") {
        let allVars = {};
        for (let fi = 0; fi < callStack.length; fi++) {
            let frame = callStack[fi];
            let prefix = "";
            if (callStack.length > 1) {
                let fn = frame.name.replace('()', '');
                if (fi === 0) fn = 'global';
                prefix = fn + (fi > 0 ? `[${fi}]` : '') + "::";
            }
            for (let k in frame.locals) {
                allVars[prefix + k] = frame.locals[k];
            }
        }
        let varsObj = [];
        let prevScope = steps.length > 0 ? {} : null;
        if (steps.length > 0) steps[steps.length - 1].vars.forEach(v => { prevScope[v.name] = v.rawValue; });
        for (let k in allVars) {
            let rawVal = deepClone(allVars[k]);
            let strVal;
            try { strVal = typeof rawVal === 'object' && rawVal !== null ? JSON.stringify(rawVal) : String(rawVal); }
            catch(e) { strVal = String(rawVal); }
            let prevStr = null;
            if (prevScope && prevScope[k] !== undefined) {
                try { prevStr = typeof prevScope[k] === 'object' && prevScope[k] !== null ? JSON.stringify(prevScope[k]) : String(prevScope[k]); }
                catch(e) { prevStr = String(prevScope[k]); }
            }
            let changed = prevScope ? (prevStr === null || strVal !== prevStr) : true;
            varsObj.push({name: k, rawValue: rawVal, stringValue: strVal, changed});
        }
        steps.push({ line: lineNum + 1, desc, vars: varsObj, output, note, stack: callStack.map(f => f.name) });
    }

    // Resolve a dotted path like head.next.val on the scope
    function resolveObjPath(path, scope) {
        let parts = path.split('.');
        let obj = scope[parts[0]];
        for (let pi = 1; pi < parts.length; pi++) {
            if (obj === null || obj === undefined) return undefined;
            obj = obj[parts[pi]];
        }
        return obj;
    }

    // Set a value on a dotted path
    function setObjPath(path, scope, value) {
        let parts = path.split('.');
        if (parts.length === 1) { scope[parts[0]] = value; return; }
        let obj = scope[parts[0]];
        for (let pi = 1; pi < parts.length - 1; pi++) {
            if (obj === null || obj === undefined) return;
            obj = obj[parts[pi]];
        }
        if (obj !== null && obj !== undefined) obj[parts[parts.length - 1]] = value;
    }

    // Resolve an expression — handles variable refs, dotted access, constructors, function calls, then falls back to evalExpr
    function resolveExpr(expr, scope, lineIdx) {
        if (expr === undefined || expr === null) return undefined;
        expr = String(expr).trim();
        if (expr === '') return undefined;
        
        // Handle "not in" and "in" operators
        let mNotIn = expr.match(/^(.+?)\s+not\s+in\s+(.+)$/);
        if (mNotIn && !expr.includes(' and ') && !expr.includes(' or ')) {
            let left = resolveExpr(mNotIn[1], scope, lineIdx);
            let right = resolveExpr(mNotIn[2], scope, lineIdx);
            if (Array.isArray(right)) return !right.includes(left);
            if (right && right.__isDict) return !(left in right);
            if (right && right.__isSet) return !(right.__values && right.__values.includes(left));
            if (typeof right === 'string') return !right.includes(left);
            return true;
        }
        let mIn = expr.match(/^(.+?)\s+in\s+(.+)$/);
        if (mIn && !expr.includes(' and ') && !expr.includes(' or ') && !expr.startsWith('for ')) {
            let left = resolveExpr(mIn[1], scope, lineIdx);
            let right = resolveExpr(mIn[2], scope, lineIdx);
            if (Array.isArray(right)) return right.includes(left);
            if (right && right.__isDict) return left in right;
            if (right && right.__isSet) return right.__values && right.__values.includes(left);
            if (typeof right === 'string') return right.includes(left);
            return false;
        }

        if (expr === 'None') return null;
        if (expr === 'True') return true;
        if (expr === 'False') return false;

        // Numeric literal
        if (/^-?\d+(\.\d+)?$/.test(expr)) return Number(expr);
        // String literal
        if (/^(["']).*\1$/.test(expr)) return expr.slice(1, -1);
        // List literal
        if (expr.startsWith('[') && expr.endsWith(']')) {
            let inner = expr.slice(1, -1).trim();
            if (inner === '') return [];
            let items = splitArgs(inner);
            return items.map(it => resolveExpr(it.trim(), scope, lineIdx));
        }
        // Dict literal
        if (expr === '{}') return { __isDict: true };
        if (expr.startsWith('{') && expr.endsWith('}') && expr.includes(':')) {
            let inner = expr.slice(1, -1).trim();
            let entries = splitArgs(inner);
            let d = { __isDict: true };
            entries.forEach(e => {
                let [k, v] = e.split(':').map(s => s.trim());
                let key = resolveExpr(k, scope, lineIdx);
                d[key] = resolveExpr(v, scope, lineIdx);
            });
            return d;
        }
        // set()
        if (expr === 'set()') return { __isSet: true, __values: [] };
        
        // len()
        let mLen = expr.match(/^len\((.+)\)$/);
        if (mLen) {
            let inner = resolveExpr(mLen[1], scope, lineIdx);
            if (Array.isArray(inner)) return inner.length;
            if (inner && typeof inner === 'object' && inner.__isDict) return Object.keys(inner).filter(k => !k.startsWith('__')).length;
            if (inner && typeof inner === 'object' && inner.__isSet) return inner.__values.length;
            if (typeof inner === 'string') return inner.length;
            return 0;
        }
        // abs(), min(), max()
        let mAbs = expr.match(/^abs\((.+)\)$/);
        if (mAbs) return Math.abs(resolveExpr(mAbs[1], scope, lineIdx));
        let mMin = expr.match(/^min\((.+)\)$/);
        if (mMin) { let args = splitArgs(mMin[1]).map(a => resolveExpr(a.trim(), scope, lineIdx)); if (args.length === 1 && Array.isArray(args[0])) return Math.min(...args[0]); return Math.min(...args); }
        let mMax = expr.match(/^max\((.+)\)$/);
        if (mMax) { let args = splitArgs(mMax[1]).map(a => resolveExpr(a.trim(), scope, lineIdx)); if (args.length === 1 && Array.isArray(args[0])) return Math.max(...args[0]); return Math.max(...args); }
        // sorted()
        let mSorted = expr.match(/^sorted\((.+)\)$/);
        if (mSorted) { let arr = resolveExpr(mSorted[1], scope, lineIdx); if (Array.isArray(arr)) return [...arr].sort((a,b) => a - b); return arr; }
        // str()
        let mStr = expr.match(/^str\((.+)\)$/);
        if (mStr) return String(resolveExpr(mStr[1], scope, lineIdx));

        // Exact constructor call ClassName(args)
        for (let cn in classes) {
            let cRe = new RegExp(`^${cn}\\((.*)\\)$`);
            let mC = expr.match(cRe);
            if (mC) return constructObject(cn, mC[1], scope, lineIdx);
        }
        
        // Exact function call funcName(args)
        let mExactFunc = expr.match(/^([a-zA-Z_]\w*)\((.*)\)$/);
        if (mExactFunc && funcs[mExactFunc[1]]) {
            return callFunction(mExactFunc[1], mExactFunc[2], scope, lineIdx);
        }

        // Direct variable reference
        if (/^[a-zA-Z_]\w*$/.test(expr) && expr in scope) return scope[expr];
        
        // Dotted access (head.next.val)
        if (/^[a-zA-Z_]\w*(\.\w+)+$/.test(expr)) {
            let val = resolveObjPath(expr, scope);
            if (val !== undefined) return val;
        }

        // Indexed access: arr[i] or dict[key]
        let mIdx = expr.match(/^([a-zA-Z_]\w*(?:\.\w+)*)\[(.+)\]$/);
        if (mIdx) {
            let obj = mIdx[1].includes('.') ? resolveObjPath(mIdx[1], scope) : scope[mIdx[1]];
            let idx = resolveExpr(mIdx[2], scope, lineIdx);
            if (obj !== undefined && obj !== null) return obj[idx];
        }

        // Function calls within expressions
        let resolved = expr;
        let funcCallRe = /([a-zA-Z_]\w*)\(([^()]*(?:\([^()]*\)[^()]*)*)\)/;
        let safety = 0;
        while (safety < 20) {
            let match = resolved.match(funcCallRe);
            if (!match) break;
            let funcName = match[1], funcArgs = match[2], full = match[0];
            if (funcs[funcName]) {
                let retVal = callFunction(funcName, funcArgs, scope, lineIdx);
                resolved = resolved.replace(full, JSON.stringify(retVal));
            } else if (classes[funcName]) {
                let obj = constructObject(funcName, funcArgs, scope, lineIdx);
                resolved = resolved.replace(full, JSON.stringify(obj));
            } else { break; }
            safety++;
        }
        
        // Replace dotted accesses in expressions before evalExpr
        resolved = resolved.replace(/\b([a-zA-Z_]\w*(?:\.\w+)+)\b/g, (match) => {
            let val = resolveObjPath(match, scope);
            if (val !== undefined) return JSON.stringify(val);
            return match;
        });
        
        // Replace simple variable references
        resolved = resolved.replace(/\b([a-zA-Z_]\w*)\b/g, (match) => {
            if (['and','or','not','True','False','None','in','is','len','abs','min','max','sorted','int','float','str','print','range','enumerate'].includes(match)) return match;
            if (match in scope) {
                let v = scope[match];
                try { return JSON.stringify(v); } catch(e) { return match; }
            }
            return match;
        });
        
        return evalExpr(resolved, {});
    }

    function constructObject(className, argStr, callerScope, lineIdx) {
        let classDef = classes[className];
        let argVals = argStr.trim() ? splitArgs(argStr).map(a => resolveExpr(a.trim(), callerScope, lineIdx)) : [];
        let obj = { __type: className, __id: nextObjId++ };
        
        // Execute __init__ body
        if (classDef.initBody[0] >= 0) {
            let initLocals = { self: obj };
            classDef.params.forEach((p, pi) => {
                if (pi < argVals.length) initLocals[p.name] = argVals[pi];
                else if (p.default !== undefined) initLocals[p.name] = resolveExpr(p.default, callerScope, lineIdx);
                else initLocals[p.name] = null;
            });
            callStack.push({name: `${className}()`, locals: initLocals, line: classDef.initBody[0]});
            executeBlock(classDef.initBody[0], classDef.initBody[1], classDef.initIndent + 4);
            callStack.pop();
        }
        return obj;
    }

    function splitArgs(str) {
        let args = [], depth = 0, brack = 0, current = '';
        for (let c of str) {
            if (c === '(' || c === '[' || c === '{') depth++;
            else if (c === ')' || c === ']' || c === '}') depth--;
            else if (c === ',' && depth === 0) { args.push(current); current = ''; continue; }
            current += c;
        }
        if (current.trim()) args.push(current);
        return args;
    }

    function callFunction(funcName, argStr, callerScope, callLineIdx) {
        let fDef = funcs[funcName];
        let argVals = argStr.trim() ? splitArgs(argStr).map(s => resolveExpr(s.trim(), callerScope, callLineIdx)) : [];
        let locals = {};
        fDef.params.forEach((p, i) => { locals[p] = argVals[i]; });
        callStack.push({name: `${funcName}()`, locals: locals, line: fDef.bodyRange[0]});
        let res = executeBlock(fDef.bodyRange[0], fDef.bodyRange[1], 4);
        callStack.pop();
        return res && res.action === 'return' ? res.value : undefined;
    }

    function executeBlock(startIdx, endIdx, indentCtx) {
        let idx = startIdx;
        while (idx <= endIdx && steps.length < maxSteps) {
            let line = lines[idx];
            if (line === undefined) break;
            let trimmed = line.trim();
            if (!trimmed || trimmed.startsWith('#')) { idx++; continue; }
            let indent = line.length - line.trimStart().length;
            if (indent < indentCtx) break;
            let scope = getScope();

            // Skip class definitions
            let mClassDef = trimmed.match(/^class\s+(\w+)/);
            if (mClassDef) {
                let cd = classes[mClassDef[1]];
                if (cd) { idx = cd.classEnd + 1; continue; }
                idx++; continue;
            }

            // Skip function definitions
            let mDef = trimmed.match(/^def\s+([a-zA-Z_]\w*)\s*\((.*?)\):/);
            if (mDef) {
                let defI = indent; idx++;
                while (idx <= endIdx) {
                    let nl = lines[idx]; if (!nl) break;
                    let nt = nl.trim();
                    if (nt === '') { idx++; continue; }
                    if (nl.length - nl.trimStart().length <= defI) break;
                    idx++;
                }
                continue;
            }

            // Return
            let mRet = trimmed.match(/^return\s+(.*)$/);
            if (mRet) {
                let val = resolveExpr(mRet[1], scope, idx);
                pushStep(idx, `Return ${formatVal(val)}`);
                return { action: 'return', value: val };
            }
            if (trimmed === 'return') {
                pushStep(idx, `Return`);
                return { action: 'return', value: undefined };
            }
            // Break / Continue
            if (trimmed === 'break') { pushStep(idx, 'Break'); return { action: 'break' }; }
            if (trimmed === 'continue') { pushStep(idx, 'Continue'); return { action: 'continue' }; }

            // Print
            let mPrint = trimmed.match(/^print\((.*)?\)$/);
            if (mPrint) {
                let content = mPrint[1] || '';
                if (content.trim() === '') { pushStep(idx, `Print`, ''); idx++; continue; }
                let args = splitArgs(content);
                let vals = args.map(a => {
                    let v = resolveExpr(a.trim(), scope, idx);
                    if (typeof v === 'string') return v;
                    if (v === null) return 'None';
                    if (typeof v === 'object') { try { return JSON.stringify(v); } catch(e) { return String(v); } }
                    return String(v);
                });
                pushStep(idx, `Print`, vals.join(' '));
                idx++; continue;
            }

            // Swap: a, b = b, a  OR  arr[i], arr[j] = arr[j], arr[i]
            let mSwap = trimmed.match(/^(.+?)\s*,\s*(.+?)\s*=\s*(.+?)\s*,\s*(.+)$/);
            if (mSwap) {
                let lhs1 = mSwap[1].trim(), lhs2 = mSwap[2].trim();
                let rhs1 = mSwap[3].trim(), rhs2 = mSwap[4].trim();
                let v1 = resolveExpr(rhs1, scope, idx);
                let v2 = resolveExpr(rhs2, scope, idx);
                // Handle indexed targets: arr[i]
                let setTarget = (target, value) => {
                    let idxM = target.match(/^([a-zA-Z_]\w*(?:\.\w+)*)\[(.+)\]$/);
                    if (idxM) {
                        let obj = idxM[1].includes('.') ? resolveObjPath(idxM[1], scope) : scope[idxM[1]];
                        let ki = resolveExpr(idxM[2], scope, idx);
                        if (obj) obj[ki] = value;
                    } else if (target.includes('.')) {
                        setObjPath(target, scope, value);
                    } else {
                        scope[target] = value;
                    }
                };
                setTarget(lhs1, v1);
                setTarget(lhs2, v2);
                pushStep(idx, `Swap: ${lhs1}↔${lhs2}`);
                idx++; continue;
            }

            // For loop: for i in range(...)
            let mForRange = trimmed.match(/^for\s+(\w+)\s+in\s+range\((.*)\):$/);
            if (mForRange) {
                let vn = mForRange[1];
                let ra = splitArgs(mForRange[2]).map(s => resolveExpr(s.trim(), scope, idx));
                let s_r = 0, e_r = 0, st_r = 1;
                if (ra.length === 1) e_r = ra[0];
                else if (ra.length === 2) { s_r = ra[0]; e_r = ra[1]; }
                else if (ra.length === 3) { s_r = ra[0]; e_r = ra[1]; st_r = ra[2]; }
                let lc = 0;
                for (let ri = s_r; st_r > 0 ? ri < e_r : ri > e_r; ri += st_r) {
                    if (lc >= 150 || steps.length >= maxSteps) break;
                    scope[vn] = ri;
                    pushStep(idx, `For: ${vn} = ${ri}`);
                    let br = executeBlock(idx + 1, endIdx, indent + 4);
                    if (br && br.action === 'return') return br;
                    if (br && br.action === 'break') break;
                    lc++;
                }
                pushStep(idx, `For loop ended`);
                idx++; while (idx <= endIdx && lines[idx] && lines[idx].length - lines[idx].trimStart().length > indent) idx++;
                continue;
            }

            // For loop: for x in iterable
            let mForIn = trimmed.match(/^for\s+(\w+)\s+in\s+(.+):$/);
            if (mForIn && !trimmed.includes('range(') && !trimmed.includes('enumerate(')) {
                let vn = mForIn[1];
                let iterExpr = mForIn[2].trim();
                let iterable = resolveExpr(iterExpr, scope, idx);
                let items = [];
                if (Array.isArray(iterable)) items = iterable;
                else if (iterable && typeof iterable === 'object' && iterable.__isDict) items = Object.keys(iterable).filter(k => !k.startsWith('__'));
                else if (iterable && typeof iterable === 'object' && iterable.__isSet) items = iterable.__values;
                let lc = 0;
                for (let item of items) {
                    if (lc >= 150 || steps.length >= maxSteps) break;
                    scope[vn] = item;
                    pushStep(idx, `For: ${vn} = ${formatVal(item)}`);
                    let br = executeBlock(idx + 1, endIdx, indent + 4);
                    if (br && br.action === 'return') return br;
                    if (br && br.action === 'break') break;
                    lc++;
                }
                pushStep(idx, `For loop ended`);
                idx++; while (idx <= endIdx && lines[idx] && lines[idx].length - lines[idx].trimStart().length > indent) idx++;
                continue;
            }

            // For loop: for i, x in enumerate(iterable)
            let mForEnum = trimmed.match(/^for\s+(\w+)\s*,\s*(\w+)\s+in\s+enumerate\((.+)\):$/);
            if (mForEnum) {
                let iv = mForEnum[1], vv = mForEnum[2];
                let iterable = resolveExpr(mForEnum[3].trim(), scope, idx);
                if (Array.isArray(iterable)) {
                    let lc = 0;
                    for (let ei = 0; ei < iterable.length && lc < 150 && steps.length < maxSteps; ei++) {
                        scope[iv] = ei; scope[vv] = iterable[ei];
                        pushStep(idx, `For: ${iv}=${ei}, ${vv}=${formatVal(iterable[ei])}`);
                        let br = executeBlock(idx + 1, endIdx, indent + 4);
                        if (br && br.action === 'return') return br;
                        if (br && br.action === 'break') break;
                        lc++;
                    }
                }
                pushStep(idx, `For loop ended`);
                idx++; while (idx <= endIdx && lines[idx] && lines[idx].length - lines[idx].trimStart().length > indent) idx++;
                continue;
            }

            // While
            let mWhile = trimmed.match(/^while\s+(.*):$/);
            if (mWhile) {
                let cond = mWhile[1];
                let lc = 0;
                while (lc < 150 && steps.length < maxSteps) {
                    let condVal = resolveExpr(cond, scope, idx);
                    if (!condVal) { pushStep(idx, `While: False`); break; }
                    pushStep(idx, `While: True`);
                    let br = executeBlock(idx + 1, endIdx, indent + 4);
                    if (br && br.action === 'return') return br;
                    if (br && br.action === 'break') break;
                    lc++;
                }
                idx++; while (idx <= endIdx && lines[idx] && lines[idx].length - lines[idx].trimStart().length > indent) idx++;
                continue;
            }

            // If / elif
            let mIf = trimmed.match(/^(?:if|elif)\s+(.*):$/);
            if (mIf) {
                let condVal = resolveExpr(mIf[1], scope, idx);
                pushStep(idx, `Condition: ${!!condVal}`);
                if (condVal) {
                    let br = executeBlock(idx + 1, endIdx, indent + 4);
                    if (br && br.action === 'return') return br;
                    if (br && br.action === 'break') return br;
                    idx++;
                    while (idx <= endIdx && lines[idx]) {
                        let nt = lines[idx].trim();
                        if (nt.startsWith('elif') || nt.startsWith('else')) {
                            let sk = idx + 1;
                            while (sk <= endIdx && lines[sk] && lines[sk].length - lines[sk].trimStart().length > indent) sk++;
                            idx = sk;
                        } else break;
                    }
                    continue;
                } else {
                    idx++;
                    while (idx <= endIdx && lines[idx] && lines[idx].length - lines[idx].trimStart().length > indent) idx++;
                    continue;
                }
            }

            // Else
            if (trimmed === 'else:' || trimmed.startsWith('else:')) {
                pushStep(idx, `Else branch`);
                let br = executeBlock(idx + 1, endIdx, indent + 4);
                if (br && br.action === 'return') return br;
                if (br && br.action === 'break') return br;
                idx++;
                while (idx <= endIdx && lines[idx] && lines[idx].length - lines[idx].trimStart().length > indent) idx++;
                continue;
            }

            // .append()
            let mAppend = trimmed.match(/^([a-zA-Z_]\w*(?:\.\w+)*)\.append\((.+)\)$/);
            if (mAppend) {
                let listRef = mAppend[1].includes('.') ? resolveObjPath(mAppend[1], scope) : scope[mAppend[1]];
                let val = resolveExpr(mAppend[2], scope, idx);
                if (Array.isArray(listRef)) listRef.push(val);
                else if (listRef && listRef.__isSet) { if (!listRef.__values.includes(val)) listRef.__values.push(val); }
                pushStep(idx, `${mAppend[1]}.append(${formatVal(val)})`);
                idx++; continue;
            }

            // .pop() / .pop(0)
            let mPop = trimmed.match(/^(?:(\w+)\s*=\s*)?([a-zA-Z_]\w*(?:\.\w+)*)\.pop\((\d*)\)$/);
            if (mPop) {
                let assignVar = mPop[1], listName = mPop[2], popIdx = mPop[3];
                let listRef = listName.includes('.') ? resolveObjPath(listName, scope) : scope[listName];
                let val;
                if (Array.isArray(listRef)) {
                    if (popIdx !== '' && popIdx !== undefined) val = listRef.splice(Number(popIdx), 1)[0];
                    else val = listRef.pop();
                }
                if (assignVar) scope[assignVar] = val;
                pushStep(idx, `${listName}.pop(${popIdx}) → ${formatVal(val)}`);
                idx++; continue;
            }

            // .add() for sets
            let mAdd = trimmed.match(/^([a-zA-Z_]\w*)\.add\((.+)\)$/);
            if (mAdd) {
                let setRef = scope[mAdd[1]];
                let val = resolveExpr(mAdd[2], scope, idx);
                if (setRef && setRef.__isSet) { if (!setRef.__values.includes(val)) setRef.__values.push(val); }
                pushStep(idx, `${mAdd[1]}.add(${formatVal(val)})`);
                idx++; continue;
            }

            // .remove() for sets/lists
            let mRemove = trimmed.match(/^([a-zA-Z_]\w*)\.remove\((.+)\)$/);
            if (mRemove) {
                let ref = scope[mRemove[1]];
                let val = resolveExpr(mRemove[2], scope, idx);
                if (Array.isArray(ref)) { let ri = ref.indexOf(val); if (ri >= 0) ref.splice(ri, 1); }
                else if (ref && ref.__isSet) { ref.__values = ref.__values.filter(v => v !== val); }
                pushStep(idx, `${mRemove[1]}.remove(${formatVal(val)})`);
                idx++; continue;
            }

            // Indexed assignment: arr[i] = val  OR  dict[key] = val  OR  obj.arr[i] = val
            let mIdxAssign = trimmed.match(/^([a-zA-Z_]\w*(?:\.\w+)*)\[(.+)\]\s*=\s*(.+)$/);
            if (mIdxAssign && !trimmed.includes('==')) {
                let objName = mIdxAssign[1], keyExpr = mIdxAssign[2], valExpr = mIdxAssign[3];
                let obj = objName.includes('.') ? resolveObjPath(objName, scope) : scope[objName];
                let key = resolveExpr(keyExpr, scope, idx);
                let val = resolveExpr(valExpr, scope, idx);
                if (obj !== undefined && obj !== null) obj[key] = val;
                pushStep(idx, `${objName}[${formatVal(key)}] = ${formatVal(val)}`);
                idx++; continue;
            }

            // Dotted assignment: head.next = Node(2)  OR  self.val = val
            let mDotAssign = trimmed.match(/^([a-zA-Z_]\w*(?:\.\w+)*)\.(\w+)\s*=\s*(.+)$/);
            if (mDotAssign && !trimmed.includes('==')) {
                let objPath = mDotAssign[1], attr = mDotAssign[2], expr = mDotAssign[3];
                let obj = objPath.includes('.') ? resolveObjPath(objPath, scope) : scope[objPath];
                let val = resolveExpr(expr, scope, idx);
                if (obj !== null && obj !== undefined && typeof obj === 'object') {
                    obj[attr] = val;
                }
                pushStep(idx, `${objPath}.${attr} = ${formatVal(val)}`);
                idx++; continue;
            }

            // Augmented assignment: x += 1, x -= 1, etc.
            let mAug = trimmed.match(/^([a-zA-Z_]\w*)\s*(\+|-|\*|\/)=\s*(.*)$/);
            if (mAug) {
                let vn = mAug[1], op = mAug[2], expr = mAug[3];
                let ev = resolveExpr(expr, scope, idx);
                let cur = scope[vn];
                if (op === '+') scope[vn] = (typeof cur === 'string' || typeof ev === 'string') ? cur + ev : cur + ev;
                else if (op === '-') scope[vn] = cur - ev;
                else if (op === '*') scope[vn] = cur * ev;
                else if (op === '/') scope[vn] = cur / ev;
                pushStep(idx, `${vn} ${op}= ${formatVal(ev)}`);
                idx++; continue;
            }

            // Simple assignment: x = expr
            let mAssign = trimmed.match(/^([a-zA-Z_]\w*)\s*=\s*(.+)$/);
            if (mAssign && !trimmed.includes('==') && !/^(if|elif|while|for|def|class|return|print)/.test(trimmed)) {
                let vn = mAssign[1], expr = mAssign[2].trim();
                let val = resolveExpr(expr, scope, idx);
                scope[vn] = val;
                pushStep(idx, `${vn} = ${formatVal(val)}`);
                idx++; continue;
            }

            // Standalone function call
            let mFuncCall = trimmed.match(/^([a-zA-Z_]\w*)\((.*)?\)$/);
            if (mFuncCall && funcs[mFuncCall[1]]) {
                pushStep(idx, `Call ${mFuncCall[1]}()`);
                callFunction(mFuncCall[1], mFuncCall[2] || '', scope, idx);
                idx++; continue;
            }

            // Standalone method call (obj.method(args))
            let mMethodCall = trimmed.match(/^([a-zA-Z_]\w*(?:\.\w+)*)\.(\w+)\((.*)?\)$/);
            if (mMethodCall) {
                // Could be list.sort(), etc. — skip gracefully
                pushStep(idx, `${mMethodCall[1]}.${mMethodCall[2]}()`);
                idx++; continue;
            }

            idx++;
        }
        return { action: 'done' };
    }

    executeBlock(0, lines.length - 1, 0);
    return steps;
}

function formatVal(v) {
    if (v === null || v === undefined) return 'None';
    if (typeof v === 'object') {
        if (v.__type) return `${v.__type}(${v.val !== undefined ? v.val : '...'})`;
        if (v.__isDict) { let keys = Object.keys(v).filter(k => !k.startsWith('__')); return `{${keys.map(k => k + ':' + formatVal(v[k])).join(', ')}}`; }
        if (v.__isSet) return `{${v.__values.join(', ')}}`;
        try { return JSON.stringify(v); } catch(e) { return String(v); }
    }
    if (typeof v === 'string') return `"${v}"`;
    return String(v);
}

/* ============================================================
   C++ TRACER
   ============================================================ */
function traceCpp(code) {
    const lines = code.split('\n');
    let steps = [], funcs = {}, callStack = [];
    let currentFunc = null, braceCount = 0;
    
    let varTypes = {};
    let structs = {};
    let nextObjId = 1;

    // Helper: Split by comma at top-level depth of (), {}, []
    function splitByTopLevelComma(str) {
        let parts = [];
        let current = '';
        let depth = 0;
        for (let i = 0; i < str.length; i++) {
            let char = str[i];
            if (char === '(' || char === '{' || char === '[') depth++;
            else if (char === ')' || char === '}' || char === ']') depth--;
            
            if (char === ',' && depth === 0) {
                parts.push(current.trim());
                current = '';
            } else {
                current += char;
            }
        }
        if (current.trim()) parts.push(current.trim());
        return parts;
    }

    // Helper: Split by assignment operators (=, +=, -=, *=, /=) at top-level depth
    function splitByTopLevelEqual(str) {
        let depth = 0;
        for (let i = 0; i < str.length; i++) {
            let char = str[i];
            if (char === '(' || char === '{' || char === '[') depth++;
            else if (char === ')' || char === '}' || char === ']') depth--;
            
            if (depth === 0) {
                if (char === '=' && str[i-1] !== '=' && str[i-1] !== '<' && str[i-1] !== '>' && str[i-1] !== '!' && str[i+1] !== '=') {
                    let op = '=';
                    let left = str.slice(0, i).trim();
                    let right = str.slice(i + 1).trim();
                    if (left.endsWith('+') || left.endsWith('-') || left.endsWith('*') || left.endsWith('/')) {
                        op = left.slice(-1) + '=';
                        left = left.slice(0, -1).trim();
                    }
                    if (right.endsWith(';')) right = right.slice(0, -1).trim();
                    return { left, op, right };
                }
            }
        }
        return null;
    }

    // Helper: Resolve deep path like dp[i][j] or head.next.val
    function resolveDeepPath(expr, scope) {
        expr = expr.trim();
        let mBase = expr.match(/^([a-zA-Z_]\w*)/);
        if (!mBase) return undefined;
        let baseName = mBase[1];
        let val = scope[baseName];
        if (val === undefined) return undefined;
        
        let remaining = expr.slice(baseName.length).trim();
        while (remaining.length > 0) {
            if (remaining.startsWith('.')) {
                remaining = remaining.slice(1).trim();
                let mProp = remaining.match(/^([a-zA-Z_]\w*)/);
                if (!mProp) return undefined;
                let prop = mProp[1];
                val = val[prop];
                remaining = remaining.slice(prop.length).trim();
            } else if (remaining.startsWith('->')) {
                remaining = remaining.slice(2).trim();
                let mProp = remaining.match(/^([a-zA-Z_]\w*)/);
                if (!mProp) return undefined;
                let prop = mProp[1];
                val = val[prop];
                remaining = remaining.slice(prop.length).trim();
            } else if (remaining.startsWith('[')) {
                let depth = 1;
                let inside = '';
                let i = 1;
                for (; i < remaining.length; i++) {
                    if (remaining[i] === '[') depth++;
                    else if (remaining[i] === ']') {
                        depth--;
                        if (depth === 0) break;
                    }
                    inside += remaining[i];
                }
                let index = cppResolve(inside, scope);
                val = val ? val[index] : undefined;
                remaining = remaining.slice(i + 1).trim();
            } else {
                break;
            }
        }
        return val;
    }

    // Helper: Set deep path like dp[i][j] = val
    function setDeepPath(expr, scope, value) {
        expr = expr.trim();
        let mBase = expr.match(/^([a-zA-Z_]\w*)/);
        if (!mBase) return;
        let baseName = mBase[1];
        
        let remaining = expr.slice(baseName.length).trim();
        if (remaining.length === 0) {
            scope[baseName] = value;
            return;
        }
        
        let parent = scope[baseName];
        if (parent === undefined) {
            scope[baseName] = remaining.startsWith('[') ? [] : {};
            parent = scope[baseName];
        }
        
        while (remaining.length > 0) {
            let isLast = false;
            let nextKey = null;
            
            if (remaining.startsWith('.')) {
                remaining = remaining.slice(1).trim();
                let mProp = remaining.match(/^([a-zA-Z_]\w*)/);
                if (!mProp) return;
                nextKey = mProp[1];
                remaining = remaining.slice(nextKey.length).trim();
                if (remaining.length === 0) isLast = true;
            } else if (remaining.startsWith('->')) {
                remaining = remaining.slice(2).trim();
                let mProp = remaining.match(/^([a-zA-Z_]\w*)/);
                if (!mProp) return;
                nextKey = mProp[1];
                remaining = remaining.slice(nextKey.length).trim();
                if (remaining.length === 0) isLast = true;
            } else if (remaining.startsWith('[')) {
                let depth = 1;
                let inside = '';
                let i = 1;
                for (; i < remaining.length; i++) {
                    if (remaining[i] === '[') depth++;
                    else if (remaining[i] === ']') {
                        depth--;
                        if (depth === 0) break;
                    }
                    inside += remaining[i];
                }
                nextKey = cppResolve(inside, scope);
                remaining = remaining.slice(i + 1).trim();
                if (remaining.length === 0) isLast = true;
            } else {
                break;
            }
            
            if (isLast) {
                if (parent !== null && parent !== undefined) {
                    parent[nextKey] = value;
                }
                return;
            } else {
                if (parent === null || parent === undefined) return;
                if (parent[nextKey] === undefined || parent[nextKey] === null) {
                    parent[nextKey] = remaining.startsWith('[') ? [] : {};
                }
                parent = parent[nextKey];
            }
        }
    }

    // Helper: Translate C++ expression patterns to JS
    function translateCppExprToJs(expr, scope) {
        if (!expr && expr !== 0 && expr !== false) return '';
        let s = String(expr).trim();
        
        s = s.replace(/\bstd::/g, '');
        s = s.replace(/->/g, '.');
        s = s.replace(/\btrue\b/g, 'true');
        s = s.replace(/\bfalse\b/g, 'false');
        s = s.replace(/\bnullptr\b/g, 'null');
        s = s.replace(/\bNULL\b/g, 'null');
        
        s = s.replace(/\bmin\(/g, 'Math.min(');
        s = s.replace(/\bmax\(/g, 'Math.max(');
        s = s.replace(/\babs\(/g, 'Math.abs(');
        s = s.replace(/\bsqrt\(/g, 'Math.sqrt(');
        s = s.replace(/\bpow\(/g, 'Math.pow(');
        
        s = s.replace(/\bmake_pair\(/g, '[');
        s = s.replace(/\.(\bfirst\b)/g, '[0]');
        s = s.replace(/\.(\bsecond\b)/g, '[1]');
        
        s = s.replace(/(\w+)\.size\(\)/g, (m, name) => {
            let val = resolveDeepPath(name, scope);
            if (val && val.__isSet) return val.__values.length;
            if (val && typeof val === 'object' && !Array.isArray(val)) return Object.keys(val).filter(k => !k.startsWith('__')).length;
            return `${name}.length`;
        });
        s = s.replace(/(\w+)\.empty\(\)/g, (m, name) => {
            let val = resolveDeepPath(name, scope);
            if (val && val.__isSet) return `${val.__values.length} === 0`;
            if (val && typeof val === 'object' && !Array.isArray(val)) return `Object.keys(${name}).filter(k => !k.startsWith('__')).length === 0`;
            return `${name}.length === 0`;
        });
        s = s.replace(/(\w+)\.front\(\)/g, '$1[0]');
        s = s.replace(/(\w+)\.back\(\)/g, '$1[$1.length - 1]');
        s = s.replace(/(\w+)\.top\(\)/g, '$1[$1.length - 1]');
        
        // set/map find and count
        s = s.replace(/(\w+)\.find\((.+?)\)\s*!=\s*\1\.end\(\)/g, '($1.__isSet ? $1.__values.includes($2) : ($2 in $1))');
        s = s.replace(/(\w+)\.find\((.+?)\)\s*==\s*\1\.end\(\)/g, '!($1.__isSet ? $1.__values.includes($2) : ($2 in $1))');
        s = s.replace(/(\w+)\.count\((.+?)\)/g, '($1.__isSet ? ($1.__values.includes($2) ? 1 : 0) : ($2 in $1 ? 1 : 0))');
        
        return s;
    }

    // Helper: Execute STL container methods
    function executeMethod(path, method, argStr, scope) {
        let obj = resolveDeepPath(path, scope);
        if (obj === undefined) return undefined;
        
        let args = splitByTopLevelComma(argStr).map(s => cppResolve(s.trim(), scope));
        
        let mBase = path.match(/^([a-zA-Z_]\w*)/);
        let baseName = mBase ? mBase[1] : '';
        let baseType = varTypes[baseName] || '';
        
        if (Array.isArray(obj)) {
            if (method === 'push_back' || method === 'push') {
                obj.push(args[0]);
                if (baseType.includes('priority_queue')) {
                    obj.sort((a, b) => a - b);
                }
                return undefined;
            }
            if (method === 'pop_back' || method === 'pop') {
                if (baseType.includes('queue')) return obj.shift();
                return obj.pop();
            }
            if (method === 'clear') { obj.length = 0; return undefined; }
            if (method === 'erase') {
                let idx = args[0];
                if (typeof idx !== 'number') idx = 0;
                obj.splice(idx, 1);
                return undefined;
            }
            if (method === 'size') return obj.length;
            if (method === 'empty') return obj.length === 0;
            if (method === 'front') return obj[0];
            if (method === 'back' || method === 'top') return obj[obj.length - 1];
        }
        
        if (obj && obj.__isSet) {
            if (method === 'insert' || method === 'add') {
                if (!obj.__values.includes(args[0])) obj.__values.push(args[0]);
                return undefined;
            }
            if (method === 'erase' || method === 'remove') {
                obj.__values = obj.__values.filter(v => v !== args[0]);
                return undefined;
            }
            if (method === 'size') return obj.__values.length;
            if (method === 'empty') return obj.__values.length === 0;
            if (method === 'count') return obj.__values.includes(args[0]) ? 1 : 0;
            if (method === 'clear') { obj.__values = []; return undefined; }
        }
        
        if (obj && typeof obj === 'object' && !obj.__isSet && !obj.__type) {
            if (method === 'insert') {
                if (Array.isArray(args[0]) && args[0].length === 2) {
                    obj[args[0][0]] = args[0][1];
                }
                return undefined;
            }
            if (method === 'erase') { delete obj[args[0]]; return undefined; }
            if (method === 'size') return Object.keys(obj).filter(k => !k.startsWith('__')).length;
            if (method === 'empty') return Object.keys(obj).filter(k => !k.startsWith('__')).length === 0;
            if (method === 'count') return (args[0] in obj) ? 1 : 0;
            if (method === 'clear') {
                for (let k in obj) { if (!k.startsWith('__')) delete obj[k]; }
                return undefined;
            }
        }
        
        return undefined;
    }

    // Register structs, classes and functions in first pass
    for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();
        line = line.replace(/\/\/.*$/, '').trim();
        if (!line) continue;
        
        let mStruct = line.match(/^(?:struct|class)\s+([a-zA-Z_]\w*)/);
        if (mStruct && !currentFunc) {
            let structName = mStruct[1];
            let fields = [];
            let j = i + 1;
            let braceDepth = line.includes('{') ? 1 : 0;
            if (braceDepth === 0 && lines[j] && lines[j].trim().replace(/\/\/.*$/, '') === '{') { braceDepth = 1; j++; }
            while (j < lines.length && braceDepth > 0) {
                let sLine = lines[j].replace(/\/\/.*$/, '').trim();
                braceDepth += (sLine.match(/\{/g) || []).length;
                braceDepth -= (sLine.match(/\}/g) || []).length;
                
                let mField = sLine.match(/^(?:[a-zA-Z_]\w*(?:\s*<.*?>)?(?:\s*\*+)?)\s+([a-zA-Z_]\w*)\s*;/);
                if (mField && braceDepth === 1) {
                    fields.push(mField[1]);
                }
                j++;
            }
            structs[structName] = fields;
            i = j - 1;
            continue;
        }

        let mFunc = line.match(/^(?:int|void|double|float|bool|string|auto|long|long\s+long|vector\s*<.*?>|pair\s*<.*?>)\s+([a-zA-Z_]\w*)\s*\((.*)?\)\s*\{?/);
        if (mFunc && !currentFunc) {
            let params = mFunc[2] ? mFunc[2].split(',').map(s => s.trim().split(/\s+/).pop()).filter(s => s) : [];
            currentFunc = { name: mFunc[1], params, start: i + 1 };
            funcs[mFunc[1]] = currentFunc;
            if (line.includes('{')) braceCount = 1;
        } else if (currentFunc) {
            braceCount += (line.match(/\{/g) || []).length;
            braceCount -= (line.match(/\}/g) || []).length;
            if (braceCount === 0) { currentFunc.end = i - 1; currentFunc = null; }
        }
    }
    
    function getScope() { return callStack[callStack.length - 1].locals; }
    function pushStep(lineNum, desc, output = "") {
        let allVars = {};
        for (let i = 0; i < callStack.length; i++) {
            let frame = callStack[i], prefix = "";
            if (callStack.length > 1) { prefix = frame.name.replace('()', '') + (i > 0 ? `[${i}]` : '') + "::"; }
            for (let k in frame.locals) allVars[prefix + k] = frame.locals[k];
        }
        let varsObj = [], prevScope = steps.length > 0 ? {} : null;
        if (steps.length > 0) steps[steps.length - 1].vars.forEach(v => { prevScope[v.name] = v.rawValue; });
        for (let k in allVars) {
            let raw = deepClone(allVars[k]);
            let str = typeof raw === 'object' && raw !== null ? JSON.stringify(raw) : String(raw);
            let prev = prevScope ? (typeof prevScope[k] === 'object' && prevScope[k] !== null ? JSON.stringify(prevScope[k]) : String(prevScope[k])) : null;
            let changed = prevScope ? (prev === null || str !== prev) : true;
            varsObj.push({name: k, rawValue: raw, stringValue: str, changed});
        }
        steps.push({ line: lineNum + 1, desc, vars: varsObj, output, note: "", stack: callStack.map(f => f.name) });
    }

    function executeBlock(startIdx, endIdx) {
        let idx = startIdx;
        while (idx <= endIdx && steps.length < 800) {
            let line = lines[idx];
            let trimmed = line ? line.replace(/\/\/.*$/, '').trim() : '';
            if (!trimmed || trimmed.startsWith('//') || trimmed.startsWith('using') || trimmed.startsWith('#')) { idx++; continue; }
            if (trimmed === '{' || trimmed === '}') { idx++; continue; }
            let scope = getScope();

            // break / continue
            if (trimmed === 'break;') { pushStep(idx, 'Break'); return { action: 'break' }; }
            if (trimmed === 'continue;') { pushStep(idx, 'Continue'); return { action: 'continue' }; }

            let mRet = trimmed.match(/^return\s+(.*);/);
            if (mRet) { let val = cppResolve(mRet[1], scope); pushStep(idx, `Return ${val}`); return { action: 'return', value: val }; }
            if (trimmed === 'return 0;' || trimmed === 'return;') { pushStep(idx, `Return`); return { action: 'return', value: 0 }; }

            if (trimmed.startsWith('cout') || trimmed.startsWith('std::cout')) {
                let cleanLine = trimmed.replace(/^(?:std::)?cout\s*/, '');
